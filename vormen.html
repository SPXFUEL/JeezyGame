<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Vormen Leren</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body {
    width: 100%; height: 100%;
    background: #1a0533;
    overflow: hidden;
    font-family: 'Arial Rounded MT Bold', Arial, sans-serif;
    touch-action: none;
  }
  canvas {
    display: block;
    position: absolute;
    top: 50%; left: 50%;
    transform: translate(-50%, -50%);
    cursor: pointer;
  }
</style>
</head>
<body>
<canvas id="c"></canvas>
<script>
(function(){
"use strict";

// ── Canvas setup ──────────────────────────────────────────────────────────────
const canvas = document.getElementById('c');
const ctx    = canvas.getContext('2d');
const BASE_W = 390, BASE_H = 700;
let scale = 1;

function resize(){
  scale = Math.min(window.innerWidth / BASE_W, window.innerHeight / BASE_H);
  canvas.width  = Math.floor(BASE_W * scale);
  canvas.height = Math.floor(BASE_H * scale);
  ctx.setTransform(scale, 0, 0, scale, 0, 0);
}
window.addEventListener('resize', resize);
resize();

// ── Audio ─────────────────────────────────────────────────────────────────────
let ac = null;
function getAC(){
  if(!ac){ ac = new (window.AudioContext || window.webkitAudioContext)(); }
  if(ac.state === 'suspended') ac.resume();
  return ac;
}
function tone(freq, t0, dur, vol, type){
  type = type || 'sine'; vol = vol || 0.3;
  const a = getAC();
  const o = a.createOscillator();
  const g = a.createGain();
  o.connect(g); g.connect(a.destination);
  o.type = type;
  o.frequency.setValueAtTime(freq, t0);
  g.gain.setValueAtTime(0, t0);
  g.gain.linearRampToValueAtTime(vol, t0 + 0.01);
  g.gain.exponentialRampToValueAtTime(0.001, t0 + dur);
  o.start(t0); o.stop(t0 + dur + 0.05);
}
function playCorrect(){
  const t = getAC().currentTime;
  tone(523.25, t,      0.18, 0.3, 'triangle');
  tone(659.25, t+0.16, 0.18, 0.3, 'triangle');
  tone(783.99, t+0.32, 0.18, 0.3, 'triangle');
  tone(1046.5,  t+0.48, 0.35, 0.4, 'triangle');
}
function playWrong(){
  const t = getAC().currentTime;
  tone(329.63, t,      0.15, 0.22, 'sawtooth');
  tone(311.13, t+0.15, 0.15, 0.22, 'sawtooth');
  tone(293.66, t+0.30, 0.25, 0.22, 'sawtooth');
}
function playTick(){
  tone(440, getAC().currentTime, 0.05, 0.18, 'square');
}

// ── Shapes ────────────────────────────────────────────────────────────────────
const SHAPES = [
  { id:'cirkel',    label:'Cirkel',    g1:'#90CAF9', g2:'#1565C0', sd:'#0D47A1' },
  { id:'vierkant',  label:'Vierkant',  g1:'#EF9A9A', g2:'#C62828', sd:'#B71C1C' },
  { id:'driehoek',  label:'Driehoek',  g1:'#FFF9C4', g2:'#F9A825', sd:'#F57F17' },
  { id:'ster',      label:'Ster',      g1:'#CE93D8', g2:'#6A1B9A', sd:'#4A148C' },
  { id:'rechthoek', label:'Rechthoek', g1:'#A5D6A7', g2:'#2E7D32', sd:'#1B5E20' },
  { id:'ruit',      label:'Ruit',      g1:'#FFCC80', g2:'#BF360C', sd:'#E65100' },
];

const BTN_PALETTE = [
  { top:'#F06292', bot:'#C2185B', text:'#fff' },
  { top:'#7986CB', bot:'#303F9F', text:'#fff' },
  { top:'#4DB6AC', bot:'#00695C', text:'#fff' },
];

// ── Helpers ───────────────────────────────────────────────────────────────────
function roundRect(cx, x, y, w, h, r){
  cx.beginPath();
  cx.moveTo(x+r, y);
  cx.lineTo(x+w-r, y);
  cx.quadraticCurveTo(x+w, y,   x+w, y+r);
  cx.lineTo(x+w,   y+h-r);
  cx.quadraticCurveTo(x+w, y+h, x+w-r, y+h);
  cx.lineTo(x+r,   y+h);
  cx.quadraticCurveTo(x,   y+h, x,     y+h-r);
  cx.lineTo(x,     y+r);
  cx.quadraticCurveTo(x,   y,   x+r,   y);
  cx.closePath();
}

function starPath(cx, ox, oy, pts, outerR, innerR){
  const step = Math.PI / pts;
  cx.beginPath();
  for(let i=0; i<pts*2; i++){
    const R   = i%2===0 ? outerR : innerR;
    const ang = i*step - Math.PI/2;
    const x   = ox + Math.cos(ang)*R;
    const y   = oy + Math.sin(ang)*R;
    i===0 ? cx.moveTo(x,y) : cx.lineTo(x,y);
  }
  cx.closePath();
}

function shapeGrad(id, cx2, cy2, r){
  const s = SHAPES.find(s=>s.id===id);
  const g = ctx.createLinearGradient(cx2-r, cy2-r, cx2+r, cy2+r);
  g.addColorStop(0, s.g1);
  g.addColorStop(1, s.g2);
  return g;
}

function drawShape(id, cx2, cy2, sz, alpha){
  alpha = (alpha===undefined) ? 1 : alpha;
  const s  = SHAPES.find(s=>s.id===id);
  const r  = sz/2;
  ctx.save();
  ctx.globalAlpha = alpha;

  // drop shadow
  ctx.shadowColor   = s.sd + 'bb';
  ctx.shadowBlur    = 20;
  ctx.shadowOffsetX = 5;
  ctx.shadowOffsetY = 8;

  const strokeW = 3.5;
  ctx.lineWidth   = strokeW;
  ctx.strokeStyle = 'rgba(255,255,255,0.75)';

  if(id==='cirkel'){
    ctx.beginPath();
    ctx.arc(cx2, cy2, r, 0, Math.PI*2);
    ctx.fillStyle = shapeGrad(id, cx2, cy2, r);
    ctx.fill(); ctx.stroke();
    ctx.shadowColor='transparent';
    // glossy highlight
    ctx.beginPath();
    ctx.arc(cx2 - r*0.28, cy2 - r*0.28, r*0.38, 0, Math.PI*2);
    ctx.fillStyle = 'rgba(255,255,255,0.38)';
    ctx.fill();

  } else if(id==='vierkant'){
    const h2 = r*0.85;
    // 3-D side
    ctx.shadowColor='transparent';
    ctx.fillStyle = s.sd;
    roundRect(ctx, cx2-h2+8, cy2-h2+8, h2*2, h2*2, 10);
    ctx.fill();
    ctx.shadowColor=s.sd+'bb'; ctx.shadowBlur=20; ctx.shadowOffsetX=5; ctx.shadowOffsetY=8;
    roundRect(ctx, cx2-h2, cy2-h2, h2*2, h2*2, 10);
    ctx.fillStyle = shapeGrad(id, cx2, cy2, r);
    ctx.fill(); ctx.stroke();
    ctx.shadowColor='transparent';
    // highlight
    ctx.fillStyle='rgba(255,255,255,0.28)';
    roundRect(ctx, cx2-h2+6, cy2-h2+6, h2*0.85, h2*0.45, 7);
    ctx.fill();

  } else if(id==='driehoek'){
    const th = r*1.72, bh = r*0.98;
    ctx.beginPath();
    ctx.moveTo(cx2,        cy2 - th*0.62);
    ctx.lineTo(cx2+bh,     cy2 + th*0.38);
    ctx.lineTo(cx2-bh,     cy2 + th*0.38);
    ctx.closePath();
    ctx.fillStyle = shapeGrad(id, cx2, cy2, r);
    ctx.fill(); ctx.stroke();
    ctx.shadowColor='transparent';
    ctx.beginPath();
    ctx.moveTo(cx2,        cy2 - th*0.55);
    ctx.lineTo(cx2+bh*0.32, cy2 - th*0.08);
    ctx.lineTo(cx2-bh*0.32, cy2 - th*0.08);
    ctx.closePath();
    ctx.fillStyle='rgba(255,255,255,0.3)'; ctx.fill();

  } else if(id==='ster'){
    // golden glow
    ctx.shadowColor='transparent';
    const glow = ctx.createRadialGradient(cx2,cy2,r*0.2,cx2,cy2,r*1.55);
    glow.addColorStop(0,'rgba(255,210,0,0.6)');
    glow.addColorStop(1,'rgba(255,210,0,0)');
    ctx.beginPath(); ctx.arc(cx2,cy2,r*1.55,0,Math.PI*2);
    ctx.fillStyle=glow; ctx.fill();
    // star
    ctx.shadowColor=s.sd+'bb'; ctx.shadowBlur=20; ctx.shadowOffsetX=5; ctx.shadowOffsetY=8;
    starPath(ctx, cx2, cy2, 5, r, r*0.43);
    ctx.fillStyle = shapeGrad(id, cx2, cy2, r);
    ctx.fill(); ctx.stroke();
    // clip highlight
    ctx.shadowColor='transparent';
    ctx.save();
    starPath(ctx, cx2, cy2, 5, r, r*0.43); ctx.clip();
    ctx.beginPath(); ctx.arc(cx2-r*0.22, cy2-r*0.22, r*0.4, 0, Math.PI*2);
    ctx.fillStyle='rgba(255,255,255,0.32)'; ctx.fill();
    ctx.restore();

  } else if(id==='rechthoek'){
    const rw=r*1.48, rh=r*0.74;
    roundRect(ctx, cx2-rw, cy2-rh, rw*2, rh*2, 10);
    ctx.fillStyle = shapeGrad(id, cx2, cy2, r);
    ctx.fill(); ctx.stroke();
    ctx.shadowColor='transparent';
    ctx.fillStyle='rgba(255,255,255,0.25)';
    roundRect(ctx, cx2-rw+6, cy2-rh+6, rw*0.78, rh*0.56, 7);
    ctx.fill();

  } else if(id==='ruit'){
    const rx=r, ry=r*0.74;
    ctx.beginPath();
    ctx.moveTo(cx2,     cy2-ry);
    ctx.lineTo(cx2+rx,  cy2);
    ctx.lineTo(cx2,     cy2+ry);
    ctx.lineTo(cx2-rx,  cy2);
    ctx.closePath();
    ctx.fillStyle = shapeGrad(id, cx2, cy2, r);
    ctx.fill(); ctx.stroke();
    ctx.shadowColor='transparent';
    ctx.beginPath();
    ctx.moveTo(cx2-rx*0.1, cy2-ry*0.9);
    ctx.lineTo(cx2+rx*0.36, cy2-ry*0.1);
    ctx.lineTo(cx2-rx*0.12, cy2+ry*0.08);
    ctx.lineTo(cx2-rx*0.56, cy2-ry*0.1);
    ctx.closePath();
    ctx.fillStyle='rgba(255,255,255,0.28)'; ctx.fill();
  }
  ctx.restore();
}

// ── Particles ─────────────────────────────────────────────────────────────────
let particles = [];
const PCOLS = ['#FF5252','#FFEB3B','#00E5FF','#69F0AE','#E040FB','#FF6D00','#F06292','#CCFF90'];
function spawnParticles(ox, oy){
  for(let i=0;i<60;i++){
    const ang = Math.random()*Math.PI*2;
    const spd = 2.8 + Math.random()*5.5;
    particles.push({
      x:ox, y:oy,
      vx: Math.cos(ang)*spd,
      vy: Math.sin(ang)*spd - 2.5,
      r:  2.5 + Math.random()*5,
      col: PCOLS[Math.floor(Math.random()*PCOLS.length)],
      life:1,
      decay:0.017+Math.random()*0.018,
    });
  }
}

// ── Game state ────────────────────────────────────────────────────────────────
const TOTAL = 10;
let state = 'start'; // start | playing | correct | wrong | end
let round  = 0;
let score  = 0;
let curShape = null;
let choices  = [];
let buttons  = [];
let bounceT  = 0;
let shakeX   = 0, shakeT = 0;
let celebT   = 0;
let hoverBtn = -1;
let startBtn = null, endBtn = null;

function shuffle(a){
  for(let i=a.length-1;i>0;i--){
    const j=Math.floor(Math.random()*(i+1));
    [a[i],a[j]]=[a[j],a[i]];
  }
  return a;
}

function nextRound(){
  round++;
  if(round > TOTAL){ state='end'; return; }
  curShape = SHAPES[Math.floor(Math.random()*SHAPES.length)];
  const others = shuffle(SHAPES.filter(s=>s.id!==curShape.id));
  choices  = shuffle([curShape, others[0], others[1]]);
  buttons  = choices.map((sh,i)=>{
    const bw=330, bh=62;
    return { x:BASE_W/2-bw/2, y:510+i*74, w:bw, h:bh, shape:sh, ci:i };
  });
  state   = 'playing';
  bounceT = 0; shakeT = 0; shakeX = 0; celebT = 0;
  particles = [];
}

// ── Background ────────────────────────────────────────────────────────────────
const BG_STARS = Array.from({length:22}, ()=>({
  x: Math.random()*BASE_W,
  y: Math.random()*BASE_H,
  r: 0.8+Math.random()*1.6,
  a: 0.15+Math.random()*0.3,
}));

function drawBg(){
  const g = ctx.createLinearGradient(0,0,0,BASE_H);
  g.addColorStop(0,'#1a0533');
  g.addColorStop(1,'#0d1b4d');
  ctx.fillStyle=g; ctx.fillRect(0,0,BASE_W,BASE_H);
  for(const s of BG_STARS){
    ctx.save(); ctx.globalAlpha=s.a;
    ctx.fillStyle='#fff';
    ctx.beginPath(); ctx.arc(s.x,s.y,s.r,0,Math.PI*2); ctx.fill();
    ctx.restore();
  }
}

// ── START screen ──────────────────────────────────────────────────────────────
let startPulse = 0;
function drawStart(){
  drawBg();
  startPulse += 0.04;

  ctx.save();
  ctx.textAlign='center';
  ctx.shadowColor='#CE93D8'; ctx.shadowBlur=28;
  ctx.fillStyle='#FFFFFF';
  ctx.font='bold 56px Arial';
  ctx.fillText('Vormen', BASE_W/2, 150);
  ctx.shadowBlur=0;
  ctx.fillStyle='#CE93D8';
  ctx.font='28px Arial';
  ctx.fillText('Leren', BASE_W/2, 192);
  ctx.restore();

  // mini preview shapes
  const prev = [
    {id:'cirkel',    x:68,  y:330},
    {id:'vierkant',  x:195, y:310},
    {id:'driehoek',  x:322, y:330},
  ];
  for(const p of prev) drawShape(p.id, p.x, p.y, 85);

  // pulsing start button
  const sc2 = 1 + Math.sin(startPulse)*0.04;
  const bw=250, bh=66, bx=BASE_W/2-bw/2, by=490;
  startBtn = {x:bx, y:by, w:bw, h:bh};
  ctx.save();
  ctx.translate(BASE_W/2, by+bh/2);
  ctx.scale(sc2,sc2);
  ctx.translate(-BASE_W/2, -(by+bh/2));
  ctx.shadowColor='#E91E63'; ctx.shadowBlur=24;
  const g2 = ctx.createLinearGradient(bx,by,bx+bw,by+bh);
  g2.addColorStop(0,'#F06292'); g2.addColorStop(1,'#9C27B0');
  roundRect(ctx, bx,by,bw,bh,33);
  ctx.fillStyle=g2; ctx.fill();
  ctx.shadowBlur=0;
  ctx.fillStyle='#fff'; ctx.font='bold 30px Arial'; ctx.textAlign='center';
  ctx.fillText('Spelen!', BASE_W/2, by+44);
  ctx.restore();

  ctx.save();
  ctx.textAlign='center'; ctx.fillStyle='rgba(255,255,255,0.45)';
  ctx.font='18px Arial';
  ctx.fillText('10 ronden  \u2022  leeftijd 2-4', BASE_W/2, 598);
  ctx.restore();
}

// ── END screen ────────────────────────────────────────────────────────────────
function drawEnd(){
  drawBg();
  ctx.save();
  ctx.textAlign='center';
  ctx.shadowColor='#FFD700'; ctx.shadowBlur=28;
  ctx.fillStyle='#FFD700';
  ctx.font='bold 52px Arial';
  ctx.fillText('Geweldig!', BASE_W/2, 155);
  ctx.shadowBlur=0;
  ctx.fillStyle='#fff';
  ctx.font='26px Arial';
  ctx.fillText('Je scoorde '+score+' van de '+TOTAL+'!', BASE_W/2, 205);
  ctx.restore();

  // score stars row
  const sw = (TOTAL-1)*34;
  const sx0 = BASE_W/2 - sw/2;
  for(let i=0;i<TOTAL;i++){
    ctx.save();
    ctx.textAlign='center';
    ctx.font='28px Arial';
    ctx.fillStyle = i<score ? '#FFD700' : '#444';
    ctx.shadowColor= i<score ? '#FFD700' : 'transparent';
    ctx.shadowBlur = i<score ? 10 : 0;
    ctx.fillText(i<score ? '\u2605' : '\u2606', sx0+i*34, 262);
    ctx.restore();
  }

  // preview shapes
  const pv2 = ['cirkel','ster','vierkant','rechthoek','ruit'];
  const pos  = [[55,400],[125,375],[200,400],[272,375],[340,400]];
  for(let i=0;i<pv2.length;i++) drawShape(pv2[i], pos[i][0], pos[i][1], 68);

  const bw=255,bh=66,bx=BASE_W/2-bw/2,by=510;
  endBtn = {x:bx,y:by,w:bw,h:bh};
  ctx.save();
  ctx.shadowColor='#00BCD4'; ctx.shadowBlur=18;
  const g3=ctx.createLinearGradient(bx,by,bx+bw,by+bh);
  g3.addColorStop(0,'#26C6DA'); g3.addColorStop(1,'#006064');
  roundRect(ctx,bx,by,bw,bh,33); ctx.fillStyle=g3; ctx.fill();
  ctx.shadowBlur=0; ctx.fillStyle='#fff';
  ctx.font='bold 27px Arial'; ctx.textAlign='center';
  ctx.fillText('Nog een keer!', BASE_W/2, by+43);
  ctx.restore();
}

// ── GAME screen ───────────────────────────────────────────────────────────────
function easeOutBounce(t){
  if(t<1/2.75)        return 7.5625*t*t;
  if(t<2/2.75)        return 7.5625*(t-=1.5/2.75)*t+0.75;
  if(t<2.5/2.75)      return 7.5625*(t-=2.25/2.75)*t+0.9375;
                      return 7.5625*(t-=2.625/2.75)*t+0.984375;
}

function drawGame(dt){
  drawBg();

  // progress stars
  const sp = 32, sx0 = BASE_W/2 - ((TOTAL-1)*sp)/2;
  for(let i=0;i<TOTAL;i++){
    const filled = i < score;
    ctx.save();
    ctx.textAlign='center';
    ctx.font = filled ? '24px Arial' : '20px Arial';
    ctx.fillStyle = filled ? '#FFD700' : (i===round-1 ? '#FFF59D' : '#333');
    ctx.shadowColor = filled ? '#FFD700' : 'transparent';
    ctx.shadowBlur  = filled ? 10 : 0;
    ctx.fillText(filled ? '\u2605' : '\u2606', sx0+i*sp, 36);
    ctx.restore();
  }

  // round indicator
  ctx.save();
  ctx.textAlign='center'; ctx.fillStyle='rgba(255,255,255,0.65)';
  ctx.font='21px Arial';
  ctx.fillText('Ronde '+round+' / '+TOTAL, BASE_W/2, 68);
  ctx.restore();

  // question
  ctx.save();
  ctx.textAlign='center';
  ctx.shadowColor='#FFE082'; ctx.shadowBlur=10;
  ctx.fillStyle='#FFE082';
  ctx.font='bold 29px Arial';
  ctx.fillText('Welke vorm is dit?', BASE_W/2, 108);
  ctx.restore();

  // shape card
  const scx=BASE_W/2, scy=302;
  ctx.save();
  ctx.shadowColor='rgba(0,0,0,0.45)'; ctx.shadowBlur=22;
  ctx.shadowOffsetY=6;
  roundRect(ctx, scx-115, scy-118, 230, 228, 24);
  ctx.fillStyle='rgba(255,255,255,0.07)'; ctx.fill();
  ctx.restore();

  // animate shape
  bounceT += dt*0.055;
  const bsc = bounceT<1 ? (0.15 + 0.85*easeOutBounce(Math.min(bounceT,1))) : 1;

  if(state==='wrong' && shakeT<20){
    shakeT += dt;
    shakeX = Math.sin(shakeT*1.35)*11*(1-shakeT/20);
    if(shakeT>=20){ shakeX=0; shakeT=0; state='playing'; }
  }

  // particles
  for(let i=particles.length-1;i>=0;i--){
    const p=particles[i];
    p.x+=p.vx; p.y+=p.vy; p.vy+=0.2; p.life-=p.decay;
    if(p.life<=0){ particles.splice(i,1); continue; }
    ctx.save(); ctx.globalAlpha=p.life;
    ctx.fillStyle=p.col;
    ctx.beginPath(); ctx.arc(p.x,p.y,p.r,0,Math.PI*2); ctx.fill();
    ctx.restore();
  }

  let celebSc = 1;
  if(state==='correct'){
    celebT += dt;
    celebSc = 1 + Math.sin(celebT*0.22)*0.06;
    if(celebT>62){ state='playing'; nextRound(); }
  }

  const finalSc = bsc * celebSc;
  ctx.save();
  ctx.translate(scx+shakeX, scy);
  ctx.scale(finalSc, finalSc);
  ctx.translate(-scx, -scy);
  drawShape(curShape.id, scx, scy, 155);
  ctx.restore();

  if(state==='correct'){
    ctx.save();
    ctx.textAlign='center';
    ctx.shadowColor='#FFD700'; ctx.shadowBlur=15;
    ctx.fillStyle='#FFD700';
    ctx.font='bold 35px Arial';
    ctx.fillText(curShape.label+'!', scx, scy+132);
    ctx.restore();
  }

  // buttons
  for(let i=0;i<buttons.length;i++){
    const btn = buttons[i];
    const pal = BTN_PALETTE[btn.ci];
    const isHov = hoverBtn===i;
    const yo = isHov ? 2 : 0;
    ctx.save();
    ctx.shadowColor=pal.top; ctx.shadowBlur=isHov?22:12;
    ctx.shadowOffsetY=isHov?5:2;
    const g4=ctx.createLinearGradient(btn.x,btn.y+yo,btn.x,btn.y+yo+btn.h);
    g4.addColorStop(0,pal.top); g4.addColorStop(1,pal.bot);
    roundRect(ctx,btn.x,btn.y+yo,btn.w,btn.h,31);
    ctx.fillStyle=g4; ctx.fill();
    ctx.shadowBlur=0;
    // shine
    ctx.fillStyle='rgba(255,255,255,0.22)';
    roundRect(ctx,btn.x+6,btn.y+yo+5,btn.w-12,btn.h*0.4,18);
    ctx.fill();
    // text
    ctx.textAlign='center'; ctx.fillStyle=pal.text;
    ctx.font='bold 26px Arial';
    ctx.shadowColor='rgba(0,0,0,0.3)'; ctx.shadowBlur=4;
    ctx.fillText(btn.shape.label, btn.x+btn.w/2, btn.y+yo+41);
    ctx.restore();
  }
}

// ── Main loop ─────────────────────────────────────────────────────────────────
let lastTs=0;
function loop(ts){
  const dt = Math.min((ts-lastTs)/16.67, 3);
  lastTs = ts;
  ctx.clearRect(0,0,BASE_W,BASE_H);
  if(state==='start')      drawStart();
  else if(state==='end')   drawEnd();
  else                     drawGame(dt);
  requestAnimationFrame(loop);
}
requestAnimationFrame(loop);

// ── Input ─────────────────────────────────────────────────────────────────────
function toLogical(e){
  const rect=canvas.getBoundingClientRect();
  let cx,cy;
  if(e.touches && e.touches.length>0){
    cx=e.touches[0].clientX; cy=e.touches[0].clientY;
  } else { cx=e.clientX; cy=e.clientY; }
  return { x:(cx-rect.left)/scale, y:(cy-rect.top)/scale };
}
function hit(r,px,py){ return px>=r.x&&px<=r.x+r.w&&py>=r.y&&py<=r.y+r.h; }

canvas.addEventListener('click', e=>{
  getAC();
  const p = toLogical(e);
  if(state==='start'){
    if(startBtn && hit(startBtn,p.x,p.y)){
      playTick(); score=0; round=0; nextRound();
    }
    return;
  }
  if(state==='end'){
    if(endBtn && hit(endBtn,p.x,p.y)){
      playTick(); score=0; round=0; nextRound();
    }
    return;
  }
  if(state!=='playing') return;
  for(let i=0;i<buttons.length;i++){
    const b=buttons[i];
    if(hit({x:b.x,y:b.y,w:b.w,h:b.h},p.x,p.y)){
      playTick();
      if(b.shape.id===curShape.id){
        score++;
        playCorrect();
        spawnParticles(BASE_W/2, 302);
        state='correct'; celebT=0;
      } else {
        playWrong();
        state='wrong'; shakeT=0.01;
      }
      return;
    }
  }
});

canvas.addEventListener('mousemove', e=>{
  if(state!=='playing'){ hoverBtn=-1; return; }
  const p=toLogical(e);
  hoverBtn=-1;
  for(let i=0;i<buttons.length;i++){
    const b=buttons[i];
    if(hit({x:b.x,y:b.y,w:b.w,h:b.h},p.x,p.y)){ hoverBtn=i; break; }
  }
});

canvas.addEventListener('touchstart', e=>e.preventDefault(), {passive:false});

})();
</script>
</body>
</html>
