<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Kleurenspel</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #0d0d0d;
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 100vh;
    overflow: hidden;
    font-family: 'Arial Rounded MT Bold', Arial, sans-serif;
  }
  canvas { display: block; touch-action: none; }
</style>
</head>
<body>
<canvas id="game" width="390" height="700"></canvas>
<script>
const canvas = document.getElementById('game');
const ctx = canvas.getContext('2d');

// ─── State ────────────────────────────────────────────────────────────────────
const TOTAL_ROUNDS = 10;
let round = 0;
let score = 0;
let phase = 'start';   // start | question | feedback | end
let animFrame = 0;
let particles = [];
let balls = [];
let correctColor = null;
let feedbackCorrect = false;
let feedbackTimer = null;

// Buttons
let startBtn  = { x: 95,  y: 530, w: 200, h: 70 };
let replayBtn = { x: 95,  y: 560, w: 200, h: 70 };

// ─── Color definitions ───────────────────────────────────────────────────────
const COLORS = [
  { name: 'ROOD',   hex: '#ff3b3b', dark: '#cc0000' },
  { name: 'BLAUW',  hex: '#3b8bff', dark: '#0044cc' },
  { name: 'GEEL',   hex: '#ffd700', dark: '#c8a800' },
  { name: 'GROEN',  hex: '#2ecc71', dark: '#1a8a4a' },
  { name: 'ORANJE', hex: '#ff8c00', dark: '#cc5f00' },
  { name: 'PAARS',  hex: '#b44dff', dark: '#7a00cc' },
];

function shuffle(arr) {
  const a = [...arr];
  for (let i = a.length-1; i > 0; i--) {
    const j = Math.floor(Math.random()*(i+1));
    [a[i],a[j]] = [a[j],a[i]];
  }
  return a;
}

// ─── Ball class ──────────────────────────────────────────────────────────────
class Ball {
  constructor(color, isCorrect) {
    this.color = color;
    this.isCorrect = isCorrect;
    this.r = 46 + Math.random() * 12;
    // Random position avoiding edges, spread across canvas
    this.x = this.r + 20 + Math.random() * (390 - (this.r + 20) * 2);
    this.y = 220 + Math.random() * 330;
    this.vx = (Math.random() - 0.5) * 1.4;
    this.vy = (Math.random() - 0.5) * 1.4;
    this.wobble = Math.random() * Math.PI * 2;
    this.wobbleSpeed = 0.02 + Math.random() * 0.02;
    this.scaleX = 1;
    this.scaleY = 1;
    this.bumpTimer = 0;
  }

  update() {
    this.wobble += this.wobbleSpeed;
    this.x += this.vx;
    this.y += this.vy;

    // Bounce off walls (keep within canvas, stay in lower area)
    if (this.x - this.r < 10)         { this.x = this.r + 10; this.vx = Math.abs(this.vx); this.bump(); }
    if (this.x + this.r > 380)        { this.x = 380 - this.r; this.vx = -Math.abs(this.vx); this.bump(); }
    if (this.y - this.r < 200)        { this.y = this.r + 200; this.vy = Math.abs(this.vy); this.bump(); }
    if (this.y + this.r > 680)        { this.y = 680 - this.r; this.vy = -Math.abs(this.vy); this.bump(); }

    if (this.bumpTimer > 0) this.bumpTimer--;
    // Wobble scale
    this.scaleX = 1 + Math.sin(this.wobble) * 0.04;
    this.scaleY = 1 - Math.sin(this.wobble) * 0.04;
  }

  bump() {
    this.bumpTimer = 8;
    this.scaleX = 1.2; this.scaleY = 0.85;
  }

  draw() {
    ctx.save();
    ctx.translate(this.x, this.y);
    ctx.scale(this.scaleX, this.scaleY);

    // Shadow
    ctx.shadowColor = this.color.dark;
    ctx.shadowBlur = 15;
    ctx.shadowOffsetY = 4;

    // Body
    const grad = ctx.createRadialGradient(-this.r*0.3, -this.r*0.3, this.r*0.05, 0, 0, this.r);
    grad.addColorStop(0, lighten(this.color.hex, 50));
    grad.addColorStop(0.5, this.color.hex);
    grad.addColorStop(1, this.color.dark);
    ctx.beginPath();
    ctx.arc(0, 0, this.r, 0, Math.PI * 2);
    ctx.fillStyle = grad;
    ctx.fill();

    // Shine
    ctx.shadowBlur = 0; ctx.shadowOffsetY = 0;
    const shine = ctx.createRadialGradient(-this.r*0.3, -this.r*0.35, 0, -this.r*0.2, -this.r*0.3, this.r*0.55);
    shine.addColorStop(0, 'rgba(255,255,255,0.75)');
    shine.addColorStop(1, 'rgba(255,255,255,0)');
    ctx.beginPath();
    ctx.arc(0, 0, this.r, 0, Math.PI * 2);
    ctx.fillStyle = shine;
    ctx.fill();

    ctx.restore();
  }
}

function lighten(hex, amount) {
  const r = parseInt(hex.slice(1,3), 16);
  const g = parseInt(hex.slice(3,5), 16);
  const b = parseInt(hex.slice(5,7), 16);
  return `rgb(${Math.min(255,r+amount)},${Math.min(255,g+amount)},${Math.min(255,b+amount)})`;
}

// ─── Round setup ─────────────────────────────────────────────────────────────
function newRound() {
  const shuffled = shuffle(COLORS);
  correctColor = shuffled[0];

  // 5 balls: 1 correct + 4 wrong (or fewer if near end of color list)
  const numBalls = 5;
  const wrongColors = shuffled.slice(1, numBalls);
  const allColors = shuffle([shuffled[0], ...wrongColors]);

  balls = [];
  // Place balls trying to avoid overlap (simple attempts)
  allColors.forEach(c => {
    let ball;
    let attempts = 0;
    do {
      ball = new Ball(c, c === correctColor);
      attempts++;
    } while (attempts < 20 && balls.some(b => Math.hypot(b.x - ball.x, b.y - ball.y) < b.r + ball.r + 10));
    balls.push(ball);
  });

  particles = [];
  phase = 'question';
}

// ─── Particles ───────────────────────────────────────────────────────────────
function spawnParticles(x, y) {
  for (let i = 0; i < 30; i++) {
    const angle = Math.random() * Math.PI * 2;
    const speed = 4 + Math.random() * 7;
    particles.push({
      x, y,
      vx: Math.cos(angle) * speed,
      vy: Math.sin(angle) * speed - 3,
      r:  4 + Math.random() * 8,
      color: `hsl(${Math.random()*360},100%,60%)`,
      life: 1.0,
      rot: Math.random() * Math.PI * 2,
      rotV: (Math.random()-0.5)*0.3,
      type: Math.floor(Math.random()*3)  // 0=circle, 1=square, 2=star
    });
  }
}

// ─── Drawing ──────────────────────────────────────────────────────────────────
function drawBg() {
  const grad = ctx.createLinearGradient(0, 0, 0, 700);
  grad.addColorStop(0, '#0f2027');
  grad.addColorStop(1, '#203a43');
  ctx.fillStyle = grad;
  ctx.fillRect(0, 0, 390, 700);
}

function drawRoundedRect(x, y, w, h, r, fill, stroke) {
  ctx.beginPath();
  ctx.moveTo(x+r, y);
  ctx.lineTo(x+w-r, y); ctx.arcTo(x+w, y, x+w, y+r, r);
  ctx.lineTo(x+w, y+h-r); ctx.arcTo(x+w, y+h, x+w-r, y+h, r);
  ctx.lineTo(x+r, y+h); ctx.arcTo(x, y+h, x, y+h-r, r);
  ctx.lineTo(x, y+r); ctx.arcTo(x, y, x+r, y, r);
  ctx.closePath();
  if (fill)   { ctx.fillStyle = fill; ctx.fill(); }
  if (stroke) { ctx.strokeStyle = stroke; ctx.lineWidth = 3; ctx.stroke(); }
}

function drawStartScreen() {
  drawBg();

  ctx.font = 'bold 40px Arial';
  ctx.fillStyle = '#fff';
  ctx.textAlign = 'center';
  ctx.fillText('Kleurenspel', 195, 140);

  ctx.font = '20px Arial';
  ctx.fillStyle = '#ccc';
  ctx.fillText('Tik op de bol', 195, 195);
  ctx.fillText('met de juiste kleur!', 195, 225);

  // Color swatch preview
  COLORS.forEach((c, i) => {
    const row = Math.floor(i / 3);
    const col = i % 3;
    const bx = 52 + col * 100;
    const by = 300 + row * 90;
    ctx.beginPath();
    ctx.arc(bx, by, 32, 0, Math.PI * 2);
    ctx.fillStyle = c.hex;
    ctx.fill();
    ctx.font = 'bold 14px Arial';
    ctx.fillStyle = '#fff';
    ctx.textAlign = 'center';
    ctx.fillText(c.name, bx, by + 48);
  });

  drawRoundedRect(startBtn.x, startBtn.y, startBtn.w, startBtn.h, 18, '#ffd700', null);
  ctx.font = 'bold 26px Arial';
  ctx.fillStyle = '#1a1a2e';
  ctx.textAlign = 'center';
  ctx.fillText('▶  SPELEN', startBtn.x + startBtn.w/2, startBtn.y + startBtn.h/2 + 2);
}

function drawQuestion() {
  drawBg();

  // Round / score
  ctx.font = 'bold 22px Arial';
  ctx.fillStyle = '#fff';
  ctx.textAlign = 'center';
  ctx.fillText(`Ronde ${round} / ${TOTAL_ROUNDS}`, 195, 38);
  ctx.font = '18px Arial';
  ctx.fillStyle = '#ffd700';
  ctx.fillText(`⭐ ${score}`, 195, 64);

  // Big color name
  ctx.save();
  const nameScale = 1 + Math.sin(animFrame * 0.07) * 0.03;
  ctx.translate(195, 108);
  ctx.scale(nameScale, nameScale);
  ctx.font = 'bold 44px Arial';
  ctx.fillStyle = correctColor.hex;
  ctx.textAlign = 'center';
  // Text shadow
  ctx.shadowColor = correctColor.dark;
  ctx.shadowBlur = 12;
  ctx.fillText(`Tik op ${correctColor.name}!`, 0, 0);
  ctx.restore();

  // Color swatch hint
  const swatchW = 120, swatchH = 36;
  const sx = 195 - swatchW / 2;
  const sy = 135;
  ctx.shadowBlur = 0;
  drawRoundedRect(sx, sy, swatchW, swatchH, 10, correctColor.hex, null);

  // Balls
  balls.forEach(b => b.draw());

  // Particles
  drawParticles();
}

function drawFeedback() {
  drawBg();
  drawParticles();

  const pulse = 1 + Math.sin(animFrame * 0.12) * 0.07;
  ctx.save();
  ctx.translate(195, 260);
  ctx.scale(pulse, pulse);

  // Big color circle
  ctx.beginPath();
  ctx.arc(0, -50, 70, 0, Math.PI * 2);
  ctx.fillStyle = correctColor.hex;
  ctx.shadowColor = correctColor.hex;
  ctx.shadowBlur = 25;
  ctx.fill();

  ctx.shadowBlur = 0;
  ctx.font = 'bold 38px Arial';
  ctx.fillStyle = feedbackCorrect ? '#badc58' : '#ff6b6b';
  ctx.textAlign = 'center';
  ctx.fillText(feedbackCorrect ? '🎉 Goed zo!' : '😊 Bijna!', 0, 55);

  ctx.font = '24px Arial';
  ctx.fillStyle = '#fff';
  ctx.fillText(`Dit was: ${correctColor.name}`, 0, 95);
  ctx.restore();
}

function drawEndScreen() {
  drawBg();
  drawParticles();

  ctx.font = '80px serif';
  ctx.textAlign = 'center';
  ctx.fillText('🎨', 195, 210);

  ctx.font = 'bold 34px Arial';
  ctx.fillStyle = '#ffd700';
  ctx.textAlign = 'center';
  ctx.fillText('Klaar!', 195, 290);

  ctx.font = '26px Arial';
  ctx.fillStyle = '#fff';
  ctx.fillText(`Score: ${score} / ${TOTAL_ROUNDS}`, 195, 340);

  const msg = score >= 8 ? 'Wauw, geweldig! 🌟' :
               score >= 5 ? 'Goed gedaan! 👍' : 'Blijven oefenen! 💪';
  ctx.font = '22px Arial';
  ctx.fillStyle = '#badc58';
  ctx.fillText(msg, 195, 390);

  drawRoundedRect(replayBtn.x, replayBtn.y, replayBtn.w, replayBtn.h, 18, '#ffd700', null);
  ctx.font = 'bold 24px Arial';
  ctx.fillStyle = '#1a1a2e';
  ctx.textAlign = 'center';
  ctx.fillText('🔄 Opnieuw', replayBtn.x + replayBtn.w/2, replayBtn.y + replayBtn.h/2 + 2);
}

function drawParticles() {
  particles.forEach(p => {
    ctx.save();
    ctx.globalAlpha = p.life;
    ctx.fillStyle = p.color;
    ctx.translate(p.x, p.y);
    ctx.rotate(p.rot);
    if (p.type === 0) {
      ctx.beginPath(); ctx.arc(0, 0, p.r, 0, Math.PI*2); ctx.fill();
    } else if (p.type === 1) {
      ctx.fillRect(-p.r/2, -p.r/2, p.r, p.r);
    } else {
      // Mini star
      ctx.beginPath();
      for (let i = 0; i < 5; i++) {
        const a = (i * 4 * Math.PI / 5) - Math.PI/2;
        const b = a + Math.PI/5;
        if (i===0) ctx.moveTo(Math.cos(a)*p.r, Math.sin(a)*p.r);
        else ctx.lineTo(Math.cos(a)*p.r, Math.sin(a)*p.r);
        ctx.lineTo(Math.cos(b)*p.r*0.4, Math.sin(b)*p.r*0.4);
      }
      ctx.closePath(); ctx.fill();
    }
    ctx.restore();
  });
}

// ─── Update ───────────────────────────────────────────────────────────────────
function update() {
  animFrame++;
  if (phase === 'question') balls.forEach(b => b.update());
  particles.forEach(p => {
    p.x += p.vx; p.y += p.vy; p.vy += 0.2;
    p.rot += p.rotV;
    p.life -= 0.018;
  });
  particles = particles.filter(p => p.life > 0);
}

// ─── Render ───────────────────────────────────────────────────────────────────
function render() {
  update();
  ctx.clearRect(0, 0, 390, 700);
  if      (phase === 'start')    drawStartScreen();
  else if (phase === 'question') drawQuestion();
  else if (phase === 'feedback') drawFeedback();
  else if (phase === 'end')      drawEndScreen();
  requestAnimationFrame(render);
}

// ─── Input ───────────────────────────────────────────────────────────────────
function getPos(e) {
  const rect = canvas.getBoundingClientRect();
  const scaleX = canvas.width / rect.width;
  const scaleY = canvas.height / rect.height;
  if (e.touches) {
    return { x: (e.touches[0].clientX - rect.left)*scaleX, y: (e.touches[0].clientY - rect.top)*scaleY };
  }
  return { x: (e.clientX - rect.left)*scaleX, y: (e.clientY - rect.top)*scaleY };
}

function inRect(pos, r) {
  return pos.x >= r.x && pos.x <= r.x+r.w && pos.y >= r.y && pos.y <= r.y+r.h;
}

function handleTap(pos) {
  if (phase === 'start') {
    if (inRect(pos, startBtn)) { score = 0; round = 1; newRound(); }
    return;
  }

  if (phase === 'question') {
    // Check balls (in reverse so top-drawn ball wins)
    for (let i = balls.length - 1; i >= 0; i--) {
      const b = balls[i];
      if (Math.hypot(pos.x - b.x, pos.y - b.y) < b.r + 10) {
        feedbackCorrect = b.isCorrect;
        if (feedbackCorrect) {
          score++;
          spawnParticles(b.x, b.y);
          spawnParticles(195, 380);
        } else {
          // Wrong — small wrong-color burst
          for (let j = 0; j < 8; j++) {
            const angle = Math.random() * Math.PI * 2;
            particles.push({
              x: b.x, y: b.y,
              vx: Math.cos(angle) * 3,
              vy: Math.sin(angle) * 3,
              r: 5, color: '#ff4444', life: 0.8,
              rot: 0, rotV: 0, type: 0
            });
          }
        }
        phase = 'feedback';
        if (feedbackTimer) clearTimeout(feedbackTimer);
        feedbackTimer = setTimeout(() => {
          if (round >= TOTAL_ROUNDS) {
            phase = 'end';
            spawnParticles(195, 350);
          } else {
            round++;
            newRound();
          }
        }, 1600);
        return;
      }
    }
  }

  if (phase === 'end') {
    if (inRect(pos, replayBtn)) { score = 0; round = 1; newRound(); }
  }
}

canvas.onclick = function(e) { handleTap(getPos(e)); };
canvas.ontouchstart = function(e) { e.preventDefault(); handleTap(getPos(e)); };

// ─── Boot ─────────────────────────────────────────────────────────────────────
render();
</script>
</body>
</html>
