// ── Audio ─────────────────────────────────────────────────────────────────────
let ac = null;
function getAC(){
  if(!ac){ ac = new (window.AudioContext || window.webkitAudioContext)(); }
  if(ac.state==='suspended') ac.resume();
  return ac;
}
function tone(freq, t0, dur, vol, type){
  type=type||'sine'; vol=vol||0.28;
  const a=getAC();
  const o=a.createOscillator(); const g=a.createGain();
  o.connect(g); g.connect(a.destination);
  o.type=type; o.frequency.setValueAtTime(freq,t0);
  g.gain.setValueAtTime(0,t0);
  g.gain.linearRampToValueAtTime(vol,t0+0.01);
  g.gain.exponentialRampToValueAtTime(0.001,t0+dur);
  o.start(t0); o.stop(t0+dur+0.05);
}
function playCorrect(){
  const t=getAC().currentTime;
  tone(523.25,t,      0.12,0.28,'triangle');
  tone(659.25,t+0.12, 0.12,0.28,'triangle');
  tone(880.00,t+0.24, 0.12,0.28,'triangle');
  tone(1046.5, t+0.36, 0.28,0.38,'triangle');
}
function playWrong(){
  const t=getAC().currentTime;
  tone(220,t,     0.12,0.2,'sine');
  tone(196,t+0.12,0.22,0.2,'sine');
}
function playTick(){
  tone(528, getAC().currentTime, 0.05, 0.16, 'square');
}

  if(!window.speechSynthesis) return;
  speechSynthesis.cancel();
  const u = new SpeechSynthesisUtterance(word);
  u.lang = 'nl-NL'; u.rate = 0.85; u.pitch = 1.1;
  speechSynthesis.speak(u);
}

// ── Draw blob ─────────────────────────────────────────────────────────────────
function drawBlob(col, cx2, cy2, blobSc, alpha, wobbleAng){
  alpha = (alpha===undefined) ? 1 : alpha;
  wobbleAng = wobbleAng || 0;
  const bs = blobSc || 1.0;
  const def = col.blob;
  const hex = col.hex, hex2 = col.hex2;

  ctx.save();
  ctx.globalAlpha = alpha;
  ctx.translate(cx2, cy2);
  if(wobbleAng !== 0) ctx.rotate(Math.sin(wobbleAng)*0.08);

  // gradient fill
  const g = ctx.createRadialGradient(-10*bs, -20*bs, 10*bs, 0, 0, 100*bs);
  g.addColorStop(0, hex);
  g.addColorStop(0.7, hex);
  g.addColorStop(1, hex2);

  // outer paint shadow
  ctx.shadowColor = hex2 + 'cc';
  ctx.shadowBlur  = 18;
  ctx.shadowOffsetX = 4;
  ctx.shadowOffsetY = 6;

  // build blob path from 4 bezier segments
  ctx.beginPath();
  // start point = last end point scaled
  const sx = def[def.length-1][4]*bs;
  const sy = def[def.length-1][5]*bs;
  ctx.moveTo(sx, sy);
  for(const seg of def){
    ctx.bezierCurveTo(
      seg[0]*bs, seg[1]*bs,
      seg[2]*bs, seg[3]*bs,
      seg[4]*bs, seg[5]*bs
    );
  }
  ctx.closePath();
  ctx.fillStyle = g;
  ctx.fill();

  // white border
  ctx.shadowColor='transparent';
  ctx.strokeStyle = 'rgba(255,255,255,0.6)';
  ctx.lineWidth   = 3;
  ctx.stroke();

  // glossy specular highlight (top-left)
  ctx.save();
  ctx.beginPath();
  ctx.arc(-28*bs, -35*bs, 22*bs, 0, Math.PI*2);
  const glos = ctx.createRadialGradient(-28*bs,-35*bs,2*bs,-28*bs,-35*bs,22*bs);
  glos.addColorStop(0,'rgba(255,255,255,0.55)');
  glos.addColorStop(1,'rgba(255,255,255,0)');
  ctx.fillStyle = glos;
  ctx.fill();
  ctx.restore();

  // paint drips
  ctx.shadowColor='transparent';
  for(const d of col.drips){
    // teardrop: start at bx/by, bulge downward, end at ex/ey with round cap
    const r2 = d.r * bs;
    const bx2 = d.bx*bs, by2=d.by*bs;
    const ex2 = d.ex*bs, ey2=d.ey*bs;
    const cp1x= d.cx2*bs - r2*0.6, cp1y=d.cy2*bs;
    const cp2x= d.cx2*bs + r2*0.6, cp2y=d.cy2*bs;

    ctx.beginPath();
    ctx.moveTo(bx2-r2*0.7, by2);
    ctx.bezierCurveTo(bx2-r2*1.1, by2+8*bs, cp1x, cp1y, ex2, ey2);
    ctx.bezierCurveTo(cp2x, cp2y, bx2+r2*1.1, by2+8*bs, bx2+r2*0.7, by2);
    ctx.closePath();
    ctx.fillStyle = hex;
    ctx.fill();
    ctx.strokeStyle='rgba(255,255,255,0.4)';
    ctx.lineWidth=2;
    ctx.stroke();
    // teardrop bottom circle
    ctx.beginPath(); ctx.arc(ex2, ey2, r2*0.7, 0, Math.PI*2);
    ctx.fillStyle=hex; ctx.fill();
  }

  ctx.restore();
}

// ── Helper: rounded rect ──────────────────────────────────────────────────────
function roundRect(x, y, w, h, r){
  ctx.beginPath();
  ctx.moveTo(x+r,y);
  ctx.lineTo(x+w-r,y);
  ctx.quadraticCurveTo(x+w,y, x+w,y+r);
  ctx.lineTo(x+w,y+h-r);
  ctx.quadraticCurveTo(x+w,y+h, x+w-r,y+h);
  ctx.lineTo(x+r,y+h);
  ctx.quadraticCurveTo(x,y+h, x,y+h-r);
  ctx.lineTo(x,y+r);
  ctx.quadraticCurveTo(x,y, x+r,y);
  ctx.closePath();
}

// ── Particles ─────────────────────────────────────────────────────────────────
let particles = [];
function spawnParticles(ox, oy, col){
  const colors = [col.hex, col.hex2, '#FFD700', '#FFFFFF', '#FF80AB', '#B2FF59'];
  for(let i=0;i<55;i++){
    const ang = Math.random()*Math.PI*2;
    const spd = 2.5+Math.random()*5.5;
    particles.push({
      x:ox, y:oy, vx:Math.cos(ang)*spd, vy:Math.sin(ang)*spd-2.5,
      r: 2.5+Math.random()*5,
      col: colors[Math.floor(Math.random()*colors.length)],
      life:1, decay:0.016+Math.random()*0.018,
    });
  }
}

let wobbleT  = 0, isWobbling = false;
let hoverBtn = -1;
let startBtn = null, endBtn = null, hearBtn = null;
let startPulse = 0;

function shuffle(a){ for(let i=a.length-1;i>0;i--){ const j=Math.floor(Math.random()*(i+1)); [a[i],a[j]]=[a[j],a[i]]; } return a; }

function nextRound(){
  round++;
  if(round>TOTAL){ state='end'; return; }
  curColor = COLORS[Math.floor(Math.random()*COLORS.length)];
  const others = shuffle(COLORS.filter(c=>c.id!==curColor.id));
  choices = shuffle([curColor, others[0], others[1]]);
  buttons = choices.map((col,i)=>{
    const bw=295,bh=58;
    return {x:BASE_W/2-bw/2, y:498+i*66, w:bw, h:bh, col, ci:i};
  });

  hearBtn = {x:BASE_W/2-68, y:445, w:136, h:42};
  state='playing';
  bounceT=0; celebT=0; shakeT=0; shakeX=0;
  wobbleT=0; isWobbling=false;
  particles=[];
}

  // easel-like central panel
  ctx.save();
  ctx.shadowColor='rgba(0,0,0,0.12)'; ctx.shadowBlur=20; ctx.shadowOffsetY=4;
  roundRect(BASE_W/2-150, 100, 300, 310, 18);
  ctx.fillStyle='#FFFDE7'; ctx.fill();
  ctx.shadowColor='transparent';
  ctx.strokeStyle='#D7CCC8'; ctx.lineWidth=2.5;
  ctx.stroke();
  ctx.restore();

  // easel legs
  ctx.save();
  ctx.strokeStyle='#A1887F'; ctx.lineWidth=7; ctx.lineCap='round';
  // left leg
  ctx.beginPath(); ctx.moveTo(BASE_W/2-150,410); ctx.lineTo(BASE_W/2-175,490); ctx.stroke();
  // right leg
  ctx.beginPath(); ctx.moveTo(BASE_W/2+150,410); ctx.lineTo(BASE_W/2+175,490); ctx.stroke();
  // shelf
  ctx.strokeStyle='#BCAAA4'; ctx.lineWidth=6;
  ctx.beginPath(); ctx.moveTo(BASE_W/2-162,382); ctx.lineTo(BASE_W/2+162,382); ctx.stroke();
  ctx.restore();
}

// ── GAME screen ───────────────────────────────────────────────────────────────
function easeOutBounce(t){
  if(t<1/2.75)      return 7.5625*t*t;
  if(t<2/2.75)      return 7.5625*(t-=1.5/2.75)*t+0.75;
  if(t<2.5/2.75)    return 7.5625*(t-=2.25/2.75)*t+0.9375;
                    return 7.5625*(t-=2.625/2.75)*t+0.984375;
}

function drawGame(dt){
  drawBg();

  // progress stars
  const sp=32, sx0=BASE_W/2-((TOTAL-1)*sp)/2;
  for(let i=0;i<TOTAL;i++){
    const filled=i<score;
    ctx.save(); ctx.textAlign='center';
    ctx.font = filled?'24px Arial':'20px Arial';
    ctx.fillStyle = filled?'#FFB300':(i===round-1?'#FFE082':'#BDBDBD');
    ctx.shadowColor = filled?'#FFD600':'transparent';
    ctx.shadowBlur  = filled?10:0;
    ctx.fillText(filled?'\u2605':'\u2606', sx0+i*sp, 36);
    ctx.restore();
  }

  // round
  ctx.save(); ctx.textAlign='center'; ctx.fillStyle='rgba(93,64,55,0.7)';
  ctx.font='21px Arial';
  ctx.fillText('Ronde '+round+' / '+TOTAL, BASE_W/2, 68);
  ctx.restore();

  // question
  ctx.save(); ctx.textAlign='center';
  ctx.shadowColor='rgba(0,0,0,0.15)'; ctx.shadowBlur=4; ctx.shadowOffsetY=2;
  ctx.fillStyle='#5D4037';
  ctx.font='bold 27px Arial';
  ctx.fillText('Welke kleur is dit?', BASE_W/2, 105);
  ctx.restore();

  // animate blob scale
  bounceT += dt*0.055;
  const bsc = bounceT<1 ? (0.12 + 0.88*easeOutBounce(Math.min(bounceT,1))) : 1;

  if(state==='wrong' && shakeT<20){
    shakeT+=dt;
    shakeX=Math.sin(shakeT*1.3)*12*(1-shakeT/20);
    if(shakeT>=20){ shakeX=0; shakeT=0; state='playing'; }
  }

  let celebSc=1, wobAng=0;
  if(state==='correct'){
    celebT+=dt;
    celebSc=1+Math.sin(celebT*0.23)*0.06;
    if(celebT>62){ state='playing'; nextRound(); }
  }
  if(isWobbling){
    wobbleT+=dt*0.18;
    wobAng=wobbleT;
    if(wobbleT>12) isWobbling=false;
  }

  // particles
  for(let i=particles.length-1;i>=0;i--){
    const p=particles[i];
    p.x+=p.vx; p.y+=p.vy; p.vy+=0.2; p.life-=p.decay;
    if(p.life<=0){ particles.splice(i,1); continue; }
    ctx.save(); ctx.globalAlpha=p.life;
    ctx.fillStyle=p.col;
    ctx.beginPath(); ctx.arc(p.x,p.y,p.r,0,Math.PI*2); ctx.fill();
    ctx.restore();
  }

  const scx=BASE_W/2, scy=265;
  ctx.save();
  ctx.translate(scx+shakeX, scy); ctx.scale(bsc*celebSc, bsc*celebSc); ctx.translate(-scx,-scy);
  drawBlob(curColor, scx, scy, 1.0, 1.0, wobAng);
  ctx.restore();

  if(state==='correct'){
    ctx.save(); ctx.textAlign='center';
    ctx.shadowColor=curColor.hex; ctx.shadowBlur=18;
    ctx.fillStyle=curColor.hex2;
    ctx.font='bold 34px Arial';
    ctx.fillText(curColor.label+'!', scx, scy+145);
    ctx.restore();
  }

  // "Hoe zeg je dit?" button
  ctx.save();
  ctx.shadowColor='rgba(0,0,0,0.15)'; ctx.shadowBlur=8; ctx.shadowOffsetY=3;
  roundRect(hearBtn.x, hearBtn.y, hearBtn.w, hearBtn.h, 21);
  const hg=ctx.createLinearGradient(hearBtn.x,hearBtn.y,hearBtn.x+hearBtn.w,hearBtn.y+hearBtn.h);
  hg.addColorStop(0,'#7E57C2'); hg.addColorStop(1,'#4527A0');
  ctx.fillStyle=hg; ctx.fill();
  ctx.shadowBlur=0;
  ctx.fillStyle='rgba(255,255,255,0.22)';
  roundRect(hearBtn.x+5,hearBtn.y+4,hearBtn.w-10,hearBtn.h*0.42,14);
  ctx.fill();
  ctx.fillStyle='#fff'; ctx.textAlign='center';
  ctx.font='bold 19px Arial';
  ctx.fillText('Hoe zeg je dit?', BASE_W/2, hearBtn.y+28);
  ctx.restore();

  // answer buttons
  for(let i=0;i<buttons.length;i++){
    const btn=buttons[i];
    const pal=BTN_PALETTE[btn.ci];
    const isHov=hoverBtn===i;
    const yo=isHov?2:0;
    ctx.save();
    ctx.shadowColor=pal.top; ctx.shadowBlur=isHov?22:12; ctx.shadowOffsetY=isHov?5:2;
    const g3=ctx.createLinearGradient(btn.x,btn.y+yo,btn.x,btn.y+yo+btn.h);
    g3.addColorStop(0,pal.top); g3.addColorStop(1,pal.bot);
    roundRect(btn.x,btn.y+yo,btn.w,btn.h,29);
    ctx.fillStyle=g3; ctx.fill();
    ctx.shadowBlur=0;
    ctx.fillStyle='rgba(255,255,255,0.22)';
    roundRect(btn.x+5,btn.y+yo+5,btn.w-10,btn.h*0.4,16);
    ctx.fill();
    ctx.textAlign='center'; ctx.fillStyle=pal.text;
    ctx.font='bold 24px Arial';
    ctx.shadowColor='rgba(0,0,0,0.3)'; ctx.shadowBlur=4;
    ctx.fillText(btn.col.label, btn.x+btn.w/2, btn.y+yo+38);
    ctx.restore();
  }
}

// ── Main loop ─────────────────────────────────────────────────────────────────
let lastTs=0;
function loop(ts){
  const dt=Math.min((ts-lastTs)/16.67,3);
  lastTs=ts;
  ctx.clearRect(0,0,BASE_W,BASE_H);
  if(state==='start')     drawStart();
  else if(state==='end')  drawEnd();
  else                    drawGame(dt);
  requestAnimationFrame(loop);
}
requestAnimationFrame(loop);

// ── Input ─────────────────────────────────────────────────────────────────────
function toLogical(e){
  const rect=canvas.getBoundingClientRect();
  let cx,cy;
  if(e.touches&&e.touches.length>0){ cx=e.touches[0].clientX; cy=e.touches[0].clientY; }
  else { cx=e.clientX; cy=e.clientY; }
  return {x:(cx-rect.left)/scale, y:(cy-rect.top)/scale};
}
function hit(r,px,py){ return px>=r.x&&px<=r.x+r.w&&py>=r.y&&py<=r.y+r.h; }

canvas.addEventListener('click', e=>{
  getAC();
  const p=toLogical(e);
  if(state==='start'){
    if(startBtn&&hit(startBtn,p.x,p.y)){ playTick(); score=0; round=0; nextRound(); }
    return;
  }
  if(state==='end'){
    if(endBtn&&hit(endBtn,p.x,p.y)){ playTick(); score=0; round=0; nextRound(); }
    return;
  }
  if(state!=='playing'&&state!=='correct'&&state!=='wrong') return;

  // hear button
  if(hearBtn&&hit(hearBtn,p.x,p.y)){
    playTick();
    speak(curColor.label.toLowerCase());
    isWobbling=true; wobbleT=0;
    return;
  }

  if(state!=='playing') return;
  for(let i=0;i<buttons.length;i++){
    const b=buttons[i];
    if(hit({x:b.x,y:b.y,w:b.w,h:b.h},p.x,p.y)){
      playTick();
      if(b.col.id===curColor.id){
        score++;
        playCorrect();
        spawnParticles(BASE_W/2,265,curColor);
        state='correct'; celebT=0;
        // also speak the correct color
        setTimeout(()=>speak(curColor.label.toLowerCase()),300);
      } else {
        playWrong();
        state='wrong'; shakeT=0.01;
      }
      return;
    }
  }
});

canvas.addEventListener('mousemove', e=>{
  if(state!=='playing'){ hoverBtn=-1; return; }
  const p=toLogical(e);
  hoverBtn=-1;
  for(let i=0;i<buttons.length;i++){
    const b=buttons[i];
    if(hit({x:b.x,y:b.y,w:b.w,h:b.h},p.x,p.y)){ hoverBtn=i; break; }
  }
});

canvas.addEventListener('touchstart', e=>e.preventDefault(), {passive:false});

})();
</script>
