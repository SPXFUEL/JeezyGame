<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Alfabet - Letters Leren</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #0d0520;
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 100vh;
    overflow: hidden;
  }
  canvas { display: block; touch-action: none; cursor: pointer; }
</style>
</head>
<body>
<canvas id="game"></canvas>
<script>
const canvas = document.getElementById('game');
const ctx = canvas.getContext('2d');
const W = 390, H = 700;
let scale = 1;

function resize() {
  scale = Math.min(window.innerWidth / W, window.innerHeight / H);
  canvas.width = W * scale;
  canvas.height = H * scale;
  ctx.setTransform(scale, 0, 0, scale, 0, 0);
}
resize();
window.addEventListener('resize', resize);

// ───── WORD DATA ─────
const WORDS = {
  A:['appel','aap','acht','auto'],
  B:['bal','beer','boot','boom'],
  C:['cirkel','cola','cactus','camera'],
  D:['deur','dier','drie','dag'],
  E:['ei','elf','emmer','eend'],
  F:['fiets','foto','fruit','fluiten'],
  G:['geel','geit','groot','gras'],
  H:['huis','hond','hart','hoed'],
  I:['ijsbeer','inkt','iglo','ijzer'],
  J:['ja','jaar','jas','juf'],
  K:['kat','koe','kip','kan'],
  L:['lamp','lief','lopen','leeuw'],
  M:['maan','muis','meer','molen'],
  N:['negen','neus','noot','nest'],
  O:['olifant','oor','open','oker'],
  P:['paard','peer','pop','pen'],
  Q:['quiz','quilt','queen','quick'],
  R:['rood','regen','roos','ring'],
  S:['slang','ster','soep','steen'],
  T:['tafel','tien','tijger','tuin'],
  U:['uil','ui','uur','ufo'],
  V:['vis','vlieg','voor','vuur'],
  W:['water','wind','wolf','wortel'],
  X:['xylofoon','xenon','x-mas','x-ray'],
  Y:['yoga','yoghurt','yacht','yeti'],
  Z:['zon','zeven','zee','zwaan'],
};
const LETTERS = Object.keys(WORDS);

const LC = [
  '#FF4444','#FF8800','#FFD700','#88CC00','#00CC66',
  '#00BBDD','#4488FF','#8855FF','#FF44AA','#FF6633',
  '#33BBAA','#AA44FF','#FF8844','#44AAFF','#FFCC00',
  '#FF5588','#55CC44','#FFAA33','#6655FF','#FF3388',
  '#33DDBB','#FF7733','#5577FF','#AADD00','#FF55BB','#44CCFF'
];
const BTN_COLORS = ['#E84393','#FF7A00','#00C8A0','#7B5CF5'];

// ───── AUDIO ─────
let AC = null;
function ac() { if (!AC) AC = new (window.AudioContext||window.webkitAudioContext)(); return AC; }
function tone(freq, dur, type='sine', vol=0.3) {
  try {
    const a=ac(), o=a.createOscillator(), g=a.createGain();
    o.connect(g); g.connect(a.destination);
    o.type=type; o.frequency.value=freq;
    g.gain.setValueAtTime(vol,a.currentTime);
    g.gain.exponentialRampToValueAtTime(0.001,a.currentTime+dur);
    o.start(); o.stop(a.currentTime+dur);
  } catch(e){}
}
function sndCorrect() {
  tone(523,.1); setTimeout(()=>tone(659,.1),110);
  setTimeout(()=>tone(784,.1),220); setTimeout(()=>tone(1047,.25),330);
}
function sndWrong() {
  tone(200,.08,'sawtooth',.2); setTimeout(()=>tone(160,.15,'sawtooth',.15),90);
}
function sndClick() { tone(880,.06,'sine',.12); }
function speak(txt) {
  try {
    window.speechSynthesis.cancel();
    const u=new SpeechSynthesisUtterance(txt);
    u.lang='nl-NL'; u.rate=0.85; u.pitch=1.1;
    window.speechSynthesis.speak(u);
  } catch(e){}
}

// ───── HELPERS ─────
function roundRect(x,y,w,h,r) {
  ctx.beginPath();
  ctx.moveTo(x+r,y);
  ctx.lineTo(x+w-r,y); ctx.quadraticCurveTo(x+w,y,x+w,y+r);
  ctx.lineTo(x+w,y+h-r); ctx.quadraticCurveTo(x+w,y+h,x+w-r,y+h);
  ctx.lineTo(x+r,y+h); ctx.quadraticCurveTo(x,y+h,x,y+h-r);
  ctx.lineTo(x,y+r); ctx.quadraticCurveTo(x,y,x+r,y);
  ctx.closePath();
}
function drawStar(cx,cy,outerR,points,color,alpha=1) {
  ctx.save(); ctx.globalAlpha=alpha;
  ctx.beginPath();
  for (let i=0;i<points*2;i++) {
    const a=(i/(points*2))*Math.PI*2-Math.PI/2;
    const r=i%2===0?outerR:outerR*.45;
    i===0?ctx.moveTo(cx+Math.cos(a)*r,cy+Math.sin(a)*r):ctx.lineTo(cx+Math.cos(a)*r,cy+Math.sin(a)*r);
  }
  ctx.closePath(); ctx.fillStyle=color; ctx.fill(); ctx.restore();
}
function lerpCol(hex,pct) {
  const parse=h=>[parseInt(h.slice(1,3),16),parseInt(h.slice(3,5),16),parseInt(h.slice(5,7),16)];
  const c=parse(hex);
  return `rgb(${Math.min(255,c[0]+pct)},${Math.min(255,c[1]+pct)},${Math.min(255,c[2]+pct)})`;
}

// ───── SPARKLES ─────
let sparks=[];
function spawnSparks(cx,cy,n=12) {
  for (let i=0;i<n;i++) {
    const a=Math.random()*Math.PI*2, sp=.8+Math.random()*2;
    sparks.push({x:cx+(Math.random()-.5)*80,y:cy+(Math.random()-.5)*50,
      vx:Math.cos(a)*sp,vy:Math.sin(a)*sp-.8,life:1,
      sz:2+Math.random()*3,col:LC[Math.floor(Math.random()*LC.length)]});
  }
}
function tickSparks() {
  sparks=sparks.filter(s=>s.life>0);
  for (const s of sparks){s.x+=s.vx;s.y+=s.vy;s.vy+=.03;s.life-=.016;}
}
function drawSparks() {
  for (const s of sparks) {
    ctx.save(); ctx.globalAlpha=s.life;
    ctx.fillStyle=s.col;
    ctx.beginPath(); ctx.arc(s.x,s.y,s.sz,0,Math.PI*2); ctx.fill();
    ctx.strokeStyle=s.col; ctx.lineWidth=.8;
    for (let i=0;i<4;i++){
      const a=(i/4)*Math.PI*2;
      ctx.beginPath();
      ctx.moveTo(s.x-Math.cos(a)*s.sz*2.2,s.y-Math.sin(a)*s.sz*2.2);
      ctx.lineTo(s.x+Math.cos(a)*s.sz*2.2,s.y+Math.sin(a)*s.sz*2.2);
      ctx.stroke();
    }
    ctx.restore();
  }
}

// ───── BG STARS ─────
const bgStars=Array.from({length:55},()=>({
  x:Math.random()*W,y:Math.random()*H,r:.4+Math.random()*1.2,
  t:Math.random()*Math.PI*2,sp:.018+Math.random()*.025
}));
function drawBG() {
  const g=ctx.createLinearGradient(0,0,0,H);
  g.addColorStop(0,'#0d0520'); g.addColorStop(1,'#1a0a2e');
  ctx.fillStyle=g; ctx.fillRect(0,0,W,H);
  for (const s of bgStars){
    s.t+=s.sp;
    ctx.beginPath(); ctx.arc(s.x,s.y,s.r,0,Math.PI*2);
    ctx.fillStyle=`rgba(255,255,255,${.2+.6*Math.abs(Math.sin(s.t))})`;
    ctx.fill();
  }
}

// ───── LETTER CARD ─────
function drawLetterCard(letter,y,spinAng,colorIdx) {
  const cx=W/2, col=LC[colorIdx%LC.length];
  ctx.save(); ctx.translate(cx,y); ctx.rotate(spinAng);
  // shadow card
  ctx.shadowColor='rgba(0,0,0,.5)'; ctx.shadowBlur=20; ctx.shadowOffsetY=6;
  const g=ctx.createRadialGradient(0,0,10,0,0,110);
  g.addColorStop(0,'#2a1a4e'); g.addColorStop(1,'#150830');
  roundRect(-90,-80,180,160,22); ctx.fillStyle=g; ctx.fill();
  ctx.shadowBlur=0; ctx.shadowOffsetY=0;
  // glow border
  ctx.shadowColor=col; ctx.shadowBlur=22;
  ctx.strokeStyle=col; ctx.lineWidth=3; ctx.stroke();
  ctx.shadowBlur=0;
  // inner corner accents
  ctx.strokeStyle=lerpCol(col,40); ctx.lineWidth=1.5; ctx.globalAlpha=.4;
  for (let i=0;i<4;i++) {
    const sx=[-78,-78,62,62][i],sy=[-68,52,-68,52][i];
    ctx.strokeRect(sx,sy,16,16);
  }
  ctx.globalAlpha=1;
  // 3D letter
  ctx.font='bold 155px Arial'; ctx.textAlign='center'; ctx.textBaseline='middle';
  // shadow layer
  ctx.fillStyle=`rgba(0,0,0,.45)`; ctx.fillText(letter,5,6);
  // dark offset
  const [rr,gg,bb]=[parseInt(col.slice(1,3),16),parseInt(col.slice(3,5),16),parseInt(col.slice(5,7),16)];
  ctx.fillStyle=`rgb(${Math.max(0,rr-80)},${Math.max(0,gg-80)},${Math.max(0,bb-80)})`;
  ctx.fillText(letter,4,4);
  // main color
  ctx.fillStyle=col; ctx.fillText(letter,0,0);
  // highlight
  ctx.fillStyle='rgba(255,255,255,.22)'; ctx.fillText(letter,-1,-2);
  ctx.restore();
}

// ───── BUTTONS ─────
let hitBoxes=[];
function drawBtn(i,word,cy,status) {
  const bx=28,bw=W-56,bh=60,by=cy-bh/2;
  let bg=BTN_COLORS[i%4], tc='#fff';
  if (status==='correct'){bg='#22CC66';}
  if (status==='wrong'){bg='#CC2244';}
  if (status==='dim'){bg='#44446A';tc='#9999BB';}
  ctx.save();
  ctx.shadowColor='rgba(0,0,0,.4)'; ctx.shadowBlur=8; ctx.shadowOffsetY=4;
  const g=ctx.createLinearGradient(bx,by,bx,by+bh);
  g.addColorStop(0,lerpCol(bg,35)); g.addColorStop(1,bg);
  roundRect(bx,by,bw,bh,18); ctx.fillStyle=g; ctx.fill();
  ctx.shadowBlur=0; ctx.shadowOffsetY=0;
  // shine
  ctx.save(); roundRect(bx,by,bw,bh,18); ctx.clip();
  ctx.fillStyle='rgba(255,255,255,.13)'; ctx.fillRect(bx,by,bw,bh/2);
  ctx.restore();
  // text
  ctx.fillStyle=tc; ctx.font='bold 24px Arial';
  ctx.textAlign='center'; ctx.textBaseline='middle';
  ctx.fillText(word.charAt(0).toUpperCase()+word.slice(1),W/2,cy);
  ctx.restore();
  hitBoxes[i]={x:bx,y:by,w:bw,h:bh};
}

// ───── GAME STATE ─────
let screen='start'; // start | game | end
let round=0, score=0;
let curLetter='', curColorIdx=0;
let roundWords=[], correctIdx=0, chosen=-1;
let letY=-100, letTargY=195, letSpinAng=0, letSpinning=false;
let btnY=[0,0,0,0], btnTargY=[0,0,0,0];
let fbTimer=0;
const TOTAL=10;
let endAnim=0;
let startBtnHit={x:W/2-110,y:390,w:220,h:60};

function pickRound() {
  const li=Math.floor(Math.random()*LETTERS.length);
  curLetter=LETTERS[li]; curColorIdx=li;
  const pool=WORDS[curLetter];
  const correct=pool[Math.floor(Math.random()*pool.length)];
  const wrongs=[];
  const others=LETTERS.filter(l=>l!==curLetter);
  while (wrongs.length<3) {
    const wl=others[Math.floor(Math.random()*others.length)];
    const wp=WORDS[wl];
    const ww=wp[Math.floor(Math.random()*wp.length)];
    if (!wrongs.includes(ww)&&ww!==correct) wrongs.push(ww);
  }
  const opts=[correct,...wrongs];
  for (let i=opts.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[opts[i],opts[j]]=[opts[j],opts[i]];}
  correctIdx=opts.indexOf(correct);
  const baseY=340;
  btnTargY=opts.map((_,i)=>baseY+i*76);
  btnY=btnTargY.map(()=>H+100);
  hitBoxes=new Array(4).fill(null);
  return opts;
}

function startRound() {
  roundWords=pickRound();
  chosen=-1; fbTimer=0; screen='game';
  letY=-100; letSpinning=true; letSpinAng=0;
  setTimeout(()=>spawnSparks(W/2,letTargY,10),650);
  speak(curLetter);
}

function afterFeedback() {
  round++;
  if (round>=TOTAL){screen='end';endAnim=0;speak('Geweldig gedaan!');}
  else startRound();
}

// ───── DRAW START ─────
function drawStart() {
  drawBG();
  // floating decorative letters
  const decs='ABCDE';
  for (let i=0;i<5;i++){
    const ang=Date.now()*.001+i*1.25;
    const x=40+i*75+Math.sin(ang)*.5;
    const y=580+Math.sin(ang)*12;
    ctx.globalAlpha=.5+.3*Math.sin(ang);
    ctx.fillStyle=LC[i*4];
    ctx.font='bold 28px Arial';
    ctx.textAlign='center'; ctx.textBaseline='middle';
    ctx.fillText(decs[i],x,y);
    ctx.globalAlpha=1;
  }
  // title card
  ctx.save();
  const cg=ctx.createLinearGradient(35,110,355,290);
  cg.addColorStop(0,'#2a0d5e'); cg.addColorStop(1,'#1a0840');
  roundRect(35,110,W-70,190,26); ctx.fillStyle=cg; ctx.fill();
  ctx.strokeStyle='#8855FF'; ctx.lineWidth=2.5; ctx.stroke();
  ctx.restore();
  // big A B C behind title
  ctx.globalAlpha=.12; ctx.font='bold 90px Arial'; ctx.textAlign='center'; ctx.textBaseline='middle';
  ctx.fillStyle=LC[0]; ctx.fillText('A',75,180);
  ctx.fillStyle=LC[1]; ctx.fillText('B',W-75,180);
  ctx.fillStyle=LC[2]; ctx.fillText('C',W/2,258);
  ctx.globalAlpha=1;
  // title
  ctx.fillStyle='#FFFFFF'; ctx.font='bold 52px Arial';
  ctx.textAlign='center'; ctx.textBaseline='middle';
  ctx.shadowColor='#8855FF'; ctx.shadowBlur=22;
  ctx.fillText('ALFABET',W/2,175); ctx.shadowBlur=0;
  ctx.fillStyle='#BB99FF'; ctx.font='18px Arial';
  ctx.fillText('Leer letters en woorden!',W/2,238);
  // star row
  for (let i=0;i<5;i++) drawStar(65+i*64,325,11,5,LC[i*4+2]);
  // start button
  ctx.save();
  const bg1=ctx.createLinearGradient(W/2-110,390,W/2+110,450);
  bg1.addColorStop(0,'#7B5CF5'); bg1.addColorStop(1,'#FF44AA');
  ctx.shadowColor='#FF44AA'; ctx.shadowBlur=18;
  roundRect(W/2-110,390,220,60,30); ctx.fillStyle=bg1; ctx.fill();
  ctx.shadowBlur=0;
  ctx.save(); roundRect(W/2-110,390,220,60,30); ctx.clip();
  ctx.fillStyle='rgba(255,255,255,.15)'; ctx.fillRect(W/2-110,390,220,30); ctx.restore();
  ctx.fillStyle='#FFF'; ctx.font='bold 28px Arial';
  ctx.textAlign='center'; ctx.textBaseline='middle';
  ctx.fillText('SPELEN!',W/2,420);
  ctx.restore();
  ctx.fillStyle='#9988BB'; ctx.font='15px Arial';
  ctx.textAlign='center'; ctx.textBaseline='middle';
  ctx.fillText('10 rondes  |  Leeftijd 4-5',W/2,482);
  startBtnHit={x:W/2-110,y:390,w:220,h:60};
}

// ───── DRAW GAME ─────
function drawGame() {
  drawBG(); tickSparks(); drawSparks();
  // progress bar
  const pct=round/TOTAL;
  ctx.fillStyle='rgba(255,255,255,.1)'; roundRect(28,28,W-56,12,6); ctx.fill();
  if (pct>0){ctx.fillStyle='#7B5CF5'; roundRect(28,28,(W-56)*pct,12,6); ctx.fill();}
  ctx.fillStyle='#FFD700'; ctx.font='bold 16px Arial';
  ctx.textAlign='right'; ctx.textBaseline='middle';
  ctx.fillText(`${score}/${TOTAL}`,W-28,34);
  ctx.fillStyle='#AAAACC'; ctx.font='14px Arial'; ctx.textAlign='left';
  ctx.fillText(`Ronde ${Math.min(round+1,TOTAL)}`,28,34);
  // instruction
  ctx.fillStyle='#DDEEFF'; ctx.font='bold 17px Arial';
  ctx.textAlign='center'; ctx.textBaseline='middle';
  ctx.fillText('Welk woord begint met deze letter?',W/2,63);
  // animate letter in
  if (letY<letTargY) letY=Math.min(letTargY,letY+13);
  if (letSpinning){
    letSpinAng+=.11;
    if (letSpinAng>=Math.PI*2){letSpinAng=0;letSpinning=false;}
  }
  drawLetterCard(curLetter,letY,letSpinning?Math.sin(letSpinAng)*.28:0,curColorIdx);
  // animate buttons up
  for (let i=0;i<4;i++) {
    if (btnY[i]>btnTargY[i]) btnY[i]=Math.max(btnTargY[i],btnY[i]-18);
  }
  // draw buttons
  for (let i=0;i<roundWords.length;i++){
    let st='normal';
    if (chosen>=0){
      if (i===correctIdx) st='correct';
      else if (i===chosen) st='wrong';
      else st='dim';
    }
    drawBtn(i,roundWords[i],btnY[i],st);
  }
  // feedback
  if (chosen>=0){
    fbTimer++;
    const ok=chosen===correctIdx;
    ctx.fillStyle=ok?'#88FF88':'#FF8888';
    ctx.font='bold 26px Arial'; ctx.textAlign='center'; ctx.textBaseline='middle';
    ctx.fillText(ok?'Heel goed!':'Het woord is: '+roundWords[correctIdx],W/2,634);
    if (fbTimer>95){fbTimer=0;afterFeedback();}
  }
}

// ───── DRAW END ─────
function drawEnd() {
  drawBG(); endAnim+=.04;
  // confetti
  for (let i=0;i<28;i++){
    const x=(Math.sin(endAnim*.6+i*.9)*.5+.5)*W;
    const y=((endAnim*28+i*25)%H);
    const sz=5+(i%4)*3;
    ctx.save(); ctx.translate(x,y); ctx.rotate(endAnim+i*.7);
    ctx.fillStyle=LC[i%LC.length]; ctx.globalAlpha=.85;
    ctx.fillRect(-sz/2,-sz/4,sz,sz/2); ctx.restore();
  }
  // result card
  ctx.save();
  const cg=ctx.createLinearGradient(40,175,360,420);
  cg.addColorStop(0,'#2a0d5e'); cg.addColorStop(1,'#1a0840');
  roundRect(40,175,W-80,250,26); ctx.fillStyle=cg; ctx.fill();
  ctx.strokeStyle='#FFD700'; ctx.lineWidth=3; ctx.stroke();
  ctx.restore();
  ctx.fillStyle='#FFD700'; ctx.font='bold 44px Arial';
  ctx.textAlign='center'; ctx.textBaseline='middle';
  ctx.shadowColor='#FFD700'; ctx.shadowBlur=22;
  ctx.fillText('Klaar!',W/2,256); ctx.shadowBlur=0;
  ctx.fillStyle='#FFF'; ctx.font='bold 28px Arial';
  ctx.fillText(`Score: ${score} / ${TOTAL}`,W/2,316);
  const msg=score>=8?'Uitstekend!':score>=6?'Heel goed!':score>=4?'Goed bezig!':'Blijf oefenen!';
  ctx.fillStyle='#BB99FF'; ctx.font='20px Arial'; ctx.fillText(msg,W/2,365);
  for (let i=0;i<5;i++) drawStar(78+i*58,415,16,5,i<Math.round(score/2)?'#FFD700':'#443366');
  // play again
  ctx.save();
  const bg2=ctx.createLinearGradient(W/2-110,510,W/2+110,570);
  bg2.addColorStop(0,'#7B5CF5'); bg2.addColorStop(1,'#FF44AA');
  ctx.shadowColor='#FF44AA'; ctx.shadowBlur=14;
  roundRect(W/2-110,510,220,58,29); ctx.fillStyle=bg2; ctx.fill();
  ctx.shadowBlur=0;
  ctx.fillStyle='#FFF'; ctx.font='bold 24px Arial';
  ctx.textAlign='center'; ctx.textBaseline='middle';
  ctx.fillText('Opnieuw spelen',W/2,539);
  ctx.restore();
  startBtnHit={x:W/2-110,y:510,w:220,h:58};
}

// ───── INPUT ─────
function hit(px,py){
  const gx=px/scale, gy=py/scale;
  if (screen==='start'){
    const b=startBtnHit;
    if (gx>=b.x&&gx<=b.x+b.w&&gy>=b.y&&gy<=b.y+b.h){sndClick();round=0;score=0;sparks=[];startRound();}
    return;
  }
  if (screen==='end'){
    const b=startBtnHit;
    if (gx>=b.x&&gx<=b.x+b.w&&gy>=b.y&&gy<=b.y+b.h){sndClick();screen='start';sparks=[];}
    return;
  }
  if (screen==='game'&&chosen<0){
    for (let i=0;i<hitBoxes.length;i++){
      const b=hitBoxes[i];
      if (!b) continue;
      if (gx>=b.x&&gx<=b.x+b.w&&gy>=b.y&&gy<=b.y+b.h){
        chosen=i;
        if (i===correctIdx){score++;sndCorrect();spawnSparks(W/2,letTargY,14);speak('Goed zo!');}
        else{sndWrong();speak(roundWords[correctIdx]);}
        break;
      }
    }
  }
}

canvas.onclick=e=>{const r=canvas.getBoundingClientRect();hit(e.clientX-r.left,e.clientY-r.top);};
canvas.addEventListener('touchstart',e=>{
  e.preventDefault();
  const r=canvas.getBoundingClientRect(),t=e.touches[0];
  hit(t.clientX-r.left,t.clientY-r.top);
},{passive:false});

// ───── LOOP ─────
(function loop(){
  ctx.clearRect(0,0,W,H);
  if (screen==='start') drawStart();
  else if (screen==='game') drawGame();
  else drawEnd();
  requestAnimationFrame(loop);
})();
</script>
</body>
</html>
