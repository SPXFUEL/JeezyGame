<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Breukjes Spel</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #1a1a2e;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    height: 100vh;
    overflow: hidden;
    font-family: 'Arial Rounded MT Bold', Arial, sans-serif;
  }
  canvas { display: block; touch-action: none; }
</style>
</head>
<body>
<canvas id="game" width="390" height="700"></canvas>
<script>
const canvas = document.getElementById('game');
const ctx = canvas.getContext('2d');

const FRACTIONS = [
  { num: 1, den: 2 },
  { num: 1, den: 3 },
  { num: 1, den: 4 },
  { num: 2, den: 3 },
  { num: 3, den: 4 },
  { num: 1, den: 5 },
  { num: 2, den: 5 },
  { num: 3, den: 5 },
  { num: 4, den: 5 },
  { num: 2, den: 4 },
  { num: 1, den: 6 },
  { num: 3, den: 6 },
];

const COLORS = [
  '#FF6B6B','#FFD93D','#6BCB77','#4D96FF',
  '#FF922B','#CC5DE8','#20C997','#F06595'
];

let state = 'start'; // start | playing | result | end
let round = 0;
let score = 0;
let totalRounds = 10;
let currentQuestion = null;
let feedback = null; // { correct: bool, chosen: idx }
let feedbackTimer = 0;
let stars = [];
let particles = [];

// Button areas (set during draw)
let buttons = [];
let startBtn = null;
let nextBtn = null;
let restartBtn = null;

// ---- Utility ----
function randInt(min, max) { return Math.floor(Math.random() * (max - min + 1)) + min; }
function shuffle(arr) {
  for (let i = arr.length - 1; i > 0; i--) {
    const j = randInt(0, i);
    [arr[i], arr[j]] = [arr[j], arr[i]];
  }
  return arr;
}
function fracEqual(a, b) { return a.num * b.den === b.num * a.den; }
function fracLabel(f) { return f.num + '/' + f.den; }

// ---- Question Generator ----
function generateQuestion(roundIdx) {
  // Pick harder fractions as rounds progress
  const pool = roundIdx < 4 ? FRACTIONS.slice(0, 5)
              : roundIdx < 7 ? FRACTIONS.slice(0, 8)
              : FRACTIONS;
  const correct = pool[randInt(0, pool.length - 1)];

  // Generate 2 wrong answers
  const wrongs = [];
  let attempts = 0;
  while (wrongs.length < 2 && attempts < 50) {
    attempts++;
    const w = pool[randInt(0, pool.length - 1)];
    if (!fracEqual(w, correct) && !wrongs.some(x => fracEqual(x, w))) {
      wrongs.push(w);
    }
  }
  // fallback if pool too small
  while (wrongs.length < 2) {
    const extra = FRACTIONS[randInt(0, FRACTIONS.length - 1)];
    if (!fracEqual(extra, correct) && !wrongs.some(x => fracEqual(x, extra))) {
      wrongs.push(extra);
    }
  }

  const answers = shuffle([correct, wrongs[0], wrongs[1]]);
  const correctIdx = answers.findIndex(a => fracEqual(a, correct));
  const color = COLORS[randInt(0, COLORS.length - 1)];

  return { correct, answers, correctIdx, color, roundIdx };
}

// ---- Particles ----
function spawnParticles(x, y, good) {
  for (let i = 0; i < 24; i++) {
    const angle = Math.random() * Math.PI * 2;
    const speed = 3 + Math.random() * 5;
    particles.push({
      x, y,
      vx: Math.cos(angle) * speed,
      vy: Math.sin(angle) * speed,
      r: 4 + Math.random() * 6,
      color: good ? COLORS[randInt(0, COLORS.length-1)] : '#888',
      life: 1.0,
      decay: 0.03 + Math.random() * 0.03
    });
  }
}
function updateParticles() {
  particles = particles.filter(p => p.life > 0);
  particles.forEach(p => {
    p.x += p.vx;
    p.y += p.vy;
    p.vy += 0.2;
    p.life -= p.decay;
  });
}
function drawParticles() {
  particles.forEach(p => {
    ctx.globalAlpha = p.life;
    ctx.fillStyle = p.color;
    ctx.beginPath();
    ctx.arc(p.x, p.y, p.r, 0, Math.PI * 2);
    ctx.fill();
  });
  ctx.globalAlpha = 1;
}

// ---- Draw Pizza ----
function drawPizza(cx, cy, radius, fraction, color) {
  const { num, den } = fraction;
  const startAngle = -Math.PI / 2;
  const sliceAngle = (Math.PI * 2) / den;

  // Shadow
  ctx.shadowColor = 'rgba(0,0,0,0.4)';
  ctx.shadowBlur = 18;

  // Draw all slices
  for (let i = 0; i < den; i++) {
    const s = startAngle + i * sliceAngle;
    const e = s + sliceAngle;
    ctx.beginPath();
    ctx.moveTo(cx, cy);
    ctx.arc(cx, cy, radius, s, e);
    ctx.closePath();
    ctx.fillStyle = i < num ? color : '#2a2a4a';
    ctx.fill();
    ctx.strokeStyle = '#fff';
    ctx.lineWidth = 2.5;
    ctx.stroke();
  }
  ctx.shadowBlur = 0;

  // Center dot
  ctx.beginPath();
  ctx.arc(cx, cy, 8, 0, Math.PI * 2);
  ctx.fillStyle = '#fff';
  ctx.fill();

  // Pizza texture dots on filled slices
  ctx.fillStyle = 'rgba(255,255,255,0.18)';
  for (let i = 0; i < num; i++) {
    const midAngle = startAngle + (i + 0.5) * sliceAngle;
    const dotR = radius * 0.55;
    const dx = cx + Math.cos(midAngle) * dotR;
    const dy = cy + Math.sin(midAngle) * dotR;
    ctx.beginPath();
    ctx.arc(dx, dy, 7, 0, Math.PI * 2);
    ctx.fill();
  }
}

// ---- Draw Fraction Text ----
function drawFrac(x, y, num, den, size, color) {
  const lineH = size * 0.9;
  ctx.fillStyle = color;
  ctx.font = `bold ${size}px Arial`;
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  ctx.fillText(num, x, y - lineH * 0.38);
  ctx.fillRect(x - size * 0.42, y - 2, size * 0.84, 4);
  ctx.fillText(den, x, y + lineH * 0.38);
}

// ---- Draw Screens ----
function drawBackground() {
  const grad = ctx.createLinearGradient(0, 0, 0, 700);
  grad.addColorStop(0, '#1a1a2e');
  grad.addColorStop(1, '#16213e');
  ctx.fillStyle = grad;
  ctx.fillRect(0, 0, 390, 700);

  // Decorative circles
  ctx.globalAlpha = 0.07;
  ctx.fillStyle = '#4D96FF';
  ctx.beginPath(); ctx.arc(50, 120, 80, 0, Math.PI*2); ctx.fill();
  ctx.beginPath(); ctx.arc(340, 580, 100, 0, Math.PI*2); ctx.fill();
  ctx.globalAlpha = 1;
}

function drawRoundedRect(x, y, w, h, r, fill, stroke) {
  ctx.beginPath();
  ctx.moveTo(x + r, y);
  ctx.lineTo(x + w - r, y);
  ctx.quadraticCurveTo(x + w, y, x + w, y + r);
  ctx.lineTo(x + w, y + h - r);
  ctx.quadraticCurveTo(x + w, y + h, x + w - r, y + h);
  ctx.lineTo(x + r, y + h);
  ctx.quadraticCurveTo(x, y + h, x, y + h - r);
  ctx.lineTo(x, y + r);
  ctx.quadraticCurveTo(x, y, x + r, y);
  ctx.closePath();
  if (fill) { ctx.fillStyle = fill; ctx.fill(); }
  if (stroke) { ctx.strokeStyle = stroke; ctx.lineWidth = 3; ctx.stroke(); }
}

function drawStartScreen() {
  drawBackground();

  // Title
  ctx.fillStyle = '#FFD93D';
  ctx.font = 'bold 48px Arial';
  ctx.textAlign = 'center';
  ctx.shadowColor = 'rgba(255,217,61,0.5)';
  ctx.shadowBlur = 20;
  ctx.fillText('🍕 Breukjes', 195, 120);
  ctx.shadowBlur = 0;

  ctx.fillStyle = '#fff';
  ctx.font = '22px Arial';
  ctx.fillText('Welke breuk klopt?', 195, 170);

  // Demo pizza
  drawPizza(195, 330, 110, { num: 3, den: 4 }, '#FF6B6B');

  // Fraction label
  drawFrac(195, 490, 3, 4, 42, '#FFD93D');

  ctx.fillStyle = 'rgba(255,255,255,0.7)';
  ctx.font = '18px Arial';
  ctx.fillText('10 vragen • Kies de juiste breuk!', 195, 560);

  // Start button
  drawRoundedRect(95, 605, 200, 65, 18, '#6BCB77', null);
  ctx.fillStyle = '#fff';
  ctx.font = 'bold 26px Arial';
  ctx.fillText('SPELEN!', 195, 637);

  startBtn = { x: 95, y: 605, w: 200, h: 65 };
}

function drawPlayScreen() {
  drawBackground();
  const q = currentQuestion;

  // Header
  ctx.fillStyle = '#FFD93D';
  ctx.font = 'bold 22px Arial';
  ctx.textAlign = 'center';
  ctx.fillText('Ronde ' + round + ' van ' + totalRounds, 195, 38);

  // Score
  ctx.fillStyle = '#6BCB77';
  ctx.font = 'bold 20px Arial';
  ctx.fillText('Score: ' + score, 195, 65);

  // Progress bar
  const pw = 340, px = 25, py = 80, ph = 10;
  drawRoundedRect(px, py, pw, ph, 5, '#2a2a4a', null);
  drawRoundedRect(px, py, pw * (round / totalRounds), ph, 5, '#6BCB77', null);

  // Question
  ctx.fillStyle = '#fff';
  ctx.font = 'bold 24px Arial';
  ctx.fillText('Welke breuk zie je hier?', 195, 125);

  // Pizza
  drawPizza(195, 285, 120, q.correct, q.color);

  // Answer buttons
  buttons = [];
  const btnY = [490, 575, 660];
  const btnColors = ['#4D96FF', '#FF922B', '#CC5DE8'];

  q.answers.forEach(function(ans, i) {
    let fill = btnColors[i % btnColors.length];
    let textColor = '#fff';
    let border = null;

    if (feedback !== null) {
      if (i === q.correctIdx) {
        fill = '#6BCB77';
        border = '#fff';
      } else if (i === feedback.chosen && !feedback.correct) {
        fill = '#FF6B6B';
        border = '#fff';
      } else {
        fill = '#333';
        textColor = '#888';
      }
    }

    drawRoundedRect(55, btnY[i] - 38, 280, 66, 16, fill, border);

    // Draw fraction inside button
    const ny = btnY[i] - 2;
    drawFrac(195, ny, ans.num, ans.den, 28, textColor);

    buttons.push({ x: 55, y: btnY[i] - 38, w: 280, h: 66, idx: i });
  });

  drawParticles();
}

function drawEndScreen() {
  drawBackground();

  ctx.fillStyle = '#FFD93D';
  ctx.font = 'bold 46px Arial';
  ctx.textAlign = 'center';
  ctx.shadowColor = 'rgba(255,217,61,0.6)';
  ctx.shadowBlur = 24;
  ctx.fillText('Klaar! 🎉', 195, 130);
  ctx.shadowBlur = 0;

  ctx.fillStyle = '#fff';
  ctx.font = '26px Arial';
  ctx.fillText('Jouw score:', 195, 210);

  ctx.fillStyle = '#6BCB77';
  ctx.font = 'bold 80px Arial';
  ctx.fillText(score + '/' + totalRounds, 195, 320);

  let msg = score <= 4 ? 'Blijf oefenen! 💪'
          : score <= 7 ? 'Goed gedaan! 👍'
          : 'Super goed! 🌟';
  ctx.fillStyle = '#FFD93D';
  ctx.font = 'bold 28px Arial';
  ctx.fillText(msg, 195, 390);

  // Stars
  const starCount = Math.ceil(score / totalRounds * 3);
  const starColors = ['#FFD700','#FFD700','#FFD700'];
  for (let i = 0; i < 3; i++) {
    drawStar(130 + i * 65, 460, 22, i < starCount ? '#FFD700' : '#444');
  }

  drawRoundedRect(95, 540, 200, 65, 18, '#4D96FF', null);
  ctx.fillStyle = '#fff';
  ctx.font = 'bold 24px Arial';
  ctx.fillText('Opnieuw!', 195, 572);

  restartBtn = { x: 95, y: 540, w: 200, h: 65 };
  drawParticles();
}

function drawStar(cx, cy, r, color) {
  ctx.fillStyle = color;
  ctx.beginPath();
  for (let i = 0; i < 10; i++) {
    const angle = (Math.PI / 5) * i - Math.PI / 2;
    const rad = i % 2 === 0 ? r : r * 0.45;
    const x = cx + Math.cos(angle) * rad;
    const y = cy + Math.sin(angle) * rad;
    i === 0 ? ctx.moveTo(x, y) : ctx.lineTo(x, y);
  }
  ctx.closePath();
  ctx.fill();
}

// ---- Game Logic ----
function startGame() {
  round = 0;
  score = 0;
  particles = [];
  nextRound();
}

function nextRound() {
  if (round >= totalRounds) {
    state = 'end';
    spawnParticles(195, 350, true);
    return;
  }
  round++;
  feedback = null;
  currentQuestion = generateQuestion(round - 1);
  state = 'playing';
}

function answerChosen(idx) {
  if (feedback !== null) return;
  const correct = idx === currentQuestion.correctIdx;
  feedback = { correct, chosen: idx };
  if (correct) {
    score++;
    spawnParticles(195, 285, true);
  } else {
    spawnParticles(195, 285, false);
  }
  setTimeout(function() { nextRound(); }, 1100);
}

// ---- Main Loop ----
function loop() {
  requestAnimationFrame(loop);
  updateParticles();

  if (state === 'start') drawStartScreen();
  else if (state === 'playing') drawPlayScreen();
  else if (state === 'end') drawEndScreen();
}

// ---- Input ----
function getPos(e) {
  const rect = canvas.getBoundingClientRect();
  const scaleX = canvas.width / rect.width;
  const scaleY = canvas.height / rect.height;
  if (e.touches && e.touches.length > 0) {
    return {
      x: (e.touches[0].clientX - rect.left) * scaleX,
      y: (e.touches[0].clientY - rect.top) * scaleY
    };
  }
  return {
    x: (e.clientX - rect.left) * scaleX,
    y: (e.clientY - rect.top) * scaleY
  };
}

function handleTap(e) {
  e.preventDefault();
  const pos = getPos(e);
  const { x, y } = pos;

  if (state === 'start' && startBtn) {
    if (x >= startBtn.x && x <= startBtn.x + startBtn.w &&
        y >= startBtn.y && y <= startBtn.y + startBtn.h) {
      startGame();
    }
  } else if (state === 'playing') {
    buttons.forEach(function(btn) {
      if (x >= btn.x && x <= btn.x + btn.w &&
          y >= btn.y && y <= btn.y + btn.h) {
        answerChosen(btn.idx);
      }
    });
  } else if (state === 'end' && restartBtn) {
    if (x >= restartBtn.x && x <= restartBtn.x + restartBtn.w &&
        y >= restartBtn.y && y <= restartBtn.y + restartBtn.h) {
      state = 'start';
    }
  }
}

canvas.onclick = function(e) { handleTap(e); };
canvas.ontouchstart = function(e) { handleTap(e); };

loop();
</script>
</body>
</html>
