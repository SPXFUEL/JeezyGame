<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Breukjes</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: #1a0a0a; display: flex; justify-content: center; align-items: center; height: 100vh; overflow: hidden; font-family: 'Arial Rounded MT Bold', Arial, sans-serif; }
  canvas { display: block; cursor: pointer; touch-action: none; }
</style>
</head>
<body>
<canvas id="c"></canvas>
<script>
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');
canvas.width = 390;
canvas.height = 700;

function resize() {
  const ratio = Math.min(window.innerWidth / 390, window.innerHeight / 700);
  canvas.style.width = (390 * ratio) + 'px';
  canvas.style.height = (700 * ratio) + 'px';
}
resize();
window.addEventListener('resize', resize);

// Audio
let audioCtx = null;
function getAC() {
  if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  return audioCtx;
}

function playNomNom() {
  try {
    const ac = getAC();
    [400, 600, 800, 1000].forEach((f, i) => {
      const o = ac.createOscillator();
      const g = ac.createGain();
      o.connect(g); g.connect(ac.destination);
      o.frequency.setValueAtTime(f * 0.8, ac.currentTime + i * 0.07);
      o.frequency.exponentialRampToValueAtTime(f * 1.4, ac.currentTime + i * 0.07 + 0.06);
      o.type = 'sine';
      g.gain.setValueAtTime(0, ac.currentTime + i * 0.07);
      g.gain.linearRampToValueAtTime(0.2, ac.currentTime + i * 0.07 + 0.03);
      g.gain.exponentialRampToValueAtTime(0.001, ac.currentTime + i * 0.07 + 0.1);
      o.start(ac.currentTime + i * 0.07);
      o.stop(ac.currentTime + i * 0.07 + 0.12);
    });
  } catch(e) {}
}

function playBuzz() {
  try {
    const ac = getAC();
    const o = ac.createOscillator();
    const g = ac.createGain();
    o.type = 'square';
    o.frequency.value = 160;
    o.connect(g); g.connect(ac.destination);
    g.gain.setValueAtTime(0.18, ac.currentTime);
    g.gain.exponentialRampToValueAtTime(0.001, ac.currentTime + 0.35);
    o.start(ac.currentTime);
    o.stop(ac.currentTime + 0.35);
  } catch(e) {}
}

function playPizzaParty() {
  try {
    const ac = getAC();
    const notes = [523, 659, 784, 523, 659, 784, 1047, 784, 880, 1047];
    notes.forEach((f, i) => {
      const o = ac.createOscillator();
      const g = ac.createGain();
      o.connect(g); g.connect(ac.destination);
      o.frequency.value = f;
      o.type = i % 2 === 0 ? 'sine' : 'triangle';
      const t = ac.currentTime + i * 0.13;
      g.gain.setValueAtTime(0, t);
      g.gain.linearRampToValueAtTime(0.28, t + 0.05);
      g.gain.exponentialRampToValueAtTime(0.001, t + 0.4);
      o.start(t);
      o.stop(t + 0.45);
    });
  } catch(e) {}
}

// State
const S = { START: 0, GAME: 1, END: 2 };
let screen = S.START;
let round = 0;
let score = 0;
const ROUNDS = 10;
let feedback = null;
let answered = false;

// Fractions pool
const fractions = [
  { num: 1, den: 2 }, { num: 1, den: 3 }, { num: 1, den: 4 },
  { num: 2, den: 3 }, { num: 3, den: 4 }, { num: 2, den: 4 },
  { num: 1, den: 2 }, { num: 3, den: 4 }, { num: 1, den: 3 },
  { num: 2, den: 3 }
];

let targetFraction = null;
let options = []; // Each option: {num, den}
let correctIdx = 0;

// Confetti
let confetti = [];

// Animations: bounce for correct
let bounceAnim = -1; // index of bouncing answer
let bounceT = 0;

function fracEq(a, b) { return a.num === b.num && a.den === b.den; }

function genOptions(target) {
  const pool = [
    { num: 1, den: 2 }, { num: 1, den: 3 }, { num: 1, den: 4 },
    { num: 2, den: 3 }, { num: 3, den: 4 }, { num: 1, den: 6 },
    { num: 2, den: 6 }, { num: 1, den: 8 }, { num: 3, den: 8 }
  ];
  const opts = [target];
  let attempts = 0;
  while (opts.length < 4 && attempts < 200) {
    attempts++;
    const c = pool[Math.floor(Math.random() * pool.length)];
    if (!opts.some(o => fracEq(o, c))) opts.push(c);
  }
  for (let i = opts.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [opts[i], opts[j]] = [opts[j], opts[i]];
  }
  correctIdx = opts.findIndex(o => fracEq(o, target));
  return opts;
}

function startRound() {
  answered = false;
  feedback = null;
  bounceAnim = -1;
  bounceT = 0;
  targetFraction = fractions[round % fractions.length];
  options = genOptions(targetFraction);
}

function drawRoundedRect(x, y, w, h, r) {
  ctx.beginPath();
  ctx.moveTo(x + r, y);
  ctx.lineTo(x + w - r, y);
  ctx.quadraticCurveTo(x + w, y, x + w, y + r);
  ctx.lineTo(x + w, y + h - r);
  ctx.quadraticCurveTo(x + w, y + h, x + w - r, y + h);
  ctx.lineTo(x + r, y + h);
  ctx.quadraticCurveTo(x, y + h, x, y + h - r);
  ctx.lineTo(x, y + r);
  ctx.quadraticCurveTo(x, y, x + r, y);
  ctx.closePath();
}

// Draw a pizza slice with fraction highlighting
function drawPizza(cx, cy, radius, num, den, answered, isCorrect, isSelected, bounce) {
  const scale = bounce ? 1 + Math.sin(bounceT * 12) * 0.08 : 1;
  ctx.save();
  ctx.translate(cx, cy);
  ctx.scale(scale, scale);
  ctx.translate(-cx, -cy);

  const startAngle = -Math.PI / 2;

  // Shadow
  ctx.save();
  ctx.shadowColor = 'rgba(0,0,0,0.45)';
  ctx.shadowBlur = 12;
  ctx.shadowOffsetY = 5;
  ctx.beginPath();
  ctx.arc(cx, cy, radius, 0, Math.PI * 2);
  ctx.fillStyle = '#2a1a10';
  ctx.fill();
  ctx.restore();

  for (let s = 0; s < den; s++) {
    const a0 = startAngle + (s / den) * Math.PI * 2;
    const a1 = startAngle + ((s + 1) / den) * Math.PI * 2;
    const isHighlighted = s < num;

    // Slice fill
    ctx.beginPath();
    ctx.moveTo(cx, cy);
    ctx.arc(cx, cy, radius - 4, a0, a1);
    ctx.closePath();

    if (isHighlighted) {
      // Pizza-colored slice
      const sg = ctx.createRadialGradient(cx, cy, 4, cx, cy, radius);
      sg.addColorStop(0, '#e8a020');
      sg.addColorStop(0.5, '#d44010');
      sg.addColorStop(1, '#b83008');
      ctx.fillStyle = sg;
    } else {
      // Empty/lighter slice
      const sg = ctx.createRadialGradient(cx, cy, 4, cx, cy, radius);
      sg.addColorStop(0, '#f5e8d0');
      sg.addColorStop(1, '#e8d4b0');
      ctx.fillStyle = sg;
    }
    ctx.fill();

    // Slice divider line
    ctx.beginPath();
    ctx.moveTo(cx, cy);
    ctx.lineTo(cx + Math.cos(a0) * radius, cy + Math.sin(a0) * radius);
    ctx.strokeStyle = '#8a4a10';
    ctx.lineWidth = 1.5;
    ctx.stroke();

    // Toppings on highlighted slices
    if (isHighlighted) {
      const midAngle = (a0 + a1) / 2;
      const r1 = radius * 0.55, r2 = radius * 0.75;

      // Tomato/red circle topping
      const tx1 = cx + Math.cos(midAngle) * r1;
      const ty1 = cy + Math.sin(midAngle) * r1;
      ctx.beginPath();
      ctx.arc(tx1, ty1, 4.5, 0, Math.PI * 2);
      ctx.fillStyle = '#cc1010';
      ctx.fill();
      ctx.beginPath();
      ctx.arc(tx1 + 1, ty1 - 1, 1.5, 0, Math.PI * 2);
      ctx.fillStyle = 'rgba(255,180,180,0.7)';
      ctx.fill();

      // Cheese dots
      const tx2 = cx + Math.cos(midAngle + 0.3) * r2;
      const ty2 = cy + Math.sin(midAngle + 0.3) * r2;
      ctx.beginPath();
      ctx.arc(tx2, ty2, 3, 0, Math.PI * 2);
      ctx.fillStyle = '#ffe060';
      ctx.fill();

      const tx3 = cx + Math.cos(midAngle - 0.3) * r2;
      const ty3 = cy + Math.sin(midAngle - 0.3) * r2;
      ctx.beginPath();
      ctx.arc(tx3, ty3, 2.5, 0, Math.PI * 2);
      ctx.fillStyle = '#ffe060';
      ctx.fill();

      // Small herb dots
      if (radius > 45) {
        const tx4 = cx + Math.cos(midAngle) * r2 * 0.85;
        const ty4 = cy + Math.sin(midAngle) * r2 * 0.85;
        ctx.beginPath();
        ctx.arc(tx4, ty4, 2, 0, Math.PI * 2);
        ctx.fillStyle = '#308030';
        ctx.fill();
      }
    }
  }

  // Crust outer ring
  ctx.beginPath();
  ctx.arc(cx, cy, radius - 2, 0, Math.PI * 2);
  ctx.lineWidth = 5;
  const crustGrad = ctx.createLinearGradient(cx - radius, cy, cx + radius, cy);
  crustGrad.addColorStop(0, '#c07820');
  crustGrad.addColorStop(0.5, '#e09030');
  crustGrad.addColorStop(1, '#c07820');
  ctx.strokeStyle = crustGrad;
  ctx.stroke();

  // Crust bumps
  for (let b = 0; b < den * 2 + 4; b++) {
    const ba = (b / (den * 2 + 4)) * Math.PI * 2;
    const bx = cx + Math.cos(ba) * (radius - 2);
    const by2 = cy + Math.sin(ba) * (radius - 2);
    ctx.beginPath();
    ctx.arc(bx, by2, 2, 0, Math.PI * 2);
    ctx.fillStyle = '#d08828';
    ctx.fill();
  }

  // Selection/answer highlight ring
  if (answered) {
    ctx.beginPath();
    ctx.arc(cx, cy, radius + 5, 0, Math.PI * 2);
    ctx.lineWidth = 4;
    ctx.strokeStyle = isCorrect ? '#2ecc71' : (isSelected ? '#e74c3c' : 'transparent');
    ctx.stroke();
  }

  // Center shine
  ctx.beginPath();
  ctx.arc(cx, cy, 5, 0, Math.PI * 2);
  ctx.fillStyle = 'rgba(255,255,255,0.4)';
  ctx.fill();

  ctx.restore();
}

function drawFractionDisplay(cx, cy, num, den) {
  const cardW = 160, cardH = 130;
  const cardX = cx - cardW / 2, cardY = cy - cardH / 2;

  // Card backdrop
  ctx.save();
  ctx.shadowColor = 'rgba(0,0,0,0.5)';
  ctx.shadowBlur = 20;
  ctx.shadowOffsetY = 5;
  drawRoundedRect(cardX, cardY, cardW, cardH, 20);
  const cg = ctx.createLinearGradient(cardX, cardY, cardX, cardY + cardH);
  cg.addColorStop(0, '#3a1a0a');
  cg.addColorStop(1, '#1a0a04');
  ctx.fillStyle = cg;
  ctx.fill();
  ctx.strokeStyle = '#c07020';
  ctx.lineWidth = 2.5;
  ctx.stroke();
  ctx.restore();

  // Numerator
  ctx.fillStyle = '#ffffff';
  ctx.font = 'bold 52px Arial';
  ctx.textAlign = 'center';
  ctx.textBaseline = 'alphabetic';
  ctx.fillText(String(num), cx, cy - 8);

  // Fraction bar
  ctx.fillStyle = '#ffd700';
  ctx.fillRect(cx - 35, cy + 2, 70, 6);

  // Denominator
  ctx.fillStyle = '#ffffff';
  ctx.textBaseline = 'top';
  ctx.fillText(String(den), cx, cy + 12);
}

function drawBackground() {
  const bg = ctx.createLinearGradient(0, 0, 0, 700);
  bg.addColorStop(0, '#2a0a04');
  bg.addColorStop(0.5, '#1a0804');
  bg.addColorStop(1, '#0a0402');
  ctx.fillStyle = bg;
  ctx.fillRect(0, 0, 390, 700);

  // Subtle pattern
  ctx.fillStyle = 'rgba(200,80,20,0.04)';
  for (let i = 0; i < 12; i++) {
    for (let j = 0; j < 16; j++) {
      ctx.beginPath();
      ctx.arc(i * 36, j * 48, 2, 0, Math.PI * 2);
      ctx.fill();
    }
  }
}

function drawStart() {
  drawBackground();

  // Title area
  ctx.save();
  ctx.shadowColor = 'rgba(0,0,0,0.6)';
  ctx.shadowBlur = 25;
  drawRoundedRect(25, 45, 340, 110, 20);
  const tg = ctx.createLinearGradient(25, 45, 25, 155);
  tg.addColorStop(0, '#5a1a04');
  tg.addColorStop(1, '#3a0a02');
  ctx.fillStyle = tg;
  ctx.fill();
  ctx.strokeStyle = '#c07020';
  ctx.lineWidth = 2;
  ctx.stroke();
  ctx.restore();

  ctx.fillStyle = '#ffd700';
  ctx.font = 'bold 52px Arial';
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  ctx.fillText('Breukjes!', 195, 85);
  ctx.fillStyle = '#ff9040';
  ctx.font = '22px Arial';
  ctx.fillText('Welke pizza klopt?', 195, 132);

  // Demo pizza in center
  drawPizza(195, 310, 65, 2, 4, false, false, false, false);

  // Fraction display
  drawFractionDisplay(195, 450, 2, 4);

  ctx.fillStyle = 'rgba(255,180,100,0.8)';
  ctx.font = '18px Arial';
  ctx.textAlign = 'center';
  ctx.fillText('Kies de pizza die bij de breuk past!', 195, 510);

  // Start button
  const sg = ctx.createLinearGradient(70, 555, 70, 619);
  sg.addColorStop(0, '#e05010');
  sg.addColorStop(1, '#a02a04');
  ctx.save();
  ctx.shadowColor = 'rgba(220,80,20,0.6)';
  ctx.shadowBlur = 22;
  drawRoundedRect(70, 555, 250, 64, 32);
  ctx.fillStyle = sg;
  ctx.fill();
  ctx.restore();
  ctx.fillStyle = '#fff';
  ctx.font = 'bold 30px Arial';
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  ctx.fillText('Speel nu!', 195, 587);

  ctx.fillStyle = 'rgba(255,200,150,0.5)';
  ctx.font = '17px Arial';
  ctx.fillText('10 vragen  -  Leeftijd 7-8 jaar', 195, 650);
}

function drawGame() {
  drawBackground();

  // Header
  ctx.fillStyle = 'rgba(0,0,0,0.4)';
  ctx.fillRect(0, 0, 390, 82);

  ctx.fillStyle = '#ffd700';
  ctx.font = 'bold 19px Arial';
  ctx.textAlign = 'left';
  ctx.textBaseline = 'top';
  ctx.fillText('Vraag ' + (round + 1) + ' van ' + ROUNDS, 18, 6);
  ctx.fillStyle = '#ffffff';
  ctx.textAlign = 'right';
  ctx.fillText('Score: ' + score, 372, 6);

  // Progress bar
  ctx.fillStyle = 'rgba(255,255,255,0.12)';
  drawRoundedRect(18, 34, 354, 10, 5);
  ctx.fill();
  ctx.fillStyle = '#ffd700';
  const pw = (round / ROUNDS) * 354;
  if (pw > 0) { drawRoundedRect(18, 34, pw, 10, 5); ctx.fill(); }

  // Instruction
  ctx.fillStyle = '#ff9040';
  ctx.font = 'bold 19px Arial';
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  ctx.fillText('Welke pizza is dit?', 195, 63);

  // Target fraction display (large, centered)
  if (targetFraction) {
    drawFractionDisplay(195, 155, targetFraction.num, targetFraction.den);
  }

  // 2x2 pizza grid
  const gridX = [90, 300];
  const gridY = [320, 530];
  const pizzaRadius = 62;

  options.forEach((opt, i) => {
    const col = i % 2, row = Math.floor(i / 2);
    const px = gridX[col];
    const py = gridY[row];

    const isSelected = answered && fracEq(opt, options[i]);
    const isCorrect = fracEq(opt, targetFraction);
    const isBouncing = bounceAnim === i;

    // Card behind pizza
    ctx.save();
    ctx.shadowColor = 'rgba(0,0,0,0.45)';
    ctx.shadowBlur = 14;
    ctx.shadowOffsetY = 5;
    drawRoundedRect(px - pizzaRadius - 12, py - pizzaRadius - 12, (pizzaRadius + 12) * 2, (pizzaRadius + 12) * 2, 16);
    let cardBg = '#2a1a10';
    if (answered) {
      cardBg = isCorrect ? '#0a3a1a' : '#3a0a0a';
    }
    ctx.fillStyle = cardBg;
    ctx.fill();
    ctx.restore();

    drawPizza(px, py, pizzaRadius, opt.num, opt.den, answered, isCorrect, i === correctIdx, isBouncing);

    // Fraction label below pizza
    ctx.fillStyle = answered ? (isCorrect ? '#2ecc71' : '#aaaaaa') : '#ffcc80';
    ctx.font = 'bold 20px Arial';
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillText(opt.num + '/' + opt.den, px, py + pizzaRadius + 18);
  });

  // Feedback
  if (feedback) {
    ctx.save();
    ctx.shadowColor = feedback.color;
    ctx.shadowBlur = 20;
    ctx.fillStyle = feedback.color;
    ctx.font = 'bold 26px Arial';
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillText(feedback.text, 195, 230);
    ctx.restore();
  }
}

function drawEnd() {
  drawBackground();

  confetti.forEach(p => {
    ctx.save();
    ctx.translate(p.x, p.y);
    ctx.rotate(p.rot);
    ctx.fillStyle = p.color;
    ctx.fillRect(-p.size / 2, -p.size * 0.3, p.size, p.size * 0.6);
    ctx.restore();
  });

  // Title
  ctx.save();
  ctx.shadowColor = 'rgba(0,0,0,0.6)';
  ctx.shadowBlur = 22;
  drawRoundedRect(30, 95, 330, 100, 20);
  const tg = ctx.createLinearGradient(30, 95, 30, 195);
  tg.addColorStop(0, '#5a1a04');
  tg.addColorStop(1, '#3a0a02');
  ctx.fillStyle = tg;
  ctx.fill();
  ctx.strokeStyle = '#c07020';
  ctx.lineWidth = 2;
  ctx.stroke();
  ctx.restore();

  ctx.fillStyle = '#ffd700';
  ctx.font = 'bold 44px Arial';
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  ctx.fillText('Pizza Master!', 195, 135);
  ctx.fillStyle = '#ff9040';
  ctx.font = 'bold 22px Arial';
  ctx.fillText('Goed gedaan!', 195, 175);

  // Score
  const cg = ctx.createRadialGradient(183, 320, 8, 195, 330, 90);
  cg.addColorStop(0, '#ffe04a');
  cg.addColorStop(1, '#e05010');
  ctx.save();
  ctx.shadowColor = 'rgba(255,150,30,0.5)';
  ctx.shadowBlur = 28;
  ctx.beginPath();
  ctx.arc(195, 330, 90, 0, Math.PI * 2);
  ctx.fillStyle = cg;
  ctx.fill();
  ctx.lineWidth = 5;
  ctx.strokeStyle = '#fff';
  ctx.stroke();
  ctx.restore();

  ctx.fillStyle = '#1a0a04';
  ctx.font = 'bold 58px Arial';
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  ctx.fillText(score + '/' + ROUNDS, 195, 330);

  const msgs = ['Oefenen!', 'Goed bezig!', 'Pizza ster!', 'Pizza God!'];
  const mi = score >= 9 ? 3 : score >= 7 ? 2 : score >= 5 ? 1 : 0;
  ctx.fillStyle = '#ffcc80';
  ctx.font = 'bold 26px Arial';
  ctx.fillText(msgs[mi], 195, 450);

  // Restart
  const rg = ctx.createLinearGradient(70, 518, 70, 582);
  rg.addColorStop(0, '#e05010');
  rg.addColorStop(1, '#a02a04');
  ctx.save();
  ctx.shadowColor = 'rgba(220,80,20,0.5)';
  ctx.shadowBlur = 18;
  drawRoundedRect(70, 518, 250, 64, 32);
  ctx.fillStyle = rg;
  ctx.fill();
  ctx.restore();
  ctx.fillStyle = '#fff';
  ctx.font = 'bold 30px Arial';
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  ctx.fillText('Opnieuw!', 195, 550);
}

function spawnConfetti() {
  confetti = [];
  const colors = ['#ffd700','#e74c3c','#3498db','#2ecc71','#9b59b6','#ff9040','#ff6b6b'];
  for (let i = 0; i < 65; i++) {
    confetti.push({
      x: Math.random() * 390,
      y: -20 - Math.random() * 350,
      vx: (Math.random() - 0.5) * 2.5,
      vy: 1.5 + Math.random() * 3.5,
      rot: Math.random() * Math.PI * 2,
      vrot: (Math.random() - 0.5) * 0.2,
      color: colors[i % colors.length],
      size: 7 + Math.random() * 9
    });
  }
}

function update(dt) {
  if (bounceAnim >= 0) {
    bounceT += dt * 4;
    if (bounceT > 1.2) { bounceAnim = -1; bounceT = 0; }
  }
  if (screen === S.END) {
    confetti.forEach(p => {
      p.x += p.vx; p.y += p.vy; p.rot += p.vrot;
      if (p.y > 720) p.y = -20;
    });
  }
}

let lastTs = 0;
function loop(ts) {
  const dt = Math.min((ts - lastTs) / 1000, 0.05);
  lastTs = ts;
  update(dt);
  ctx.clearRect(0, 0, 390, 700);
  if (screen === S.START) drawStart();
  else if (screen === S.GAME) drawGame();
  else drawEnd();
  requestAnimationFrame(loop);
}

function getPos(evt) {
  const rect = canvas.getBoundingClientRect();
  const sx = 390 / rect.width, sy = 700 / rect.height;
  const src = evt.touches ? evt.touches[0] : evt;
  return { x: (src.clientX - rect.left) * sx, y: (src.clientY - rect.top) * sy };
}

function handleClick(evt) {
  evt.preventDefault();
  const { x, y } = getPos(evt);

  if (screen === S.START) {
    if (x >= 70 && x <= 320 && y >= 555 && y <= 619) {
      screen = S.GAME;
      round = 0; score = 0;
      startRound();
    }
    return;
  }

  if (screen === S.END) {
    if (x >= 70 && x <= 320 && y >= 518 && y <= 582) {
      screen = S.GAME;
      round = 0; score = 0;
      startRound();
    }
    return;
  }

  if (screen === S.GAME && !answered) {
    const gridX = [90, 300];
    const gridY = [320, 530];
    const hitR = 80;

    options.forEach((opt, i) => {
      const col = i % 2, row = Math.floor(i / 2);
      const px = gridX[col];
      const py = gridY[row];
      const dx = x - px, dy = y - py;

      if (dx * dx + dy * dy < hitR * hitR) {
        answered = true;
        const isCorrect = fracEq(opt, targetFraction);
        if (isCorrect) {
          score++;
          feedback = { text: 'Goed zo! Lekker!', color: '#2ecc71' };
          bounceAnim = i;
          bounceT = 0;
          playNomNom();
        } else {
          feedback = { text: 'Helaas! Het was ' + targetFraction.num + '/' + targetFraction.den, color: '#e74c3c' };
          playBuzz();
        }
        setTimeout(() => {
          round++;
          if (round >= ROUNDS) {
            screen = S.END;
            spawnConfetti();
            if (score >= 7) playPizzaParty();
          } else {
            startRound();
          }
        }, 1500);
      }
    });
  }
}

canvas.addEventListener('click', handleClick);
canvas.addEventListener('touchstart', handleClick, { passive: false });

requestAnimationFrame(loop);
</script>
</body>
