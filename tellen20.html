<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Tellen tot 20</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body {
    width: 100%; height: 100%;
    background: #1a0533;
    display: flex; align-items: center; justify-content: center;
    overflow: hidden;
    font-family: 'Arial Rounded MT Bold', Arial, sans-serif;
  }
  #wrapper { position: relative; width: 390px; height: 700px; }
  canvas {
    display: block; width: 390px; height: 700px;
    border-radius: 24px; cursor: pointer; touch-action: none;
  }
</style>
</head>
<body>
<div id="wrapper">
<canvas id="c" width="390" height="700"></canvas>
</div>
<script>
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');
const W = 390, H = 700;

// ── Audio ──────────────────────────────────────────────────────────────────────
let AC;
function getAC() {
  if (!AC) AC = new (window.AudioContext || window.webkitAudioContext)();
  return AC;
}
function playTone(freq, type, dur, vol, delay) {
  const ac = getAC();
  const t = ac.currentTime + (delay || 0);
  const osc = ac.createOscillator();
  const g = ac.createGain();
  osc.connect(g); g.connect(ac.destination);
  osc.type = type || 'sine';
  osc.frequency.setValueAtTime(freq, t);
  g.gain.setValueAtTime(vol || 0.28, t);
  g.gain.exponentialRampToValueAtTime(0.001, t + dur);
  osc.start(t); osc.stop(t + dur + 0.05);
}

// Musical scale: C4 through C6 in semitones
const SCALE_FREQS = [
  261.63, 293.66, 329.63, 349.23, 392.00, 440.00, 493.88, // C4-B4
  523.25, 587.33, 659.25, 698.46, 783.99, 880.00, 987.77, // C5-B5
  1046.50, 1174.66, 1318.51, 1396.91, 1567.98, 1760.00, 2093.00 // C6+
];

function soundNote(n) {
  // n is 0-indexed tap count; cycle through scale
  const freq = SCALE_FREQS[n % SCALE_FREQS.length];
  playTone(freq, 'sine', 0.22, 0.28, 0);
}
function soundCorrect() {
  [523, 659, 784, 1047, 1319].forEach((f, i) => playTone(f, 'sine', 0.2, 0.22, i * 0.09));
}
function soundWrong() {
  playTone(220, 'sawtooth', 0.12, 0.22, 0);
  playTone(196, 'sawtooth', 0.12, 0.22, 0.13);
  playTone(165, 'sawtooth', 0.18, 0.22, 0.26);
}
function soundFanfare() {
  const melody = [523, 659, 784, 1047, 784, 1047, 1319];
  melody.forEach((f, i) => playTone(f, 'sine', 0.22, 0.25, i * 0.11));
}

// ── Pastel palette for blobs ───────────────────────────────────────────────────
const PASTEL = [
  '#ff9eb5','#ffb347','#fff176','#b5ead7','#c7ceea',
  '#ffdac1','#e2f0cb','#b5deff','#ffcbf2','#f0e68c',
  '#aed9e0','#fae3d9','#b8f0e6','#dda0dd','#98fb98',
  '#87ceeb','#ffb3ba','#baffc9','#bae1ff','#ffffba',
];

// ── Draw blob character ────────────────────────────────────────────────────────
function drawBlob(cx, cy, sc, color, jiggle) {
  ctx.save();
  ctx.translate(cx, cy);
  ctx.scale(sc, sc);
  if (jiggle && jiggle > 0) {
    const j = Math.sin(jiggle * 0.8) * jiggle * 0.6;
    ctx.rotate(j * 0.08);
    ctx.scale(1 + j * 0.04, 1 - j * 0.04);
  }

  // Shadow
  ctx.shadowColor = 'rgba(0,0,0,0.2)'; ctx.shadowBlur = 8; ctx.shadowOffsetY = 4;

  // Body
  ctx.beginPath(); ctx.arc(0, 0, 22, 0, Math.PI * 2);
  ctx.fillStyle = color; ctx.fill();
  ctx.shadowColor = 'transparent';

  // Outline
  ctx.strokeStyle = 'rgba(0,0,0,0.12)'; ctx.lineWidth = 1.5;
  ctx.stroke();

  // Gloss
  ctx.beginPath(); ctx.arc(-7, -8, 7, 0, Math.PI * 2);
  ctx.fillStyle = 'rgba(255,255,255,0.38)'; ctx.fill();

  // Eyes
  ctx.fillStyle = '#333';
  ctx.beginPath(); ctx.arc(-7, -4, 3.5, 0, Math.PI * 2); ctx.fill();
  ctx.beginPath(); ctx.arc(7, -4, 3.5, 0, Math.PI * 2); ctx.fill();
  ctx.fillStyle = '#fff';
  ctx.beginPath(); ctx.arc(-6, -5.5, 1.2, 0, Math.PI * 2); ctx.fill();
  ctx.beginPath(); ctx.arc(8, -5.5, 1.2, 0, Math.PI * 2); ctx.fill();

  // Smile
  ctx.strokeStyle = '#444'; ctx.lineWidth = 2; ctx.lineCap = 'round';
  ctx.beginPath();
  ctx.moveTo(-6, 7); ctx.bezierCurveTo(-6, 12, 6, 12, 6, 7);
  ctx.stroke();

  // Antenna
  ctx.strokeStyle = '#555'; ctx.lineWidth = 1.5;
  ctx.beginPath(); ctx.moveTo(0, -22); ctx.lineTo(0, -32); ctx.stroke();
  ctx.beginPath(); ctx.arc(0, -34, 3, 0, Math.PI * 2);
  ctx.fillStyle = color; ctx.fill();
  ctx.strokeStyle = '#555'; ctx.lineWidth = 1;
  ctx.stroke();

  ctx.restore();
}

// ── Confetti ───────────────────────────────────────────────────────────────────
const CONF_COLS = ['#ff4444','#ffcc00','#44cc44','#4488ff','#ff44cc','#00ddcc','#ff8800'];
let confetti = [];
function spawnConfetti() {
  confetti = Array.from({length: 80}, () => ({
    x: Math.random() * W, y: -15 - Math.random() * 120,
    vx: (Math.random() - 0.5) * 4, vy: 2 + Math.random() * 5,
    w: 8 + Math.random() * 10, h: 5 + Math.random() * 7,
    rot: Math.random() * Math.PI * 2, vr: (Math.random() - 0.5) * 0.25,
    color: CONF_COLS[Math.floor(Math.random() * CONF_COLS.length)],
    alpha: 1,
  }));
}
function updateConfetti() {
  for (const p of confetti) {
    p.x += p.vx; p.y += p.vy; p.rot += p.vr;
    if (p.y > H + 20) { p.y = -15; p.x = Math.random() * W; }
  }
}
function drawConfetti() {
  for (const p of confetti) {
    ctx.save(); ctx.translate(p.x, p.y); ctx.rotate(p.rot);
    ctx.globalAlpha = p.alpha; ctx.fillStyle = p.color;
    ctx.fillRect(-p.w / 2, -p.h / 2, p.w, p.h);
    ctx.restore();
  }
  ctx.globalAlpha = 1;
}

// ── Game state ─────────────────────────────────────────────────────────────────
const TOTAL_ROUNDS = 10;

let gameState = 'start'; // start | playing | result | end
let mode = 'A'; // 'A' = count objects, 'B' = tap N times
let round = 0, score = 0;
let target = 1;
let blobs = []; // {x, y, color, scale (anim), jiggle, visible}
let tapCount = 0; // mode B: how many times tapped
let selectedAnswer = -1; // mode A: which choice was clicked
let choices = []; // mode A: 4 answer choices
let resultState = null; // 'correct' | 'wrong'
let resultTimer = 0;
let animFrame = 0;
let bigNumScale = 1, bigNumDir = 1; // pulse animation for mode B number
let endParticles = [];
let tapBtnJiggle = 0; // for mode B tap button
let choiceBtnFlash = -1, choiceBtnFlashTimer = 0;

// ── Layout ─────────────────────────────────────────────────────────────────────
const PROG_Y = 28, PROG_H = 16, HUD_Y = 58;
const BLOB_AREA_TOP = 90, BLOB_AREA_BOTTOM = 490;
const BLOB_R = 28; // collision radius

// ── Blob grid placement ────────────────────────────────────────────────────────
function calcBlobPositions(count) {
  const positions = [];
  const cols = Math.min(count, 4);
  const rows = Math.ceil(count / cols);
  const cellW = Math.min(80, (W - 60) / cols);
  const cellH = Math.min(80, (BLOB_AREA_BOTTOM - BLOB_AREA_TOP) / rows);
  const totalW = cols * cellW, totalH = rows * cellH;
  const startX = (W - totalW) / 2 + cellW / 2;
  const startY = BLOB_AREA_TOP + (BLOB_AREA_BOTTOM - BLOB_AREA_TOP - totalH) / 2 + cellH / 2;
  for (let i = 0; i < count; i++) {
    const col = i % cols, row = Math.floor(i / cols);
    const x = startX + col * cellW + (Math.random() - 0.5) * 8;
    const y = startY + row * cellH + (Math.random() - 0.5) * 8;
    positions.push({ x, y });
  }
  return positions;
}

function generateChoices(correct, max) {
  const set = new Set([correct]);
  while (set.size < 4) {
    let v = 1 + Math.floor(Math.random() * max);
    set.add(v);
  }
  return Array.from(set).sort(() => Math.random() - 0.5);
}

// ── New round ──────────────────────────────────────────────────────────────────
function newRound() {
  round++;
  // Alternate modes or random; mode B more likely for higher numbers
  const r = Math.random();
  if (round <= 2) mode = r < 0.6 ? 'A' : 'B';
  else mode = r < 0.5 ? 'A' : 'B';

  // Target range grows with rounds
  const maxTarget = Math.min(20, 3 + Math.floor((round - 1) * 1.8));
  target = 1 + Math.floor(Math.random() * maxTarget);

  tapCount = 0; selectedAnswer = -1;
  resultState = null; resultTimer = 0;
  animFrame = 0; tapBtnJiggle = 0;
  choiceBtnFlash = -1; choiceBtnFlashTimer = 0;

  if (mode === 'A') {
    // Show objects, pick number
    const pos = calcBlobPositions(target);
    blobs = pos.map((p, i) => ({
      x: p.x, y: p.y,
      color: PASTEL[Math.floor(Math.random() * PASTEL.length)],
      scale: 0, delay: i * 6, jiggle: 0, visible: false,
    }));
    choices = generateChoices(target, maxTarget);
  } else {
    // Show number, tap that many times
    blobs = [];
    choices = [];
    bigNumScale = 1; bigNumDir = 1;
  }
}

// ── Input ──────────────────────────────────────────────────────────────────────
function handleClick(ex, ey) {
  if (AC && AC.state === 'suspended') AC.resume();
  if (!AC) getAC();

  if (gameState === 'start') {
    gameState = 'playing'; round = 0; score = 0; newRound(); return;
  }
  if (gameState === 'end') {
    gameState = 'start'; confetti = []; endParticles = []; return;
  }
  if (gameState !== 'playing') return;

  if (mode === 'A') {
    // Click on one of 4 answer buttons
    const btns = getChoiceBtns();
    for (let i = 0; i < btns.length; i++) {
      const b = btns[i];
      const dx = ex - b.cx, dy = ey - b.cy;
      if (dx * dx + dy * dy < b.r * b.r) {
        selectedAnswer = i;
        choiceBtnFlash = i; choiceBtnFlashTimer = 20;
        const ans = choices[i];
        if (ans === target) {
          score++; resultState = 'correct'; soundCorrect();
        } else {
          resultState = 'wrong'; soundWrong();
        }
        resultTimer = 70; gameState = 'result'; return;
      }
    }
  } else {
    // Mode B: tap the big button
    if (resultState) return;
    const bx = W / 2, by = 560, br = 68;
    const dx = ex - bx, dy = ey - by;
    if (dx * dx + dy * dy < br * br) {
      if (tapCount >= target) return;
      tapCount++;
      tapBtnJiggle = 12;
      soundNote(tapCount - 1);

      // Add blob at grid position
      const pos = calcBlobPositions(tapCount);
      blobs = pos.map((p, i) => ({
        x: p.x, y: p.y,
        color: blobs[i] ? blobs[i].color : PASTEL[Math.floor(Math.random() * PASTEL.length)],
        scale: i < tapCount - 1 ? 1 : 0,
        delay: 0, jiggle: i === tapCount - 1 ? 10 : 0, visible: true,
      }));

      if (tapCount === target) {
        score++; resultState = 'correct';
        setTimeout(() => soundFanfare(), 100);
        spawnConfetti();
        resultTimer = 90; gameState = 'result';
      }
    }
  }
}

canvas.addEventListener('click', e => {
  const r = canvas.getBoundingClientRect();
  const sx = canvas.width / r.width, sy = canvas.height / r.height;
  handleClick((e.clientX - r.left) * sx, (e.clientY - r.top) * sy);
});
canvas.addEventListener('touchstart', e => {
  e.preventDefault();
  const r = canvas.getBoundingClientRect();
  const sx = canvas.width / r.width, sy = canvas.height / r.height;
  const t = e.touches[0];
  handleClick((t.clientX - r.left) * sx, (t.clientY - r.top) * sy);
}, { passive: false });

// ── Choice button layout ───────────────────────────────────────────────────────
const CHOICE_COLORS = ['#e74c3c','#e67e22','#27ae60','#3498db'];
const CHOICE_DARK   = ['#c0392b','#d35400','#1e8449','#2471a3'];

function getChoiceBtns() {
  const r = 42, gap = 12;
  const total = 4;
  const rowW = r * 2 * 2 + gap;
  const startX = W / 2 - rowW / 2 - r;
  const row1Y = 540, row2Y = 540 + r * 2 + gap;
  return [
    { cx: startX + r,             cy: row1Y, r },
    { cx: startX + r * 3 + gap,  cy: row1Y, r },
    { cx: startX + r,             cy: row2Y, r },
    { cx: startX + r * 3 + gap,  cy: row2Y, r },
  ];
}

// ── Drawing ────────────────────────────────────────────────────────────────────
function drawBg() {
  const g = ctx.createLinearGradient(0, 0, 0, H);
  g.addColorStop(0, '#1a0533'); g.addColorStop(1, '#2d1b69');
  ctx.fillStyle = g; ctx.fillRect(0, 0, W, H);
}

function drawHUD() {
  const bx = 22, bw = W - 44;
  ctx.fillStyle = 'rgba(255,255,255,0.12)';
  ctx.beginPath(); ctx.roundRect(bx, PROG_Y - PROG_H / 2, bw, PROG_H, 8); ctx.fill();
  const prog = Math.max(0, (round - 1) / TOTAL_ROUNDS);
  if (prog > 0) {
    const g = ctx.createLinearGradient(bx, 0, bx + bw, 0);
    g.addColorStop(0, '#bd93f9'); g.addColorStop(1, '#ff79c6');
    ctx.fillStyle = g;
    ctx.beginPath(); ctx.roundRect(bx, PROG_Y - PROG_H / 2, bw * prog, PROG_H, 8); ctx.fill();
  }
  ctx.fillStyle = '#fff'; ctx.font = 'bold 20px Arial'; ctx.textAlign = 'left';
  ctx.fillText(`Ronde ${round} / ${TOTAL_ROUNDS}`, 22, HUD_Y);
  ctx.textAlign = 'right';
  ctx.fillText(`Score: ${score}`, W - 22, HUD_Y);
}

function drawModeAScreen() {
  // Label
  ctx.fillStyle = 'rgba(255,255,255,0.65)';
  ctx.font = 'bold 20px Arial'; ctx.textAlign = 'center';
  ctx.fillText('Hoeveel zie je?', W / 2, 82);

  // Animate blobs in
  for (let i = 0; i < blobs.length; i++) {
    const b = blobs[i];
    if (animFrame < b.delay) continue;
    const el = animFrame - b.delay;
    if (el < 8) {
      const t = el / 8;
      const c3 = 2.70158;
      b.scale = 1 + c3 * Math.pow(t - 1, 3) + (c3 - 1) * Math.pow(t - 1, 2);
    } else { b.scale = 1; }
    drawBlob(b.x, b.y, Math.max(0, b.scale), b.color, b.jiggle);
    if (b.jiggle > 0) b.jiggle--;
  }

  // Choice buttons 2x2
  const btns = getChoiceBtns();
  for (let i = 0; i < 4; i++) {
    const b = btns[i];
    const flash = choiceBtnFlash === i && choiceBtnFlashTimer > 0;
    const r2 = flash ? b.r * 1.15 : b.r;
    ctx.shadowColor = 'rgba(0,0,0,0.35)'; ctx.shadowBlur = 10; ctx.shadowOffsetY = 4;
    ctx.beginPath(); ctx.arc(b.cx, b.cy, r2, 0, Math.PI * 2);
    ctx.fillStyle = flash ? CHOICE_DARK[i] : CHOICE_COLORS[i]; ctx.fill();
    ctx.shadowColor = 'transparent';
    ctx.beginPath(); ctx.arc(b.cx - r2 * 0.22, b.cy - r2 * 0.25, r2 * 0.3, 0, Math.PI * 2);
    ctx.fillStyle = 'rgba(255,255,255,0.22)'; ctx.fill();
    ctx.fillStyle = '#fff';
    ctx.font = `bold ${flash ? 32 : 28}px Arial`;
    ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
    ctx.fillText(choices[i], b.cx, b.cy + 1);
    ctx.textBaseline = 'alphabetic';
  }
}

function drawModeBScreen() {
  // Pulsing target number
  bigNumScale += bigNumDir * 0.007;
  if (bigNumScale > 1.12) bigNumDir = -1;
  if (bigNumScale < 0.92) bigNumDir = 1;

  ctx.fillStyle = 'rgba(255,255,255,0.08)';
  ctx.beginPath(); ctx.roundRect(W / 2 - 90, 72, 180, 100, 20); ctx.fill();

  ctx.fillStyle = 'rgba(255,255,255,0.55)';
  ctx.font = '18px Arial'; ctx.textAlign = 'center';
  ctx.fillText('Tik', W / 2, 100);

  ctx.save(); ctx.translate(W / 2, 148); ctx.scale(bigNumScale, bigNumScale);
  ctx.shadowColor = 'rgba(189,147,249,0.7)'; ctx.shadowBlur = 20;
  ctx.fillStyle = '#bd93f9';
  ctx.font = 'bold 68px Arial'; ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
  ctx.fillText(target, 0, 0);
  ctx.textBaseline = 'alphabetic'; ctx.restore();
  ctx.shadowColor = 'transparent';

  ctx.fillStyle = 'rgba(255,255,255,0.55)';
  ctx.font = '18px Arial'; ctx.textAlign = 'center';
  ctx.fillText('keer!', W / 2, 177);

  // Show blobs that have been tapped
  for (let i = 0; i < blobs.length; i++) {
    const b = blobs[i];
    if (b.scale < 1) {
      b.scale = Math.min(1, b.scale + 0.12);
    }
    drawBlob(b.x, b.y, Math.max(0, b.scale), b.color, b.jiggle);
    if (b.jiggle > 0) b.jiggle--;
  }

  // Counter display
  const cy = 498;
  ctx.fillStyle = 'rgba(255,255,255,0.1)';
  ctx.beginPath(); ctx.roundRect(W / 2 - 55, cy - 36, 110, 48, 16); ctx.fill();
  ctx.fillStyle = tapCount >= target ? '#50fa7b' : '#fff';
  ctx.font = `bold 38px Arial`; ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
  ctx.fillText(`${tapCount} / ${target}`, W / 2, cy);
  ctx.textBaseline = 'alphabetic';

  // Tap button
  const bx = W / 2, by = 590, br = 58;
  const jScale = tapBtnJiggle > 0 ? 1 + Math.sin(tapBtnJiggle * 1.2) * 0.08 : 1;
  if (tapBtnJiggle > 0) tapBtnJiggle--;

  const done = tapCount >= target;
  ctx.save(); ctx.translate(bx, by); ctx.scale(jScale, jScale);
  ctx.shadowColor = done ? 'rgba(80,250,123,0.5)' : 'rgba(189,147,249,0.55)';
  ctx.shadowBlur = 20;
  ctx.beginPath(); ctx.arc(0, 0, br, 0, Math.PI * 2);
  ctx.fillStyle = done ? '#50fa7b' : '#bd93f9'; ctx.fill();
  ctx.shadowColor = 'transparent';
  ctx.beginPath(); ctx.arc(-br * 0.23, -br * 0.25, br * 0.3, 0, Math.PI * 2);
  ctx.fillStyle = 'rgba(255,255,255,0.22)'; ctx.fill();
  ctx.fillStyle = done ? '#1a1a2e' : '#fff';
  ctx.font = 'bold 20px Arial'; ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
  ctx.fillText(done ? 'Klaar!' : 'TIK!', 0, 1);
  ctx.textBaseline = 'alphabetic'; ctx.restore();
}

function drawResultOverlay() {
  const alpha = Math.min(1, resultTimer / 20);
  if (resultState === 'correct') {
    if (mode === 'B' && confetti.length > 0) {
      // confetti covers the result
      drawConfetti();
    } else {
      ctx.fillStyle = `rgba(80,250,123,${alpha * 0.18})`; ctx.fillRect(0, 0, W, H);
    }
    ctx.fillStyle = `rgba(80,250,123,${alpha})`;
    ctx.font = 'bold 58px Arial'; ctx.textAlign = 'center';
    ctx.fillText('Super!', W / 2, H / 2 - 15);

    ctx.font = 'bold 28px Arial';
    ctx.fillStyle = `rgba(255,255,255,${alpha})`;
    ctx.fillText(mode === 'A' ? `Het waren er ${target}!` : `Ja! ${target} keer!`, W / 2, H / 2 + 35);

    // Animated stars
    for (let i = 0; i < 3; i++) {
      const sx = W / 2 + (i - 1) * 64, sy = H / 2 + 90;
      const sf = Math.max(0, Math.min(1, (resultTimer - i * 6) / 14));
      if (sf > 0) {
        ctx.save(); ctx.translate(sx, sy); ctx.scale(sf, sf);
        // Draw a gold star
        ctx.shadowColor = 'rgba(241,196,15,0.6)'; ctx.shadowBlur = 12;
        ctx.beginPath();
        for (let k = 0; k < 10; k++) {
          const a = (k * Math.PI) / 5 - Math.PI / 2;
          const r = k % 2 === 0 ? 20 : 9;
          if (k === 0) ctx.moveTo(Math.cos(a) * r, Math.sin(a) * r);
          else ctx.lineTo(Math.cos(a) * r, Math.sin(a) * r);
        }
        ctx.closePath(); ctx.fillStyle = '#f1c40f'; ctx.fill();
        ctx.restore();
      }
    }
  } else {
    ctx.fillStyle = `rgba(255,85,85,${alpha * 0.18})`; ctx.fillRect(0, 0, W, H);
    ctx.fillStyle = `rgba(255,85,85,${alpha})`;
    ctx.font = 'bold 52px Arial'; ctx.textAlign = 'center';
    ctx.fillText('Bijna!', W / 2, H / 2 - 20);
    ctx.font = 'bold 26px Arial'; ctx.fillStyle = `rgba(255,255,255,${alpha})`;
    ctx.fillText(`Het juiste antwoord: ${target}`, W / 2, H / 2 + 35);
  }
}

function drawStartScreen() {
  drawBg();
  ctx.fillStyle = 'rgba(255,255,255,0.06)';
  ctx.beginPath(); ctx.arc(50, 90, 55, 0, Math.PI * 2); ctx.fill();
  ctx.beginPath(); ctx.arc(340, 110, 40, 0, Math.PI * 2); ctx.fill();

  ctx.fillStyle = 'rgba(255,255,255,0.08)';
  ctx.beginPath(); ctx.roundRect(28, 110, W - 56, 240, 26); ctx.fill();

  ctx.fillStyle = '#bd93f9';
  ctx.font = 'bold 44px Arial'; ctx.textAlign = 'center';
  ctx.fillText('Tellen tot 20', W / 2, 184);

  ctx.fillStyle = '#fff'; ctx.font = 'bold 26px Arial';
  ctx.fillText('Hoeveel zie je?', W / 2, 230);
  ctx.fillText('Of tik het juiste aantal!', W / 2, 266);

  ctx.fillStyle = 'rgba(255,255,255,0.6)';
  ctx.font = '18px Arial';
  ctx.fillText('Voor kinderen van 4-5 jaar', W / 2, 304);
  ctx.fillText('10 ronden', W / 2, 328);

  // Demo blobs
  const t = Date.now() / 1000;
  const blobDemo = [
    { x: 65, y: 445, col: '#ff9eb5' },
    { x: 140, y: 430, col: '#b5ead7' },
    { x: 220, y: 450, col: '#c7ceea' },
    { x: 300, y: 432, col: '#ffdac1' },
    { x: 360, y: 445, col: '#b5deff' },
  ];
  blobDemo.forEach((b, i) => {
    const sc = 0.9 + Math.sin(t + i * 0.8) * 0.08;
    drawBlob(b.x, b.y, sc, b.col, 0);
  });

  const pulse = 1 + Math.sin(t * 3) * 0.045;
  ctx.save(); ctx.translate(W / 2, 598); ctx.scale(pulse, pulse);
  ctx.shadowColor = 'rgba(189,147,249,0.6)'; ctx.shadowBlur = 24;
  ctx.beginPath(); ctx.roundRect(-108, -32, 216, 64, 32);
  ctx.fillStyle = '#bd93f9'; ctx.fill();
  ctx.shadowColor = 'transparent';
  ctx.fillStyle = '#1a0533'; ctx.font = 'bold 27px Arial';
  ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
  ctx.fillText('SPELEN!', 0, 1);
  ctx.textBaseline = 'alphabetic'; ctx.restore();
}

function drawEndScreen() {
  drawBg();
  if (confetti.length > 0) { updateConfetti(); drawConfetti(); }

  ctx.fillStyle = 'rgba(255,255,255,0.1)';
  ctx.beginPath(); ctx.roundRect(38, 145, W - 76, 310, 28); ctx.fill();

  ctx.fillStyle = '#bd93f9';
  ctx.font = 'bold 48px Arial'; ctx.textAlign = 'center';
  ctx.fillText('Klaar!', W / 2, 225);

  ctx.fillStyle = '#fff'; ctx.font = 'bold 64px Arial';
  ctx.fillText(`${score} / ${TOTAL_ROUNDS}`, W / 2, 322);

  ctx.font = '22px Arial'; ctx.fillStyle = 'rgba(255,255,255,0.85)';
  const pct = score / TOTAL_ROUNDS;
  if (pct === 1) ctx.fillText('Fantastisch! Perfect!', W / 2, 376);
  else if (pct >= 0.7) ctx.fillText('Heel goed gedaan!', W / 2, 376);
  else if (pct >= 0.4) ctx.fillText('Goed geprobeerd!', W / 2, 376);
  else ctx.fillText('Blijf oefenen!', W / 2, 376);

  const stars = pct === 1 ? 3 : pct >= 0.7 ? 2 : 1;
  for (let i = 0; i < 3; i++) {
    ctx.save(); ctx.translate(W / 2 + (i - 1) * 58, 420);
    ctx.globalAlpha = i < stars ? 1 : 0.22;
    ctx.shadowColor = 'rgba(241,196,15,0.6)'; ctx.shadowBlur = 10;
    ctx.beginPath();
    for (let k = 0; k < 10; k++) {
      const a = (k * Math.PI) / 5 - Math.PI / 2;
      const r = k % 2 === 0 ? 20 : 9;
      if (k === 0) ctx.moveTo(Math.cos(a) * r, Math.sin(a) * r);
      else ctx.lineTo(Math.cos(a) * r, Math.sin(a) * r);
    }
    ctx.closePath(); ctx.fillStyle = '#f1c40f'; ctx.fill();
    ctx.restore();
  }
  ctx.globalAlpha = 1; ctx.shadowColor = 'transparent';

  const t = Date.now() / 1000;
  const pulse = 1 + Math.sin(t * 3) * 0.045;
  ctx.save(); ctx.translate(W / 2, 573); ctx.scale(pulse, pulse);
  ctx.shadowColor = 'rgba(80,250,123,0.5)'; ctx.shadowBlur = 20;
  ctx.beginPath(); ctx.roundRect(-115, -32, 230, 64, 32);
  ctx.fillStyle = '#50fa7b'; ctx.fill();
  ctx.shadowColor = 'transparent';
  ctx.fillStyle = '#1a0533'; ctx.font = 'bold 25px Arial';
  ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
  ctx.fillText('Nog een keer', 0, 1);
  ctx.textBaseline = 'alphabetic'; ctx.restore();
}

// ── Main loop ──────────────────────────────────────────────────────────────────
function loop() {
  ctx.clearRect(0, 0, W, H);

  if (gameState === 'start') {
    drawStartScreen();
  } else if (gameState === 'end') {
    drawEndScreen();
  } else {
    drawBg(); drawHUD();
    if (mode === 'A') drawModeAScreen();
    else drawModeBScreen();
    animFrame++;
    if (choiceBtnFlashTimer > 0) choiceBtnFlashTimer--;

    if (gameState === 'result') {
      if (mode === 'B' && confetti.length > 0) updateConfetti();
      drawResultOverlay();
      resultTimer--;
      if (resultTimer <= 0) {
        confetti = [];
        if (round >= TOTAL_ROUNDS) {
          gameState = 'end'; spawnConfetti();
        } else {
          gameState = 'playing'; newRound();
        }
      }
    }
  }
  requestAnimationFrame(loop);
}
loop();
</script>
