<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Dierengeluiden</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #1a1a2e;
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 100vh;
    overflow: hidden;
    font-family: 'Arial Rounded MT Bold', Arial, sans-serif;
  }
  canvas { display: block; touch-action: none; }
</style>
</head>
<body>
<canvas id="game" width="390" height="700"></canvas>
<script>
const canvas = document.getElementById('game');
const ctx = canvas.getContext('2d');

// ─── State ───────────────────────────────────────────────────────────────────
const TOTAL_ROUNDS = 10;
let round = 0;
let score = 0;
let phase = 'start';   // start | question | feedback | end
let correctAnimal = null;
let choices = [];
let feedbackCorrect = false;
let stars = [];
let animFrame = 0;
let listenBtn = { x: 120, y: 490, w: 150, h: 60 };
let choiceBtns = [];
let startBtn = { x: 95, y: 520, w: 200, h: 70 };
let replayBtn = { x: 95, y: 560, w: 200, h: 70 };

// ─── Animals ─────────────────────────────────────────────────────────────────
const ANIMALS = [
  { name: 'Kat',     emoji: '🐱', color: '#ff9f43', sound: makeCatSound },
  { name: 'Hond',    emoji: '🐶', color: '#ee5a24', sound: makeDogSound },
  { name: 'Koe',     emoji: '🐮', color: '#6ab04c', sound: makeCowSound },
  { name: 'Kikker',  emoji: '🐸', color: '#22a6b3', sound: makeFrogSound },
  { name: 'Varken',  emoji: '🐷', color: '#e84393', sound: makePigSound },
  { name: 'Paard',   emoji: '🐴', color: '#8854d0', sound: makeHorseSound },
  { name: 'Kip',     emoji: '🐔', color: '#f9ca24', sound: makeChickenSound },
  { name: 'Schaap',  emoji: '🐑', color: '#badc58', sound: makeSheepSound },
];

// ─── Web Audio ────────────────────────────────────────────────────────────────
let audioCtx = null;
function getAudio() {
  if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  return audioCtx;
}

function playTone(freq, type, start, dur, vol, ac, dest) {
  const osc = ac.createOscillator();
  const gain = ac.createGain();
  osc.connect(gain); gain.connect(dest);
  osc.type = type; osc.frequency.value = freq;
  gain.gain.setValueAtTime(0, ac.currentTime + start);
  gain.gain.linearRampToValueAtTime(vol, ac.currentTime + start + 0.02);
  gain.gain.linearRampToValueAtTime(0, ac.currentTime + start + dur);
  osc.start(ac.currentTime + start);
  osc.stop(ac.currentTime + start + dur + 0.05);
}

function playNoise(start, dur, vol, ac, dest) {
  const bufLen = ac.sampleRate * dur;
  const buf = ac.createBuffer(1, bufLen, ac.sampleRate);
  const data = buf.getChannelData(0);
  for (let i = 0; i < bufLen; i++) data[i] = Math.random() * 2 - 1;
  const src = ac.createBufferSource();
  src.buffer = buf;
  const gain = ac.createGain();
  src.connect(gain); gain.connect(dest);
  gain.gain.setValueAtTime(vol, ac.currentTime + start);
  gain.gain.linearRampToValueAtTime(0, ac.currentTime + start + dur);
  src.start(ac.currentTime + start);
  src.stop(ac.currentTime + start + dur + 0.05);
}

function makeCatSound() {
  const ac = getAudio();
  // "miauw" — rising then falling sine
  [0, 0.35, 0.7].forEach(t => {
    playTone(900, 'sine', t, 0.08, 0.4, ac, ac.destination);
    playTone(700, 'sine', t + 0.08, 0.22, 0.35, ac, ac.destination);
  });
}

function makeDogSound() {
  const ac = getAudio();
  // "woef woef" — two barks
  [0, 0.45].forEach(t => {
    playTone(320, 'sawtooth', t,      0.08, 0.5, ac, ac.destination);
    playTone(240, 'sawtooth', t+0.08, 0.15, 0.4, ac, ac.destination);
    playNoise(t, 0.12, 0.15, ac, ac.destination);
  });
}

function makeCowSound() {
  const ac = getAudio();
  // "mooo" — low long tone with vibrato
  const osc = ac.createOscillator();
  const lfo = ac.createOscillator();
  const lfoGain = ac.createGain();
  const gain = ac.createGain();
  lfo.frequency.value = 5; lfo.type = 'sine';
  lfoGain.gain.value = 15;
  lfo.connect(lfoGain); lfoGain.connect(osc.frequency);
  osc.connect(gain); gain.connect(ac.destination);
  osc.type = 'sawtooth'; osc.frequency.value = 160;
  gain.gain.setValueAtTime(0, ac.currentTime);
  gain.gain.linearRampToValueAtTime(0.5, ac.currentTime + 0.1);
  gain.gain.linearRampToValueAtTime(0, ac.currentTime + 0.9);
  lfo.start(ac.currentTime); osc.start(ac.currentTime);
  lfo.stop(ac.currentTime + 1); osc.stop(ac.currentTime + 1);
}

function makeFrogSound() {
  const ac = getAudio();
  // "ribbit" — quick chirps
  for (let i = 0; i < 3; i++) {
    const t = i * 0.25;
    playTone(600, 'square', t,       0.04, 0.35, ac, ac.destination);
    playTone(500, 'square', t+0.05,  0.06, 0.3,  ac, ac.destination);
    playTone(600, 'square', t+0.12,  0.04, 0.35, ac, ac.destination);
  }
}

function makePigSound() {
  const ac = getAudio();
  // "oink" — nasal, rising
  [0, 0.4].forEach(t => {
    const osc = ac.createOscillator();
    const gain = ac.createGain();
    osc.connect(gain); gain.connect(ac.destination);
    osc.type = 'triangle';
    osc.frequency.setValueAtTime(350, ac.currentTime + t);
    osc.frequency.linearRampToValueAtTime(280, ac.currentTime + t + 0.2);
    gain.gain.setValueAtTime(0, ac.currentTime + t);
    gain.gain.linearRampToValueAtTime(0.45, ac.currentTime + t + 0.03);
    gain.gain.linearRampToValueAtTime(0, ac.currentTime + t + 0.22);
    osc.start(ac.currentTime + t); osc.stop(ac.currentTime + t + 0.25);
  });
}

function makeHorseSound() {
  const ac = getAudio();
  // "hiii" — fast tremolo
  const osc = ac.createOscillator();
  const lfo = ac.createOscillator();
  const lfoGain = ac.createGain();
  const gain = ac.createGain();
  lfo.frequency.value = 20; lfo.type = 'sine';
  lfoGain.gain.value = 30;
  lfo.connect(lfoGain); lfoGain.connect(osc.frequency);
  osc.connect(gain); gain.connect(ac.destination);
  osc.type = 'sawtooth';
  osc.frequency.setValueAtTime(600, ac.currentTime);
  osc.frequency.linearRampToValueAtTime(300, ac.currentTime + 0.7);
  gain.gain.setValueAtTime(0, ac.currentTime);
  gain.gain.linearRampToValueAtTime(0.4, ac.currentTime + 0.05);
  gain.gain.linearRampToValueAtTime(0, ac.currentTime + 0.75);
  lfo.start(ac.currentTime); osc.start(ac.currentTime);
  lfo.stop(ac.currentTime + 0.8); osc.stop(ac.currentTime + 0.8);
}

function makeChickenSound() {
  const ac = getAudio();
  // "tok tok tok"
  for (let i = 0; i < 4; i++) {
    const t = i * 0.18;
    playTone(800,  'square',   t,        0.04, 0.3, ac, ac.destination);
    playTone(1000, 'triangle', t + 0.04, 0.06, 0.25, ac, ac.destination);
    playNoise(t, 0.06, 0.1, ac, ac.destination);
  }
}

function makeSheepSound() {
  const ac = getAudio();
  // "bèè" — nasal sustained
  const osc = ac.createOscillator();
  const osc2 = ac.createOscillator();
  const gain = ac.createGain();
  osc.connect(gain); osc2.connect(gain); gain.connect(ac.destination);
  osc.type = 'sawtooth'; osc.frequency.value = 400;
  osc2.type = 'sine';    osc2.frequency.value = 404; // slight detune
  gain.gain.setValueAtTime(0, ac.currentTime);
  gain.gain.linearRampToValueAtTime(0.3, ac.currentTime + 0.1);
  gain.gain.setValueAtTime(0.3, ac.currentTime + 0.5);
  gain.gain.linearRampToValueAtTime(0, ac.currentTime + 0.8);
  osc.start(ac.currentTime); osc2.start(ac.currentTime);
  osc.stop(ac.currentTime + 0.9); osc2.stop(ac.currentTime + 0.9);
}

// ─── Helpers ──────────────────────────────────────────────────────────────────
function shuffle(arr) {
  const a = [...arr];
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

function newRound() {
  const pool = shuffle(ANIMALS);
  correctAnimal = pool[0];
  choices = [pool[0], pool[1], pool[2]];
  choices = shuffle(choices);
  choiceBtns = [];
  const btnW = 100, btnH = 110;
  const spacing = (390 - 3 * btnW) / 4;
  choices.forEach((a, i) => {
    choiceBtns.push({
      x: spacing + i * (btnW + spacing),
      y: 340,
      w: btnW,
      h: btnH,
      animal: a
    });
  });
  stars = [];
  phase = 'question';
}

function spawnStars(x, y) {
  for (let i = 0; i < 20; i++) {
    const angle = Math.random() * Math.PI * 2;
    const speed = 3 + Math.random() * 5;
    stars.push({
      x, y,
      vx: Math.cos(angle) * speed,
      vy: Math.sin(angle) * speed,
      r: 6 + Math.random() * 8,
      color: `hsl(${Math.random()*360},100%,60%)`,
      life: 1.0
    });
  }
}

// ─── Drawing ──────────────────────────────────────────────────────────────────
function drawBg() {
  // Night sky gradient
  const grad = ctx.createLinearGradient(0, 0, 0, 700);
  grad.addColorStop(0, '#0f0c29');
  grad.addColorStop(1, '#302b63');
  ctx.fillStyle = grad;
  ctx.fillRect(0, 0, 390, 700);

  // Twinkling dots
  ctx.fillStyle = 'rgba(255,255,255,0.6)';
  const dots = [[30,40],[80,70],[150,20],[220,55],[310,30],[360,80],[50,120],[280,100]];
  dots.forEach(([dx,dy]) => {
    const r = 1.5 + Math.sin(animFrame * 0.05 + dx) * 1;
    ctx.beginPath(); ctx.arc(dx, dy, r, 0, Math.PI*2); ctx.fill();
  });
}

function drawRoundedRect(x, y, w, h, r, fill, stroke) {
  ctx.beginPath();
  ctx.moveTo(x+r, y);
  ctx.lineTo(x+w-r, y); ctx.arcTo(x+w, y, x+w, y+r, r);
  ctx.lineTo(x+w, y+h-r); ctx.arcTo(x+w, y+h, x+w-r, y+h, r);
  ctx.lineTo(x+r, y+h); ctx.arcTo(x, y+h, x, y+h-r, r);
  ctx.lineTo(x, y+r); ctx.arcTo(x, y, x+r, y, r);
  ctx.closePath();
  if (fill) { ctx.fillStyle = fill; ctx.fill(); }
  if (stroke) { ctx.strokeStyle = stroke; ctx.lineWidth = 3; ctx.stroke(); }
}

function drawEmoji(emoji, x, y, size) {
  ctx.font = `${size}px serif`;
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  ctx.fillText(emoji, x, y);
}

function drawStartScreen() {
  drawBg();
  drawEmoji('🐾', 195, 120, 80);
  ctx.font = 'bold 34px Arial';
  ctx.fillStyle = '#fff';
  ctx.textAlign = 'center';
  ctx.fillText('Dierengeluiden', 195, 220);
  ctx.font = '20px Arial';
  ctx.fillStyle = '#badc58';
  ctx.fillText('Hoor het geluid —', 195, 270);
  ctx.fillText('kies het juiste dier!', 195, 300);

  // Dieren preview
  const ems = ['🐱','🐶','🐮','🐸'];
  ems.forEach((e, i) => drawEmoji(e, 60 + i * 80, 390, 48));

  drawRoundedRect(startBtn.x, startBtn.y, startBtn.w, startBtn.h, 18, '#f9ca24', null);
  ctx.font = 'bold 26px Arial';
  ctx.fillStyle = '#1a1a2e';
  ctx.textAlign = 'center';
  ctx.fillText('▶  SPELEN', startBtn.x + startBtn.w/2, startBtn.y + startBtn.h/2 + 2);
}

function drawQuestion() {
  drawBg();

  // Header
  ctx.font = 'bold 22px Arial';
  ctx.fillStyle = '#fff';
  ctx.textAlign = 'center';
  ctx.fillText(`Ronde ${round} / ${TOTAL_ROUNDS}`, 195, 40);

  // Score
  ctx.font = '18px Arial';
  ctx.fillStyle = '#f9ca24';
  ctx.fillText(`⭐ ${score}`, 195, 68);

  // Instruction
  ctx.font = 'bold 24px Arial';
  ctx.fillStyle = '#badc58';
  ctx.fillText('Welk dier hoor je?', 195, 110);

  // Big listen button
  const pulse = 1 + Math.sin(animFrame * 0.08) * 0.05;
  ctx.save();
  ctx.translate(listenBtn.x + listenBtn.w/2, listenBtn.y + listenBtn.h/2);
  ctx.scale(pulse, pulse);
  drawRoundedRect(-listenBtn.w/2, -listenBtn.h/2, listenBtn.w, listenBtn.h, 20, '#8854d0', '#fff');
  ctx.font = 'bold 28px Arial';
  ctx.fillStyle = '#fff';
  ctx.textAlign = 'center';
  ctx.fillText('🔊  Luister', 0, 9);
  ctx.restore();

  // Animal choice buttons
  choiceBtns.forEach(btn => {
    drawRoundedRect(btn.x, btn.y, btn.w, btn.h, 16, btn.animal.color + 'cc', '#fff');
    drawEmoji(btn.animal.emoji, btn.x + btn.w/2, btn.y + btn.h/2 - 10, 52);
    ctx.font = 'bold 15px Arial';
    ctx.fillStyle = '#fff';
    ctx.textAlign = 'center';
    ctx.shadowColor = '#0008';
    ctx.shadowBlur = 4;
    ctx.fillText(btn.animal.name, btn.x + btn.w/2, btn.y + btn.h - 14);
    ctx.shadowBlur = 0;
  });

  // Stars
  drawStars();
}

function drawFeedback() {
  drawBg();
  drawStars();

  const pulse = 1 + Math.sin(animFrame * 0.12) * 0.08;
  ctx.save();
  ctx.translate(195, 280);
  ctx.scale(pulse, pulse);
  drawEmoji(correctAnimal.emoji, 0, -60, 110);
  ctx.font = 'bold 36px Arial';
  ctx.fillStyle = feedbackCorrect ? '#badc58' : '#ff6b6b';
  ctx.textAlign = 'center';
  ctx.fillText(feedbackCorrect ? '🎉 Goed zo!' : '😊 Bijna!', 0, 60);
  ctx.font = '24px Arial';
  ctx.fillStyle = '#fff';
  ctx.fillText(`Het was: ${correctAnimal.name} ${correctAnimal.emoji}`, 0, 100);
  ctx.restore();
}

function drawEndScreen() {
  drawBg();
  drawStars();
  drawEmoji('🏆', 195, 160, 90);
  ctx.font = 'bold 32px Arial';
  ctx.fillStyle = '#f9ca24';
  ctx.textAlign = 'center';
  ctx.fillText('Klaar!', 195, 280);
  ctx.font = '26px Arial';
  ctx.fillStyle = '#fff';
  ctx.fillText(`Score: ${score} / ${TOTAL_ROUNDS}`, 195, 330);

  const msg = score >= 8 ? 'Wauw, super goed! 🌟' :
               score >= 5 ? 'Goed gedaan! 👍' : 'Blijven oefenen! 💪';
  ctx.font = '22px Arial';
  ctx.fillStyle = '#badc58';
  ctx.fillText(msg, 195, 380);

  drawRoundedRect(replayBtn.x, replayBtn.y, replayBtn.w, replayBtn.h, 18, '#f9ca24', null);
  ctx.font = 'bold 24px Arial';
  ctx.fillStyle = '#1a1a2e';
  ctx.textAlign = 'center';
  ctx.fillText('🔄 Opnieuw', replayBtn.x + replayBtn.w/2, replayBtn.y + replayBtn.h/2 + 2);
}

function drawStars() {
  stars.forEach(s => {
    ctx.save();
    ctx.globalAlpha = s.life;
    ctx.fillStyle = s.color;
    ctx.beginPath();
    // Draw star shape
    for (let i = 0; i < 5; i++) {
      const a = (i * 4 * Math.PI / 5) - Math.PI/2;
      const b = a + 2 * Math.PI / 10;
      if (i === 0) ctx.moveTo(s.x + Math.cos(a)*s.r, s.y + Math.sin(a)*s.r);
      else ctx.lineTo(s.x + Math.cos(a)*s.r, s.y + Math.sin(a)*s.r);
      ctx.lineTo(s.x + Math.cos(b)*s.r*0.4, s.y + Math.sin(b)*s.r*0.4);
    }
    ctx.closePath(); ctx.fill();
    ctx.restore();
  });
}

// ─── Update ───────────────────────────────────────────────────────────────────
function update() {
  animFrame++;
  stars.forEach(s => {
    s.x += s.vx; s.y += s.vy;
    s.vy += 0.15;
    s.life -= 0.018;
  });
  stars = stars.filter(s => s.life > 0);
}

// ─── Render loop ─────────────────────────────────────────────────────────────
function render() {
  update();
  ctx.clearRect(0, 0, 390, 700);
  if (phase === 'start')    drawStartScreen();
  else if (phase === 'question') drawQuestion();
  else if (phase === 'feedback') drawFeedback();
  else if (phase === 'end')  drawEndScreen();
  requestAnimationFrame(render);
}

// ─── Input ───────────────────────────────────────────────────────────────────
function getPos(e) {
  const rect = canvas.getBoundingClientRect();
  const scaleX = canvas.width  / rect.width;
  const scaleY = canvas.height / rect.height;
  if (e.touches) {
    return {
      x: (e.touches[0].clientX - rect.left) * scaleX,
      y: (e.touches[0].clientY - rect.top)  * scaleY
    };
  }
  return {
    x: (e.clientX - rect.left) * scaleX,
    y: (e.clientY - rect.top)  * scaleY
  };
}

function inRect(pos, rect) {
  return pos.x >= rect.x && pos.x <= rect.x + rect.w &&
         pos.y >= rect.y && pos.y <= rect.y + rect.h;
}

let feedbackTimer = null;

function handleTap(pos) {
  if (phase === 'start') {
    if (inRect(pos, startBtn)) {
      score = 0; round = 0;
      round++;
      newRound();
    }
    return;
  }

  if (phase === 'question') {
    if (inRect(pos, listenBtn)) {
      correctAnimal.sound();
      return;
    }
    for (const btn of choiceBtns) {
      if (inRect(pos, btn)) {
        feedbackCorrect = (btn.animal === correctAnimal);
        if (feedbackCorrect) {
          score++;
          spawnStars(btn.x + btn.w/2, btn.y + btn.h/2);
          spawnStars(195, 350);
        }
        phase = 'feedback';
        if (feedbackTimer) clearTimeout(feedbackTimer);
        feedbackTimer = setTimeout(() => {
          if (round >= TOTAL_ROUNDS) {
            phase = 'end';
            spawnStars(195, 300);
          } else {
            round++;
            newRound();
          }
        }, 1800);
        return;
      }
    }
  }

  if (phase === 'end') {
    if (inRect(pos, replayBtn)) {
      score = 0; round = 1;
      newRound();
    }
  }
}

canvas.onclick = function(e) { handleTap(getPos(e)); };
canvas.ontouchstart = function(e) {
  e.preventDefault();
  handleTap(getPos(e));
};

// ─── Boot ────────────────────────────────────────────────────────────────────
render();
</script>
</body>
</html>
