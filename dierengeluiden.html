<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Dierengeluiden</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body {
    width: 100%; height: 100%;
    background: #060318;
    display: flex; align-items: center; justify-content: center;
    overflow: hidden;
    font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
  }
  #gameCanvas {
    display: block;
    touch-action: none;
    cursor: pointer;
  }
</style>
</head>
<body>
<canvas id="gameCanvas"></canvas>
<script>
// ============================================================
//  DIERENGELUIDEN — Complete HTML5 Canvas Game
// ============================================================

const canvas = document.getElementById('gameCanvas');
const ctx = canvas.getContext('2d');

const DESIGN_W = 390;
const DESIGN_H = 700;
let scale = 1;

function resize() {
  const scaleX = window.innerWidth  / DESIGN_W;
  const scaleY = window.innerHeight / DESIGN_H;
  scale = Math.min(scaleX, scaleY);
  canvas.width  = DESIGN_W * scale;
  canvas.height = DESIGN_H * scale;
  ctx.setTransform(scale, 0, 0, scale, 0, 0);
}
resize();
window.addEventListener('resize', resize);

// ============================================================
//  AUDIO ENGINE
// ============================================================
let audioCtx = null;
function getAudioCtx() {
  if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  if (audioCtx.state === 'suspended') audioCtx.resume();
  return audioCtx;
}

function playMeow() {
  const ac = getAudioCtx();
  const t  = ac.currentTime;
  const osc = ac.createOscillator();
  const gain = ac.createGain();
  osc.type = 'sine';
  osc.frequency.setValueAtTime(800, t);
  osc.frequency.linearRampToValueAtTime(400, t + 0.6);
  osc.frequency.linearRampToValueAtTime(650, t + 0.8);
  const vib = ac.createOscillator();
  const vibGain = ac.createGain();
  vib.frequency.value = 5;
  vibGain.gain.value  = 20;
  vib.connect(vibGain);
  vibGain.connect(osc.frequency);
  gain.gain.setValueAtTime(0, t);
  gain.gain.linearRampToValueAtTime(0.5, t + 0.05);
  gain.gain.linearRampToValueAtTime(0.3, t + 0.7);
  gain.gain.linearRampToValueAtTime(0,   t + 0.9);
  osc.connect(gain); gain.connect(ac.destination);
  vib.start(t); osc.start(t);
  vib.stop(t + 0.9); osc.stop(t + 0.9);
}

function playBark() {
  const ac = getAudioCtx();
  function oneBark(delay) {
    const t = ac.currentTime + delay;
    const buf = ac.createBuffer(1, ac.sampleRate * 0.05, ac.sampleRate);
    const d = buf.getChannelData(0);
    for (let i = 0; i < d.length; i++) d[i] = Math.random() * 2 - 1;
    const noise = ac.createBufferSource();
    noise.buffer = buf;
    const ng = ac.createGain();
    ng.gain.setValueAtTime(0.3, t);
    ng.gain.exponentialRampToValueAtTime(0.001, t + 0.05);
    noise.connect(ng); ng.connect(ac.destination);
    noise.start(t);
    const osc = ac.createOscillator();
    const og  = ac.createGain();
    osc.type = 'sawtooth';
    osc.frequency.value = 180;
    og.gain.setValueAtTime(0.4, t + 0.05);
    og.gain.exponentialRampToValueAtTime(0.001, t + 0.35);
    osc.connect(og); og.connect(ac.destination);
    osc.start(t + 0.05); osc.stop(t + 0.35);
    noise.stop(t + 0.05);
  }
  oneBark(0); oneBark(0.45);
}

function playMoo() {
  const ac = getAudioCtx();
  const t  = ac.currentTime;
  const osc1 = ac.createOscillator();
  const osc2 = ac.createOscillator();
  const filt = ac.createBiquadFilter();
  const gain = ac.createGain();
  osc1.type = 'sawtooth'; osc2.type = 'sawtooth';
  osc1.frequency.setValueAtTime(80, t);
  osc1.frequency.linearRampToValueAtTime(120, t + 0.8);
  osc1.frequency.linearRampToValueAtTime(90,  t + 1.5);
  osc2.frequency.setValueAtTime(160, t);
  osc2.frequency.linearRampToValueAtTime(240, t + 0.8);
  osc2.frequency.linearRampToValueAtTime(180, t + 1.5);
  filt.type = 'lowpass'; filt.frequency.value = 400;
  const g2 = ac.createGain(); g2.gain.value = 0.5;
  gain.gain.setValueAtTime(0, t);
  gain.gain.linearRampToValueAtTime(0.5, t + 0.15);
  gain.gain.setValueAtTime(0.5, t + 1.3);
  gain.gain.linearRampToValueAtTime(0, t + 1.6);
  osc1.connect(filt); osc2.connect(g2); g2.connect(filt);
  filt.connect(gain); gain.connect(ac.destination);
  osc1.start(t); osc2.start(t);
  osc1.stop(t + 1.7); osc2.stop(t + 1.7);
}

function playKwak() {
  const ac = getAudioCtx();
  function oneKwak(delay) {
    const t = ac.currentTime + delay;
    const osc  = ac.createOscillator();
    const gain = ac.createGain();
    osc.type = 'square';
    osc.frequency.setValueAtTime(300, t);
    osc.frequency.linearRampToValueAtTime(600, t + 0.07);
    osc.frequency.linearRampToValueAtTime(300, t + 0.15);
    gain.gain.setValueAtTime(0.4, t);
    gain.gain.linearRampToValueAtTime(0, t + 0.18);
    osc.connect(gain); gain.connect(ac.destination);
    osc.start(t); osc.stop(t + 0.2);
  }
  oneKwak(0); oneKwak(0.25); oneKwak(0.5);
}

function playOink() {
  const ac = getAudioCtx();
  const t  = ac.currentTime;
  const osc  = ac.createOscillator();
  const dist = ac.createWaveShaper();
  const gain = ac.createGain();
  const curve = new Float32Array(256);
  for (let i = 0; i < 256; i++) {
    const x = (i * 2) / 256 - 1;
    curve[i] = (Math.PI + 200) * x / (Math.PI + 200 * Math.abs(x));
  }
  dist.curve = curve;
  osc.type = 'sawtooth';
  osc.frequency.setValueAtTime(400, t);
  osc.frequency.linearRampToValueAtTime(600, t + 0.2);
  osc.frequency.linearRampToValueAtTime(350, t + 0.45);
  gain.gain.setValueAtTime(0, t);
  gain.gain.linearRampToValueAtTime(0.35, t + 0.05);
  gain.gain.linearRampToValueAtTime(0.3,  t + 0.35);
  gain.gain.linearRampToValueAtTime(0,    t + 0.5);
  osc.connect(dist); dist.connect(gain); gain.connect(ac.destination);
  osc.start(t); osc.stop(t + 0.55);
}

function playNeigh() {
  const ac = getAudioCtx();
  const t  = ac.currentTime;
  const osc  = ac.createOscillator();
  const gain = ac.createGain();
  osc.type = 'sawtooth';
  osc.frequency.setValueAtTime(300, t);
  osc.frequency.linearRampToValueAtTime(900, t + 0.8);
  const trem = ac.createOscillator();
  const tremGain = ac.createGain();
  trem.frequency.value = 8; tremGain.gain.value = 50;
  trem.connect(tremGain); tremGain.connect(osc.frequency);
  osc.frequency.linearRampToValueAtTime(400, t + 1.1);
  gain.gain.setValueAtTime(0, t);
  gain.gain.linearRampToValueAtTime(0.4, t + 0.1);
  gain.gain.linearRampToValueAtTime(0.4, t + 0.9);
  gain.gain.linearRampToValueAtTime(0,   t + 1.2);
  osc.connect(gain); gain.connect(ac.destination);
  trem.start(t); osc.start(t);
  trem.stop(t + 1.3); osc.stop(t + 1.3);
}

function playCluck() {
  const ac = getAudioCtx();
  function oneCluck(delay) {
    const t = ac.currentTime + delay;
    const osc  = ac.createOscillator();
    const gain = ac.createGain();
    osc.type = 'triangle';
    osc.frequency.setValueAtTime(800, t);
    osc.frequency.linearRampToValueAtTime(1200, t + 0.08);
    gain.gain.setValueAtTime(0.4, t);
    gain.gain.linearRampToValueAtTime(0, t + 0.1);
    osc.connect(gain); gain.connect(ac.destination);
    osc.start(t); osc.stop(t + 0.12);
  }
  oneCluck(0); oneCluck(0.14); oneCluck(0.28); oneCluck(0.42);
}

function playBaa() {
  const ac = getAudioCtx();
  const t  = ac.currentTime;
  const osc1 = ac.createOscillator();
  const osc2 = ac.createOscillator();
  const gain = ac.createGain();
  osc1.type = 'sine'; osc2.type = 'sine';
  const lfo = ac.createOscillator();
  const lfoGain = ac.createGain();
  lfo.frequency.value = 4; lfoGain.gain.value = 30;
  lfo.connect(lfoGain); lfoGain.connect(osc1.frequency);
  osc1.frequency.value = 250;
  osc2.frequency.value = 500;
  const g2 = ac.createGain(); g2.gain.value = 0.3;
  gain.gain.setValueAtTime(0, t);
  gain.gain.linearRampToValueAtTime(0.5, t + 0.1);
  gain.gain.setValueAtTime(0.5, t + 0.55);
  gain.gain.linearRampToValueAtTime(0, t + 0.75);
  osc1.connect(gain); osc2.connect(g2); g2.connect(gain);
  gain.connect(ac.destination);
  lfo.start(t); osc1.start(t); osc2.start(t);
  lfo.stop(t + 0.8); osc1.stop(t + 0.8); osc2.stop(t + 0.8);
}

function playHappyJingle() {
  const ac = getAudioCtx();
  const notes = [523, 659, 784, 1047];
  notes.forEach((freq, i) => {
    const t = ac.currentTime + i * 0.13;
    const o = ac.createOscillator();
    const g = ac.createGain();
    o.type = 'triangle'; o.frequency.value = freq;
    g.gain.setValueAtTime(0.4, t);
    g.gain.exponentialRampToValueAtTime(0.001, t + 0.15);
    o.connect(g); g.connect(ac.destination);
    o.start(t); o.stop(t + 0.18);
  });
}

function playSadTone() {
  const ac = getAudioCtx();
  const notes = [523, 440, 349];
  notes.forEach((freq, i) => {
    const t = ac.currentTime + i * 0.18;
    const o = ac.createOscillator();
    const g = ac.createGain();
    o.type = 'sine'; o.frequency.value = freq;
    g.gain.setValueAtTime(0.35, t);
    g.gain.exponentialRampToValueAtTime(0.001, t + 0.2);
    o.connect(g); g.connect(ac.destination);
    o.start(t); o.stop(t + 0.22);
  });
}

function playFireworkSound() {
  const ac = getAudioCtx();
  for (let i = 0; i < 5; i++) {
    const t = ac.currentTime + i * 0.22;
    const freq = 300 + Math.random() * 800;
    const o = ac.createOscillator();
    const g = ac.createGain();
    o.type = 'triangle'; o.frequency.value = freq;
    g.gain.setValueAtTime(0.3, t);
    g.gain.exponentialRampToValueAtTime(0.001, t + 0.3);
    o.connect(g); g.connect(ac.destination);
    o.start(t); o.stop(t + 0.35);
  }
}

const SOUND_FNS = {
  'Kat':   playMeow,
  'Hond':  playBark,
  'Koe':   playMoo,
  'Kikker':playKwak,
  'Varken':playOink,
  'Paard': playNeigh,
  'Kip':   playCluck,
  'Schaap':playBaa,
};

// ============================================================
//  ANIMAL DRAWING FUNCTIONS
// ============================================================

function drawKat(cx, cy, s) {
  ctx.save();
  ctx.translate(cx, cy);
  ctx.scale(s, s);

  // Body oval
  ctx.beginPath();
  ctx.ellipse(0, 72, 52, 40, 0, 0, Math.PI * 2);
  ctx.fillStyle = '#E8874A';
  ctx.fill();

  // Tail
  ctx.beginPath();
  ctx.moveTo(45, 90);
  ctx.bezierCurveTo(80, 80, 90, 50, 70, 30);
  ctx.strokeStyle = '#E8874A';
  ctx.lineWidth = 8;
  ctx.lineCap = 'round';
  ctx.stroke();

  // Head
  ctx.beginPath();
  ctx.arc(0, 0, 52, 0, Math.PI * 2);
  ctx.fillStyle = '#F0944D';
  ctx.fill();

  // Left ear
  ctx.beginPath();
  ctx.moveTo(-42, -28); ctx.lineTo(-55, -72); ctx.lineTo(-10, -42);
  ctx.closePath();
  ctx.fillStyle = '#F0944D'; ctx.fill();
  ctx.beginPath();
  ctx.moveTo(-42, -32); ctx.lineTo(-50, -62); ctx.lineTo(-16, -44);
  ctx.closePath();
  ctx.fillStyle = '#FFB8C0'; ctx.fill();

  // Right ear
  ctx.beginPath();
  ctx.moveTo(42, -28); ctx.lineTo(55, -72); ctx.lineTo(10, -42);
  ctx.closePath();
  ctx.fillStyle = '#F0944D'; ctx.fill();
  ctx.beginPath();
  ctx.moveTo(42, -32); ctx.lineTo(50, -62); ctx.lineTo(16, -44);
  ctx.closePath();
  ctx.fillStyle = '#FFB8C0'; ctx.fill();

  // Eyes
  function eye(ex, ey) {
    ctx.beginPath(); ctx.ellipse(ex, ey, 11, 14, 0, 0, Math.PI*2);
    ctx.fillStyle = '#7CDA6A'; ctx.fill();
    ctx.beginPath(); ctx.ellipse(ex, ey, 5, 11, 0, 0, Math.PI*2);
    ctx.fillStyle = '#1A1A2E'; ctx.fill();
    ctx.beginPath(); ctx.arc(ex+3, ey-4, 3, 0, Math.PI*2);
    ctx.fillStyle = 'white'; ctx.fill();
  }
  eye(-18, -8); eye(18, -8);

  // Nose
  ctx.beginPath(); ctx.moveTo(0,14); ctx.lineTo(-7,22); ctx.lineTo(7,22);
  ctx.closePath(); ctx.fillStyle = '#FF8FA3'; ctx.fill();

  // Mouth
  ctx.strokeStyle = '#CC5500'; ctx.lineWidth = 2.5; ctx.lineCap = 'round';
  ctx.beginPath(); ctx.moveTo(0,22); ctx.bezierCurveTo(-12,34,-18,36,-16,30); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(0,22); ctx.bezierCurveTo(12,34,18,36,16,30);   ctx.stroke();

  // Whiskers
  ctx.strokeStyle = '#FFF8E7'; ctx.lineWidth = 1.8;
  [[-28,20,-65,14],[-28,24,-65,24],[-28,28,-65,34],
   [28,20,65,14],[28,24,65,24],[28,28,65,34]].forEach(([x1,y1,x2,y2])=>{
    ctx.beginPath(); ctx.moveTo(x1,y1); ctx.lineTo(x2,y2); ctx.stroke();
  });

  ctx.restore();
}

function drawHond(cx, cy, s) {
  ctx.save();
  ctx.translate(cx, cy);
  ctx.scale(s, s);

  // Body
  ctx.beginPath(); ctx.ellipse(0,72,55,42,0,0,Math.PI*2);
  ctx.fillStyle = '#C68B4A'; ctx.fill();
  // Spot
  ctx.beginPath(); ctx.ellipse(20,65,18,14,0.4,0,Math.PI*2);
  ctx.fillStyle = '#8B5E2A'; ctx.fill();

  // Head
  ctx.beginPath(); ctx.arc(0,0,52,0,Math.PI*2);
  ctx.fillStyle = '#D4943B'; ctx.fill();

  // Floppy ears
  ctx.beginPath(); ctx.ellipse(-54,20,16,36,-0.4,0,Math.PI*2);
  ctx.fillStyle = '#A06830'; ctx.fill();
  ctx.beginPath(); ctx.ellipse(54,20,16,36,0.4,0,Math.PI*2);
  ctx.fillStyle = '#A06830'; ctx.fill();

  // Snout
  ctx.beginPath(); ctx.ellipse(0,22,28,20,0,0,Math.PI*2);
  ctx.fillStyle = '#E8B07A'; ctx.fill();

  // Nose
  ctx.beginPath(); ctx.ellipse(0,14,14,10,0,0,Math.PI*2);
  ctx.fillStyle = '#1A1A2E'; ctx.fill();
  ctx.beginPath(); ctx.arc(-4,12,3,0,Math.PI*2);
  ctx.fillStyle = 'rgba(255,255,255,0.3)'; ctx.fill();

  // Tongue
  ctx.beginPath(); ctx.ellipse(0,36,14,12,0,0,Math.PI);
  ctx.fillStyle = '#FF6B8A'; ctx.fill();
  ctx.beginPath(); ctx.moveTo(0,36); ctx.lineTo(0,48);
  ctx.strokeStyle = '#CC3355'; ctx.lineWidth = 2; ctx.stroke();

  // Eyes
  function eye(ex,ey){
    ctx.beginPath(); ctx.arc(ex,ey,12,0,Math.PI*2);
    ctx.fillStyle='#6B3A2A'; ctx.fill();
    ctx.beginPath(); ctx.arc(ex,ey,7,0,Math.PI*2);
    ctx.fillStyle='#1A0A00'; ctx.fill();
    ctx.beginPath(); ctx.arc(ex+3,ey-4,3,0,Math.PI*2);
    ctx.fillStyle='white'; ctx.fill();
  }
  eye(-20,-14); eye(20,-14);

  // Eyebrows
  ctx.strokeStyle='#8B5E2A'; ctx.lineWidth=3; ctx.lineCap='round';
  ctx.beginPath(); ctx.moveTo(-30,-28); ctx.quadraticCurveTo(-20,-33,-10,-28); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(30,-28);  ctx.quadraticCurveTo(20,-33,10,-28);  ctx.stroke();

  ctx.restore();
}

function drawKoe(cx, cy, s) {
  ctx.save();
  ctx.translate(cx, cy);
  ctx.scale(s, s);

  // Body
  ctx.beginPath(); ctx.ellipse(0,75,60,48,0,0,Math.PI*2);
  ctx.fillStyle='#F5F5F0'; ctx.fill();
  ctx.beginPath(); ctx.ellipse(25,68,22,18,0.5,0,Math.PI*2);
  ctx.fillStyle='#1A1A2E'; ctx.fill();
  ctx.beginPath(); ctx.ellipse(-20,85,14,12,-0.3,0,Math.PI*2);
  ctx.fillStyle='#1A1A2E'; ctx.fill();

  // Head
  ctx.beginPath(); ctx.arc(0,0,52,0,Math.PI*2);
  ctx.fillStyle='#F0EEE8'; ctx.fill();
  ctx.beginPath(); ctx.ellipse(28,-18,16,12,0.6,0,Math.PI*2);
  ctx.fillStyle='#1A1A2E'; ctx.fill();

  // Horns
  ctx.strokeStyle='#D4AA60'; ctx.lineWidth=7; ctx.lineCap='round';
  ctx.beginPath(); ctx.moveTo(-25,-44); ctx.quadraticCurveTo(-40,-72,-28,-80); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(25,-44);  ctx.quadraticCurveTo(40,-72,28,-80);   ctx.stroke();

  // Ears
  ctx.beginPath(); ctx.ellipse(-60,-10,16,10,0.5,0,Math.PI*2);
  ctx.fillStyle='#F0EEE8'; ctx.fill();
  ctx.beginPath(); ctx.ellipse(-60,-10,10,6,0.5,0,Math.PI*2);
  ctx.fillStyle='#FFB8B8'; ctx.fill();
  ctx.beginPath(); ctx.ellipse(60,-10,16,10,-0.5,0,Math.PI*2);
  ctx.fillStyle='#F0EEE8'; ctx.fill();
  ctx.beginPath(); ctx.ellipse(60,-10,10,6,-0.5,0,Math.PI*2);
  ctx.fillStyle='#FFB8B8'; ctx.fill();

  // Snout
  ctx.beginPath(); ctx.roundRect(-28,18,56,32,12);
  ctx.fillStyle='#FFD4B8'; ctx.fill();

  // Nostrils
  ctx.beginPath(); ctx.ellipse(-12,34,7,5,0,0,Math.PI*2);
  ctx.fillStyle='#CC8866'; ctx.fill();
  ctx.beginPath(); ctx.ellipse(12,34,7,5,0,0,Math.PI*2);
  ctx.fillStyle='#CC8866'; ctx.fill();

  // Eyes
  function eye(ex,ey){
    ctx.beginPath(); ctx.arc(ex,ey,13,0,Math.PI*2);
    ctx.fillStyle='#5C3A1E'; ctx.fill();
    ctx.beginPath(); ctx.arc(ex,ey,8,0,Math.PI*2);
    ctx.fillStyle='#1A0A00'; ctx.fill();
    ctx.beginPath(); ctx.arc(ex+3,ey-4,3,0,Math.PI*2);
    ctx.fillStyle='white'; ctx.fill();
    ctx.strokeStyle='#1A1A2E'; ctx.lineWidth=2;
    for(let a=-0.9;a<=0;a+=0.3){
      const bx=ex+Math.cos(a-Math.PI/2+Math.PI)*13, by=ey+Math.sin(a-Math.PI/2+Math.PI)*13;
      const ex2=ex+Math.cos(a-Math.PI/2+Math.PI)*17, ey2=ey+Math.sin(a-Math.PI/2+Math.PI)*17;
      ctx.beginPath(); ctx.moveTo(bx,by); ctx.lineTo(ex2,ey2); ctx.stroke();
    }
  }
  eye(-20,-10); eye(20,-10);

  ctx.restore();
}

function drawKikker(cx, cy, s) {
  ctx.save();
  ctx.translate(cx, cy);
  ctx.scale(s, s);

  // Body
  ctx.beginPath(); ctx.ellipse(0,80,58,45,0,0,Math.PI*2);
  ctx.fillStyle='#3DC44A'; ctx.fill();

  // Feet
  ctx.beginPath(); ctx.ellipse(-68,72,18,10,0.5,0,Math.PI*2);
  ctx.fillStyle='#2DAA3A'; ctx.fill();
  ctx.beginPath(); ctx.ellipse(68,72,18,10,-0.5,0,Math.PI*2);
  ctx.fillStyle='#2DAA3A'; ctx.fill();

  // Belly
  ctx.beginPath(); ctx.ellipse(0,88,38,28,0,0,Math.PI*2);
  ctx.fillStyle='#A8F0A0'; ctx.fill();

  // Head
  ctx.beginPath(); ctx.arc(0,5,55,0,Math.PI*2);
  ctx.fillStyle='#3DC44A'; ctx.fill();

  // Bulging eyes
  function eye(ex,ey){
    ctx.beginPath(); ctx.arc(ex,ey,22,0,Math.PI*2);
    ctx.fillStyle='#2DAA3A'; ctx.fill();
    ctx.beginPath(); ctx.arc(ex,ey,16,0,Math.PI*2);
    ctx.fillStyle='#F5F5DC'; ctx.fill();
    ctx.beginPath(); ctx.arc(ex,ey,9,0,Math.PI*2);
    ctx.fillStyle='#1A1A2E'; ctx.fill();
    ctx.beginPath(); ctx.arc(ex+3,ey-3,3,0,Math.PI*2);
    ctx.fillStyle='white'; ctx.fill();
  }
  eye(-28,-32); eye(28,-32);

  // Smile
  ctx.beginPath(); ctx.arc(0,12,42,0.1,Math.PI-0.1);
  ctx.strokeStyle='#1A7A25'; ctx.lineWidth=4; ctx.stroke();

  // Teeth
  ctx.fillStyle='white';
  for(let i=-3;i<=3;i++){
    ctx.beginPath(); ctx.rect(i*9-4,12,8,10); ctx.fill();
  }

  // Tongue
  ctx.beginPath(); ctx.ellipse(0,28,22,10,0,0,Math.PI);
  ctx.fillStyle='#FF4466'; ctx.fill();

  // Nostrils
  ctx.beginPath(); ctx.ellipse(-8,-2,4,3,0,0,Math.PI*2);
  ctx.fillStyle='#2DAA3A'; ctx.fill();
  ctx.beginPath(); ctx.ellipse(8,-2,4,3,0,0,Math.PI*2);
  ctx.fillStyle='#2DAA3A'; ctx.fill();

  ctx.restore();
}

function drawVarken(cx, cy, s) {
  ctx.save();
  ctx.translate(cx, cy);
  ctx.scale(s, s);

  // Body
  ctx.beginPath(); ctx.ellipse(0,72,58,46,0,0,Math.PI*2);
  ctx.fillStyle='#FFB3C6'; ctx.fill();

  // Curly tail
  ctx.beginPath();

function drawSchaap(cx, cy, s) {

const DRAW_FNS = {
  'Kat':   drawKat,
  'Hond':  drawHond,
  'Koe':   drawKoe,
  'Kikker':drawKikker,
  'Varken':drawVarken,
  'Paard': drawPaard,
  'Kip':   drawKip,
  'Schaap':drawSchaap,
};

// ============================================================
//  GAME STATE
// ============================================================
const ANIMALS = ['Kat','Hond','Koe','Kikker','Varken','Paard','Kip','Schaap'];
const TOTAL_ROUNDS = 10;

const PALETTE = ['#FF6B9D','#FFB347','#7FD4FF','#98FF98','#DDA0FF','#FFD700','#FF8C69','#87CEEB'];
const BTN_COLORS = [
  ['#FF6B9D','#FF4480'],
  ['#7FD4FF','#4ABBFF'],
  ['#98FF98','#66DD66'],
];

let state = 'start'; // start | playing | correct | wrong | end
let score = 0;
let round = 0;
let currentAnimal = '';
let choices = [];
let animalScale = 0;
let animalTargetScale = 1;
let shakeX = 0;
let shakeTimer = 0;
let particles = [];
let fireworks = [];
let resultTimer = 0;
let playBtnPulse = 0;

// Spring physics
let scaleVel = 0;
const SPRING_K    = 0.28;
const SPRING_DAMP = 0.62;

function newRound() {
  round++;
  const pool = ANIMALS.slice();
  const idx = Math.floor(Math.random() * pool.length);
  currentAnimal = pool.splice(idx, 1)[0];
  const wrong = [];
  while (wrong.length < 2 && pool.length > 0) {
    const wi = Math.floor(Math.random() * pool.length);
    wrong.push(pool.splice(wi, 1)[0]);
  }
  choices = [currentAnimal, ...wrong];
  for (let i = choices.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [choices[i], choices[j]] = [choices[j], choices[i]];
  }
  animalScale = 0;
  scaleVel = 0.08;
  particles = [];
  state = 'playing';
}

// ============================================================
//  PARTICLES
// ============================================================
function spawnSparkles(cx, cy) {
  for (let i = 0; i < 34; i++) {
    const angle = Math.random() * Math.PI * 2;
    const speed = 2 + Math.random() * 5.5;
    particles.push({
      x: cx, y: cy,
      vx: Math.cos(angle) * speed,
      vy: Math.sin(angle) * speed - 2,
      life: 1,
      decay: 0.022 + Math.random() * 0.02,
      size: 4 + Math.random() * 6,
      color: PALETTE[Math.floor(Math.random() * PALETTE.length)],
      shape: Math.random() < 0.5 ? 'star' : 'circle',
    });
  }
}

function spawnFireworks() {
  for (let f = 0; f < 6; f++) {
    setTimeout(() => {
      const cx = 55 + Math.random() * 280;
      const cy = 80  + Math.random() * 320;
      playFireworkSound();
      for (let i = 0; i < 38; i++) {
        const angle = Math.random() * Math.PI * 2;
        const speed = 1 + Math.random() * 6;
        fireworks.push({
          x: cx, y: cy,
          vx: Math.cos(angle) * speed,
          vy: Math.sin(angle) * speed,
          life: 1,
          decay: 0.013 + Math.random() * 0.015,
          size: 3 + Math.random() * 5,
          color: PALETTE[Math.floor(Math.random() * PALETTE.length)],
        });
      }
    }, f * 380);
  }
}

function drawStarShape(x, y, r, color) {
  ctx.save();
  ctx.translate(x, y);
  ctx.fillStyle = color;
  ctx.beginPath();
  for (let i = 0; i < 5; i++) {
    const a  = (i * Math.PI * 2) / 5 - Math.PI / 2;
    const bi = a + Math.PI / 5;
    if (i === 0) ctx.moveTo(Math.cos(a)*r, Math.sin(a)*r);
    else ctx.lineTo(Math.cos(a)*r, Math.sin(a)*r);
    ctx.lineTo(Math.cos(bi)*(r*0.4), Math.sin(bi)*(r*0.4));
  }
  ctx.closePath(); ctx.fill();
  ctx.restore();
}

//  LAYOUT HELPERS
// ============================================================
function getPlayBtn()    { return { x: DESIGN_W/2-100, y: 460, w: 200, h: 54 }; }
function getChoiceBtn(i) { return { x: 24, y: 540 + i*66, w: DESIGN_W-48, h: 54 }; }
function getStartBtn()   { return { x: DESIGN_W/2-110, y: 510, w: 220, h: 58 }; }
function getPlayAgainBtn(){ return { x: DESIGN_W/2-110, y: 560, w: 220, h: 58 }; }

// ============================================================
//  DRAWING
// ============================================================
function drawBackground() {
  const grad = ctx.createLinearGradient(0, 0, 0, DESIGN_H);
  grad.addColorStop(0, '#0F0A2E');
  grad.addColorStop(1, '#1A0F45');
  ctx.fillStyle = grad;
  ctx.fillRect(0, 0, DESIGN_W, DESIGN_H);

  // Stars
  ctx.fillStyle = 'rgba(255,255,255,0.4)';
  [[30,40],[60,90],[320,60],[350,30],[80,600],[300,580],
   [15,300],[370,200],[45,450],[340,440],[180,640],[200,50]].forEach(([sx,sy])=>{
    ctx.beginPath(); ctx.arc(sx,sy,1.5,0,Math.PI*2); ctx.fill();
  });
}

function drawRRect(x,y,w,h,r,fill,stroke) {
  ctx.beginPath(); ctx.roundRect(x,y,w,h,r);
  if(fill)  { ctx.fillStyle=fill; ctx.fill(); }
  if(stroke){ ctx.strokeStyle=stroke; ctx.lineWidth=2.5; ctx.stroke(); }
}

function drawTopBar() {
  drawRRect(12,12,DESIGN_W-24,64,16,'rgba(255,255,255,0.08)','rgba(255,255,255,0.15)');

  for(let i=0;i<TOTAL_ROUNDS;i++){
    const sx = 24 + i * ((DESIGN_W-60)/TOTAL_ROUNDS);
    const filled = i < round;
    ctx.save();
    ctx.globalAlpha = filled ? 1 : 0.25;
    drawStarShape(sx+10, 44, filled ? 9 : 7, filled ? '#FFD700' : '#888');
    ctx.restore();
  }

  ctx.fillStyle='#FFD700';
  ctx.font='bold 20px Segoe UI, Tahoma, sans-serif';
  ctx.textAlign='right';
  ctx.fillText(`${score} pt`, DESIGN_W-20, 50);
}

function drawAnimalCard() {
  const cardX=24, cardY=90, cardW=DESIGN_W-48, cardH=350;
  drawRRect(cardX,cardY,cardW,cardH,24,'rgba(255,255,255,0.07)','rgba(255,255,255,0.12)');

  ctx.fillStyle='rgba(255,255,255,0.5)';
  ctx.font='16px Segoe UI, Tahoma, sans-serif';
  ctx.textAlign='center';
  ctx.fillText(`Ronde ${round} van ${TOTAL_ROUNDS}`, DESIGN_W/2, 112);

  const cx = DESIGN_W/2 + (state==='wrong' ? shakeX : 0);
  const fn = DRAW_FNS[currentAnimal];
  if(fn){
    ctx.save();
    ctx.shadowColor='rgba(0,0,0,0.4)'; ctx.shadowBlur=20;
    fn(cx, 265, animalScale * 0.88);
    ctx.restore(); ctx.shadowBlur=0;
  }
}

function drawPlayButton() {
  const btn = getPlayBtn();
  const pulse = 1 + Math.sin(playBtnPulse) * 0.04;
  const bx = btn.x+btn.w/2, by = btn.y+btn.h/2;
  ctx.save();
  ctx.translate(bx, by); ctx.scale(pulse, pulse);
  const grad = ctx.createLinearGradient(-btn.w/2,0,btn.w/2,0);
  grad.addColorStop(0,'#FF6B9D'); grad.addColorStop(1,'#FFB347');
  ctx.beginPath(); ctx.roundRect(-btn.w/2,-btn.h/2,btn.w,btn.h,27);
  ctx.fillStyle=grad; ctx.fill();
  ctx.strokeStyle='rgba(255,255,255,0.4)'; ctx.lineWidth=2; ctx.stroke();
  ctx.fillStyle='white';
  ctx.font='bold 20px Segoe UI, Tahoma, sans-serif';
  ctx.textAlign='center'; ctx.textBaseline='middle';
  ctx.fillText('🔊 Hoor het geluid!', 0, 0);
  ctx.textBaseline='alphabetic';
  ctx.restore();
}

function drawChoiceButtons() {
  choices.forEach((name, i) => {
    const btn = getChoiceBtn(i);
    const [c1, c2] = BTN_COLORS[i];
    const bx = btn.x+btn.w/2, by = btn.y+btn.h/2;
    ctx.save();
    ctx.translate(bx,by);
    ctx.shadowColor='rgba(0,0,0,0.3)'; ctx.shadowBlur=12; ctx.shadowOffsetY=4;
    const grad = ctx.createLinearGradient(-btn.w/2,0,btn.w/2,0);
    grad.addColorStop(0,c1); grad.addColorStop(1,c2);
    ctx.beginPath(); ctx.roundRect(-btn.w/2,-btn.h/2,btn.w,btn.h,27);
    ctx.fillStyle=grad; ctx.fill();
    ctx.strokeStyle='rgba(255,255,255,0.5)'; ctx.lineWidth=2; ctx.stroke();
    ctx.shadowBlur=0;
    ctx.fillStyle='white';
    ctx.font='bold 22px Segoe UI, Tahoma, sans-serif';
    ctx.textAlign='center'; ctx.textBaseline='middle';
    ctx.fillText(name, 0, 0);
    ctx.textBaseline='alphabetic';
    ctx.restore();
  });
}

function drawResultOverlay() {
  if(state==='correct'){
    const alpha = Math.min(1, resultTimer/10);
    ctx.fillStyle=`rgba(50,220,80,${0.15*alpha})`;
    ctx.fillRect(0,0,DESIGN_W,DESIGN_H);
    ctx.save();
    ctx.textAlign='center';
    ctx.font=`bold ${36+Math.sin(resultTimer*0.3)*3}px Segoe UI, Tahoma, sans-serif`;
    ctx.fillStyle='#7FFF7F';
    ctx.shadowColor='#00FF44'; ctx.shadowBlur=20;
    ctx.fillText('Goed zo! ✓', DESIGN_W/2, 400);
    ctx.restore();
  } else if(state==='wrong'){
    const alpha = Math.min(1, resultTimer/10);
    ctx.fillStyle=`rgba(255,60,60,${0.15*alpha})`;
    ctx.fillRect(0,0,DESIGN_W,DESIGN_H);
    ctx.save();
    ctx.textAlign='center';
    ctx.font='bold 34px Segoe UI, Tahoma, sans-serif';
    ctx.fillStyle='#FF7777';
    ctx.shadowColor='#FF0000'; ctx.shadowBlur=20;
    ctx.fillText('Probeer opnieuw!', DESIGN_W/2, 400);
    ctx.fillStyle='rgba(255,255,255,0.85)';
    ctx.font='20px Segoe UI, Tahoma, sans-serif';
    ctx.shadowBlur=0;
    ctx.fillText(`Het was: ${currentAnimal}`, DESIGN_W/2, 428);
    ctx.restore();
  }
}

function drawParticles() {
  particles.forEach(p=>{
    ctx.save(); ctx.globalAlpha=p.life;
    if(p.shape==='star') drawStarShape(p.x,p.y,p.size,p.color);
    else{ ctx.beginPath(); ctx.arc(p.x,p.y,p.size,0,Math.PI*2); ctx.fillStyle=p.color; ctx.fill(); }
    ctx.restore();
  });
  fireworks.forEach(p=>{
    ctx.save(); ctx.globalAlpha=p.life;
    ctx.beginPath(); ctx.arc(p.x,p.y,p.size,0,Math.PI*2);
    ctx.fillStyle=p.color; ctx.fill();
    ctx.restore();
  });
}

  // Start button
  const btn=getStartBtn();
  const pulse=1+Math.sin(playBtnPulse)*0.05;
  ctx.save();
  ctx.translate(btn.x+btn.w/2, btn.y+btn.h/2); ctx.scale(pulse,pulse);
  const bg=ctx.createLinearGradient(-btn.w/2,0,btn.w/2,0);
  bg.addColorStop(0,'#FFD700'); bg.addColorStop(1,'#FF6B9D');
  ctx.beginPath(); ctx.roundRect(-btn.w/2,-btn.h/2,btn.w,btn.h,29);
  ctx.fillStyle=bg; ctx.fill();
  ctx.strokeStyle='rgba(255,255,255,0.5)'; ctx.lineWidth=2.5; ctx.stroke();
  ctx.fillStyle='#1A0F45';
  ctx.font='bold 22px Segoe UI, Tahoma, sans-serif';
  ctx.textAlign='center'; ctx.textBaseline='middle';
  ctx.fillText('\u25B6  Speel nu!', 0, 0);
  ctx.textBaseline='alphabetic';
  ctx.restore();

  ctx.textAlign='center';
  ctx.fillStyle='rgba(255,255,255,0.4)';
  ctx.font='15px Segoe UI, Tahoma, sans-serif';
  ctx.fillText(`${TOTAL_ROUNDS} rondes  \u2022  8 dieren`, DESIGN_W/2, 640);
}

// ============================================================
//  END SCREEN
// ============================================================
function drawEndScreen() {
  drawBackground();
  drawParticles();

  const stars = score>=9 ? 3 : score>=6 ? 2 : 1;
  const msg   = score>=9 ? 'Geweldig!' : score>=6 ? 'Goed gedaan!' : 'Blijf oefenen!';

  ctx.save();
  ctx.textAlign='center';
  ctx.font='bold 44px Segoe UI, Tahoma, sans-serif';
  const eg=ctx.createLinearGradient(0,140,DESIGN_W,200);
  eg.addColorStop(0,'#FFD700'); eg.addColorStop(1,'#FF6B9D');
  ctx.fillStyle=eg;
  ctx.shadowColor='rgba(255,215,0,0.5)'; ctx.shadowBlur=24;
  ctx.fillText(msg, DESIGN_W/2, 200);
  ctx.shadowBlur=0;

  for(let i=0;i<3;i++){
    const sx=DESIGN_W/2+(i-1)*80;
    const filled=i<stars;
    ctx.globalAlpha=filled?1:0.25;
    ctx.shadowColor=filled?'#FFD700':'transparent';
    ctx.shadowBlur=filled?20:0;
    drawStarShape(sx, 270, 30, filled?'#FFD700':'#555');
  }
  ctx.globalAlpha=1; ctx.shadowBlur=0;

  ctx.font='bold 38px Segoe UI, Tahoma, sans-serif';
  ctx.fillStyle='white';
  ctx.fillText(`${score} / ${TOTAL_ROUNDS}`, DESIGN_W/2, 360);

  ctx.font='22px Segoe UI, Tahoma, sans-serif';
  ctx.fillStyle='rgba(255,255,255,0.7)';
  ctx.fillText('punten behaald', DESIGN_W/2, 400);
  ctx.restore();

  const btn=getPlayAgainBtn();
  const pulse=1+Math.sin(playBtnPulse)*0.05;
  ctx.save();
  ctx.translate(btn.x+btn.w/2, btn.y+btn.h/2); ctx.scale(pulse,pulse);
  const bg=ctx.createLinearGradient(-btn.w/2,0,btn.w/2,0);
  bg.addColorStop(0,'#7FD4FF'); bg.addColorStop(1,'#DDA0FF');
  ctx.beginPath(); ctx.roundRect(-btn.w/2,-btn.h/2,btn.w,btn.h,29);
  ctx.fillStyle=bg; ctx.fill();
  ctx.strokeStyle='rgba(255,255,255,0.5)'; ctx.lineWidth=2.5; ctx.stroke();
  ctx.fillStyle='white';
  ctx.font='bold 22px Segoe UI, Tahoma, sans-serif';
  ctx.textAlign='center'; ctx.textBaseline='middle';
  ctx.fillText('\u21BA  Opnieuw spelen', 0, 0);
  ctx.textBaseline='alphabetic';
  ctx.restore();
}

// ============================================================
//  MAIN LOOP
// ============================================================
let lastTime = 0;

function gameLoop(ts) {
  requestAnimationFrame(gameLoop);
  const dt = Math.min((ts - lastTime) / 16.67, 3);
  lastTime = ts;

  playBtnPulse += 0.04 * dt;

  if(state==='start'){
    drawStartScreen();
    return;
  }

  if(state==='end'){
    drawEndScreen();
    fireworks.forEach(p=>{
      p.x+=p.vx*dt; p.y+=p.vy*dt;
      p.vy+=0.08*dt; p.life-=p.decay*dt;
    });
    fireworks=fireworks.filter(p=>p.life>0);
    return;
  }

  // Spring scale
  if(animalScale < 1.08){
    const force=(animalTargetScale-animalScale)*SPRING_K;
    scaleVel=scaleVel*SPRING_DAMP+force;
    animalScale+=scaleVel*dt;
    animalScale=Math.max(0,animalScale);
  } else {
    animalScale=1;
  }

  // Shake
  if(shakeTimer>0){
    shakeTimer-=dt;
    shakeX=Math.sin(shakeTimer*1.8)*10*(shakeTimer/20);
  } else { shakeX=0; }

  // Result countdown
  if((state==='correct'||state==='wrong')&&resultTimer>0){
    resultTimer-=dt;
    if(resultTimer<=0){
      if(round>=TOTAL_ROUNDS){ state='end'; spawnFireworks(); }
      else newRound();
    }
  }

  // Particles
  particles.forEach(p=>{
    p.x+=p.vx*dt; p.y+=p.vy*dt;
    p.vy+=0.15*dt; p.life-=p.decay*dt;
  });
  particles=particles.filter(p=>p.life>0);

  // Draw
  drawBackground();
  drawTopBar();
  drawAnimalCard();
  drawParticles();

  if(state==='playing'){
    drawPlayButton();
    drawChoiceButtons();
  } else if(state==='correct'||state==='wrong'){
    drawResultOverlay();
    drawChoiceButtons();
  }
}

// ============================================================
//  INPUT
// ============================================================
function getCanvasPos(e) {
  const rect=canvas.getBoundingClientRect();
  const clientX=e.touches ? e.touches[0].clientX : e.clientX;
  const clientY=e.touches ? e.touches[0].clientY : e.clientY;
  return { x:(clientX-rect.left)/scale, y:(clientY-rect.top)/scale };
}

function hitTest(p, btn) {
  return p.x>=btn.x && p.x<=btn.x+btn.w && p.y>=btn.y && p.y<=btn.y+btn.h;
}

function handleTap(pos) {
  getAudioCtx();

  if(state==='start'){
    if(hitTest(pos,getStartBtn())){ score=0; round=0; newRound(); }
    return;
  }
  if(state==='end'){
    if(hitTest(pos,getPlayAgainBtn())){ score=0; round=0; fireworks=[]; particles=[]; newRound(); }
    return;
  }
  if(state==='playing'){
    if(hitTest(pos,getPlayBtn())){
      const fn=SOUND_FNS[currentAnimal]; if(fn) fn();
      return;
    }
    choices.forEach((name,i)=>{
      if(hitTest(pos,getChoiceBtn(i))){
        if(name===currentAnimal){
          score++; state='correct'; resultTimer=55;
          spawnSparkles(DESIGN_W/2, 265); playHappyJingle();
        } else {
          state='wrong'; resultTimer=65; shakeTimer=20; playSadTone();
        }
      }
    });
    return;
  }
  if(state==='correct'||state==='wrong'){
    if(resultTimer<40) resultTimer=1;
  }
}

canvas.addEventListener('click',   e=>{ handleTap(getCanvasPos(e)); });
canvas.addEventListener('touchstart', e=>{ e.preventDefault(); handleTap(getCanvasPos(e)); }, {passive:false});

// ============================================================
//  BOOT
// ============================================================
requestAnimationFrame(ts=>{ lastTime=ts; requestAnimationFrame(gameLoop); });
</script>
</body>
</html>
