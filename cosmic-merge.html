<script src="https://cdnjs.cloudflare.com/ajax/libs/matter-js/0.19.0/matter.min.js"></script>
<script>

// ── Leaderboard config (vul in voor global ranking) ─────────────────────
const SB_URL = ''; // 'https://xxxx.supabase.co'
const SB_KEY = ''; // anon key

// ── Game constants ────────────────────────────────────────────────────────
const W=380,H=620,WALL=16,DANGER_Y=82,AIM_Y=48,COMBO_MS=1500;
const {Engine,Bodies,Body,World,Events}=Matter;

// ── 100 Level Generator ───────────────────────────────────────────────────
const TIER_NAMES=[

  ['De zon blaast hard','Wind van het oosten','Stormvlagen in ruimte','Onstabiele winden','Richting verandert!','Zonnestorm fase 2','Krachtige straling','Windkracht neemt toe','Turbulente zone','Maximale zonnestorm'],
  ['Een put in de ruimte','Zwaartekracht trekt...','Alles valt naar midden','De put wordt sterker','Weersta de aantrekking','Zwaartekrachtslens','Kosmische spiraal','Ruimtekromming','Put op maximaal','Alles draait om midden'],
  ['Zwaartekracht verdubbeld','Planeten vallen snel','Zwaar en onhandig','Zware zone verdiept','Extreem gewicht','Neerslag van planeten','Compressieveld','Superdruk zone','Omgekeerde hefboom','Maximale gravitatie'],
  ['Wind EN put tegelijk','Dubbele bedreiging','Storm in een put','Roterende chaos','Kosmische molen','Spiraalstorm','Wervelwind in ruimte','Dubbelkracht storm','Klimaat van chaos','Perfecte storm'],
  ['Neutronensterren spawnen','Pulserende monsters','Zware kernen','Dichtheid neemt toe','Neutronenveld','Kosmisch kerngebied','Sterren storten in','Pulsar zone','Hoge energie kernen','Neutronensfeer max'],
  ['Twee zwaartekrachtputten','Links en rechts trekken','Dubbele spiraal','Ga er tussenin','Dubbele val','Oscillerende putten','Twee meesters','Orbiter zone','Binaire attractoren','Dubbele val max'],
  ['Storm plus put = chaos','Draaikolk van ruimte','Alles draait mee','Weersta alles','Kosmische blender','Chaos spiraal','Onstabiliteit max','Alles valt overal','Geen uitweg','Absolute chaos'],
  ['Zwarte gaten spawnen','Ruimtetijd buigt','Horizon nadert','Zwaartekracht warp','Verslind alles','Quantum chaos','Singulariteit nadering','Tijddilatatie','Ruimtecurvering','Grens van tijd'],
  ['Universum implodeert','Laatste kans','Alles tegelijk','Max kracht','100% chaos','Finale countdown','Kosmisch einde','Ineenstorting','Ultieme test','LEVEL 100: ALLES']
];

function makeLevels(){
  const L=[];
  for(let n=1;n<=100;n++){
    const t=Math.floor((n-1)/10), ti=(n-1)%10;
    const p=(n-1)/99;
    const tp=ti/9;
    L.push({
      n, t,
      maxSpawn: Math.min(2+Math.floor(n/9),9),
      gravityY: 2+p*2.8,
      wind: n>10,
      windForce: n>10 ? lerp(0.000008,0.000028,p) : 0,
      windPeriod: Math.max(600-p*420,150),
      gravityWell: (n>20 && t%2===1) || n>50,
      dualWell: n>60,
      wellStrength: n>20 ? lerp(0.000006,0.000022,p) : 0,
      dropMs: Math.max(700-p*220,460),
      name: TIER_NAMES[t],
      info: TIER_INFO[t][ti]
    });
  }
  return L;
}
function lerp(a,b,t){return a+(b-a)*t;}
const LEVELS=makeLevels();

// ── State ─────────────────────────────────────────────────────────────────
let engine,world,gc,ctx,bgCanvas,bgCtx;
let balls=[],particles=[],texts=[],rings=[],dust=[];
let score=0,hs=parseInt(localStorage.getItem('cmHS100')||'0');
let dead=false,canDrop=true,aimAngle=Math.PI/2,cur=0,nxt=0;
let combo=0,comboTmr=null,shakeF=0,shakeA=0,T=0;
let currentLevel=1,windDir=1,windTimer=0,_advancing=false;
let mergingSet=new Set();
let _ac=null,_musicStarted=false,_chordIdx=0,_arpStep=0,_padOscs=[];

// ── COSMOS ────────────────────────────────────────────────────────────────
const COSMOS=[
  {r:15,name:'Stofwolk'},{r:22,name:'Asteroid'},{r:30,name:'Komeet'},
  {r:40,name:'Maan'},{r:52,name:'Rode Planeet'},{r:65,name:'Blauwe Planeet'},
  {r:80,name:'Gasreus'},{r:96,name:'IJsreus'},{r:114,name:'Ster'},
  {r:134,name:'Neutronenster'},{r:156,name:'Zwart Gat'},
];
const SCORES=[1,3,6,10,15,21,28,36,45,55,66];

// ── Audio ─────────────────────────────────────────────────────────────────
function getAC(){if(!_ac)_ac=new(window.AudioContext||window.webkitAudioContext)();return _ac;}
const CHORD_PROG=[[220,261.6,329.6],[196,246.9,293.7],[174.6,220,261.6],[196,246.9,311.1]];
const PENTA=[1,1.125,1.25,1.5,1.667,2];
function makeImpulse(ac,dur,dec){const b=ac.createBuffer(2,ac.sampleRate*dur,ac.sampleRate);for(let c=0;c<2;c++){const d=b.getChannelData(c);for(let i=0;i<d.length;i++)d[i]=(Math.random()*2-1)*Math.pow(1-i/d.length,dec);}return b;}
function startMusic(){
  if(_musicStarted)return;_musicStarted=true;
  const ac=getAC();
  const rv=ac.createConvolver();rv.buffer=makeImpulse(ac,2.5,2.2);
  const bus=ac.createGain();bus.gain.value=0;bus.connect(rv);bus.connect(ac.destination);rv.connect(ac.destination);
  bus.gain.linearRampToValueAtTime(0.52,ac.currentTime+4);window._musicBus=bus;
  const dg=ac.createGain();dg.gain.value=0.055;dg.connect(bus);
  [54.5,55,55.5].forEach(f=>{const o=ac.createOscillator();o.type='sine';o.frequency.value=f;o.connect(dg);o.start();});
  const pf=ac.createBiquadFilter();pf.type='lowpass';pf.frequency.value=900;pf.Q.value=1.4;pf.connect(bus);
  const pg=ac.createGain();pg.gain.value=0.04;pg.connect(pf);
  const sl=ac.createOscillator(),sg=ac.createGain();sl.frequency.value=0.07;sg.gain.value=0.025;sl.connect(sg);sg.connect(pg.gain);sl.start();
  const fl=ac.createOscillator(),fg=ac.createGain();fl.frequency.value=0.04;fg.gain.value=320;fl.connect(fg);fg.connect(pf.frequency);fl.start();
  _padOscs=[];CHORD_PROG[0].forEach(f=>{const o=ac.createOscillator();o.type='triangle';o.frequency.value=f;o.connect(pg);o.start();_padOscs.push({osc:o});});
  const shg=ac.createGain();shg.gain.value=0.016;shg.connect(bus);
  function shimmer(){const ac2=getAC(),f=[1760,2093,2349,2637,3136][Math.floor(Math.random()*5)],o=ac2.createOscillator(),g=ac2.createGain(),t=ac2.currentTime;o.type='sine';o.frequency.value=f;g.gain.setValueAtTime(0,t);g.gain.linearRampToValueAtTime(0.5,t+0.08);g.gain.exponentialRampToValueAtTime(0.001,t+1.2+Math.random()*0.8);o.connect(g);g.connect(shg);o.start(t);o.stop(t+2.2);setTimeout(shimmer,1500+Math.random()*3000);}
  shimmer();
  function buildArp(ci){const root=CHORD_PROG[ci%4][0];return[0,2,4,5,4,2,1,3,5,3,1,0].map(i=>root*PENTA[i%6]*(i>5?2:1));}
  function schedArp(){const ac2=getAC(),seq=buildArp(_arpStep),ag=ac2.createGain(),STEP=0.22+Math.random()*0.06;ag.gain.value=0.020;ag.connect(bus);seq.forEach((f,i)=>{const t=ac2.currentTime+i*STEP,o=ac2.createOscillator(),g=ac2.createGain();o.type='sine';o.frequency.value=f;g.gain.setValueAtTime(0,t);g.gain.linearRampToValueAtTime(1,t+0.04);g.gain.exponentialRampToValueAtTime(0.001,t+STEP*0.85);o.connect(g);g.connect(ag);o.start(t);o.stop(t+STEP);});setTimeout(()=>{_arpStep++;schedArp();},seq.length*STEP*1000-200);}
  schedArp();
  function chordChange(){setTimeout(()=>{_chordIdx=(_chordIdx+1)%4;const chord=CHORD_PROG[_chordIdx];_padOscs.forEach((p,i)=>{p.osc.frequency.linearRampToValueAtTime(chord[i%chord.length],getAC().currentTime+4);});chordChange();},16000+Math.random()*8000);}
  chordChange();
}
const MERGE_NOTES=[523,622,698,784,880,988,1047,1175,1319,1480,1661];
function playDrop(){try{const ac=getAC(),buf=ac.createBuffer(1,Math.floor(ac.sampleRate*.15),ac.sampleRate),d=buf.getChannelData(0);for(let i=0;i<d.length;i++)d[i]=(Math.random()*2-1)*Math.pow(1-i/d.length,1.5);const src=ac.createBufferSource(),bp=ac.createBiquadFilter(),g=ac.createGain();bp.type='bandpass';bp.frequency.setValueAtTime(600,ac.currentTime);bp.frequency.exponentialRampToValueAtTime(200,ac.currentTime+.14);bp.Q.value=3;g.gain.setValueAtTime(0.26,ac.currentTime);g.gain.exponentialRampToValueAtTime(0.001,ac.currentTime+.15);src.buffer=buf;src.connect(bp);bp.connect(g);g.connect(ac.destination);src.start();src.stop(ac.currentTime+.18);}catch(e){}}
function playMerge(lvl){try{const ac=getAC(),freq=MERGE_NOTES[Math.min(lvl,10)],dur=0.2+lvl*.05,o=ac.createOscillator(),g=ac.createGain();o.type=lvl>=7?'triangle':'sine';o.frequency.value=freq;g.gain.setValueAtTime(0.35,ac.currentTime);g.gain.exponentialRampToValueAtTime(0.001,ac.currentTime+dur);o.connect(g);g.connect(ac.destination);o.start();o.stop(ac.currentTime+dur+.1);if(lvl>=5){const o2=ac.createOscillator(),g2=ac.createGain();o2.type='sine';o2.frequency.value=freq*.5;g2.gain.setValueAtTime(0.16,ac.currentTime);g2.gain.exponentialRampToValueAtTime(0.001,ac.currentTime+dur*.8);o2.connect(g2);g2.connect(ac.destination);o2.start();o2.stop(ac.currentTime+dur);}if(lvl===10){const s=ac.createOscillator(),sg=ac.createGain();s.type='sawtooth';s.frequency.value=30;sg.gain.setValueAtTime(0.3,ac.currentTime);sg.gain.exponentialRampToValueAtTime(0.001,ac.currentTime+1.8);s.connect(sg);sg.connect(ac.destination);s.start();s.stop(ac.currentTime+2);}}catch(e){}}
function playCombo(n){try{const ac=getAC(),base=[523,659,784,1047][Math.min(n-2,3)];[0,.1,.2].forEach((dt,i)=>{const o=ac.createOscillator(),g=ac.createGain(),t=ac.currentTime+dt;o.type='sine';o.frequency.value=base*[1,1.25,1.5][i];g.gain.setValueAtTime(0.20,t);g.gain.exponentialRampToValueAtTime(0.001,t+.25);o.connect(g);g.connect(ac.destination);o.start(t);o.stop(t+.3);});}catch(e){}}
function playGameOver(){try{const ac=getAC();[392,349,330,293,262].forEach((f,i)=>{const o=ac.createOscillator(),g=ac.createGain(),t=ac.currentTime+i*.18;o.type='sine';o.frequency.value=f;g.gain.setValueAtTime(0.24,t);g.gain.exponentialRampToValueAtTime(0.001,t+.35);o.connect(g);g.connect(ac.destination);o.start(t);o.stop(t+.4);});}catch(e){}}
function playLevelUp(){try{const ac=getAC();[523,659,784,1047,1319].forEach((f,i)=>{const o=ac.createOscillator(),g=ac.createGain(),t=ac.currentTime+i*.12;o.type='triangle';o.frequency.value=f;g.gain.setValueAtTime(0.26,t);g.gain.exponentialRampToValueAtTime(0.001,t+.4);o.connect(g);g.connect(ac.destination);o.start(t);o.stop(t+.5);});}catch(e){}}

// ── Background ────────────────────────────────────────────────────────────
let bgStars=[];
function buildBg(){
  bgCanvas=document.createElement('canvas');bgCanvas.width=W;bgCanvas.height=H;
  bgCtx=bgCanvas.getContext('2d');
  const bg=bgCtx.createLinearGradient(0,0,W,H);
  bg.addColorStop(0,'#020818');bg.addColorStop(.5,'#040c1c');bg.addColorStop(1,'#020612');
  bgCtx.fillStyle=bg;bgCtx.fillRect(0,0,W,H);
  [{x:W*.2,y:H*.25,r:160,c:'rgba(55,15,110,0.20)'},{x:W*.8,y:H*.6,r:120,c:'rgba(15,55,95,0.16)'},
   {x:W*.5,y:H*.05,r:90,c:'rgba(90,20,70,0.14)'},{x:W*.1,y:H*.8,r:100,c:'rgba(10,70,55,0.11)'},
   {x:W*.9,y:H*.3,r:80,c:'rgba(40,10,80,0.12)'}
  ].forEach(n=>{
    const g=bgCtx.createRadialGradient(n.x,n.y,0,n.x,n.y,n.r);
    g.addColorStop(0,n.c);g.addColorStop(1,'rgba(0,0,0,0)');
    bgCtx.fillStyle=g;bgCtx.fillRect(0,0,W,H);
  });
  bgStars=[];
  for(let i=0;i<280;i++){
    const x=Math.random()*W,y=Math.random()*H;
    const r=Math.random()<.06?1.6+Math.random()*.5:.2+Math.random()*.8;
    const b=.3+Math.random()*.7,ts=.4+Math.random()*2.2,to=Math.random()*Math.PI*2;
    const blue=Math.random()<.3;
    bgStars.push({x,y,r,b,ts,to,blue});
    bgCtx.beginPath();bgCtx.arc(x,y,r,0,Math.PI*2);
    bgCtx.fillStyle=blue?`rgba(150,180,255,${b*.5})`:`rgba(255,255,255,${b*.5})`;bgCtx.fill();
  }
}
function initDust(){
  for(let i=0;i<50;i++)dust.push({
    x:Math.random()*W,y:Math.random()*H,
    vx:(Math.random()-.5)*.22,vy:Math.random()*.10+.02,
    r:.4+Math.random()*1.4,a:.06+Math.random()*.22,blue:Math.random()<.5
  });
}

// ── Draw utilities ────────────────────────────────────────────────────────
function sphere(c,x,y,r,dark,mid,light,hi){
  const g=c.createRadialGradient(x-r*.35,y-r*.38,r*.04,x+r*.1,y+r*.1,r*1.08);
  g.addColorStop(0,hi);g.addColorStop(.28,light);g.addColorStop(.65,mid);g.addColorStop(1,dark);
  c.beginPath();c.arc(x,y,r,0,Math.PI*2);c.fillStyle=g;c.fill();
}
function outerGlow(c,x,y,r,col,a1,a2,m1,m2){
  const g=c.createRadialGradient(x,y,r*m1,x,y,r*m2);
  g.addColorStop(0,col.replace('__',a1));g.addColorStop(1,col.replace('__',a2));
  c.fillStyle=g;c.beginPath();c.arc(x,y,r*m2,0,Math.PI*2);c.fill();
}
function clipCircle(c,r){c.beginPath();c.arc(0,0,r,0,Math.PI*2);c.clip();}

// ── Planet renderers ──────────────────────────────────────────────────────
function drawDust(c,x,y,r,ang){
  outerGlow(c,x,y,r,'rgba(130,60,255,__)','0.18','0',1,.4,3.2);
  for(let i=3;i>=0;i--){
    const lr=r*(.38+i*.24),a=.62-i*.12;
    const g=c.createRadialGradient(x,y,0,x,y,lr);
    g.addColorStop(0,`rgba(185,130,255,${a})`);g.addColorStop(.5,`rgba(95,60,200,${a*.5})`);g.addColorStop(1,'rgba(50,20,100,0)');
    c.fillStyle=g;c.beginPath();c.arc(x,y,lr,0,Math.PI*2);c.fill();
  }
  for(let i=0;i<9;i++){
    const a=ang*1.7+(i/9)*Math.PI*2+T*.45;
    const pr=r*(.55+.12*Math.sin(T*2+i));
    c.beginPath();c.arc(x+Math.cos(a)*pr,y+Math.sin(a)*pr,1.2,0,Math.PI*2);
    c.fillStyle=`rgba(220,195,255,${.6+.3*Math.sin(T*3+i)})`;c.fill();
  }
}

function drawAsteroid(c,x,y,r,ang){

  c.beginPath();
  offs.forEach((s,i)=>{const a=(i/offs.length)*Math.PI*2,d=r*s;i===0?c.moveTo(Math.cos(a)*d,Math.sin(a)*d):c.lineTo(Math.cos(a)*d,Math.sin(a)*d);});
  c.closePath();
  const g=c.createRadialGradient(-r*.32,-r*.32,0,r*.2,r*.2,r*1.1);

// ── Physics ───────────────────────────────────────────────────────────────
function setupEngine(){
  const gy=LEVELS[currentLevel-1].gravityY;
  engine=Engine.create({gravity:{x:0,y:gy}});world=engine.world;
  const o={isStatic:true,restitution:.15,friction:.9,label:'wall'};
  World.add(world,[
    Bodies.rectangle(W/2,H+WALL/2,W,WALL,o),
    Bodies.rectangle(WALL/2,H/2,WALL,H*2,o),
    Bodies.rectangle(W-WALL/2,H/2,WALL,H*2,o),
  ]);
  Events.on(engine,'collisionStart',onCol);
}

function addBall(x,y,lvl,mg){
  const r=COSMOS[lvl].r;
  x=Math.max(WALL+r+2,Math.min(W-WALL-r-2,x));
  const b=Bodies.circle(x,y,r,{restitution:.22,friction:.55,frictionAir:.008,density:.004*(1+lvl*.45)});
  b.bl=lvl;b.mg=mg;b.born=performance.now();b.fresh=true;
  World.add(world,b);balls.push(b);return b;
}

function rmBall(b){World.remove(world,b);balls=balls.filter(x=>x!==b);}

function onCol(ev){
  for(const p of ev.pairs){
    const a=p.bodyA,b=p.bodyB;
    if(a.bl===undefined||b.bl===undefined)continue;
    if(a.bl!==b.bl||a.bl>=COSMOS.length-1)continue;
    if(a.mg||b.mg)continue;
    const key=Math.min(a.id,b.id)+'_'+Math.max(a.id,b.id);
    if(mergingSet.has(key))continue;
    mergingSet.add(key);a.mg=b.mg=true;
    const lvl=a.bl,mx=(a.position.x+b.position.x)/2,my=(a.position.y+b.position.y)/2;
    setTimeout(()=>{
      if(!balls.includes(a)||!balls.includes(b)){mergingSet.delete(key);return;}
      rmBall(a);rmBall(b);
      const nl=lvl+1;
      const gained=Math.round(SCORES[nl]*(combo>=2?1+combo*.28:1));
      score+=gained;
      updateHUD();
      playMerge(nl);doCombo();
      spawnParticles(mx,my,nl,nl>=8);
      rings.push({x:mx,y:my,r:COSMOS[nl].r*.6,maxR:COSMOS[nl].r*3.2,a:.7,color:nl>=8?'#ffcc44':'#6699ff'});
      if(nl>=8){shakeF=nl>=9?18:10;shakeA=nl>=9?4:2.5;}
      texts.push({txt:'+'+gained+(combo>=2?' x'+combo:''),x:mx,y:my-10,vy:-1.4,a:1.2,big:nl>=7});
      const nb=addBall(mx,my,nl,true);
      Body.setVelocity(nb,{x:(a.velocity.x+b.velocity.x)*.38,y:(a.velocity.y+b.velocity.y)*.38});
      setTimeout(()=>{if(balls.includes(nb))nb.mg=false;mergingSet.delete(key);},120);
    },60);
  }
}

function doCombo(){
  combo++;clearTimeout(comboTmr);
  document.getElementById('h-combo').textContent=combo>=2?'COMBO ×'+combo:'';
  if(combo>=2)playCombo(combo);
  comboTmr=setTimeout(()=>{combo=0;document.getElementById('h-combo').textContent='';},COMBO_MS);
}

function spawnParticles(x,y,lvl,nova){
  const cols=nova?['#fff','#fffaaa','#ffaa44','#ff6600']:['#aaddff','#88bbff','#6699ff','#ffffff'];
  const n=14+lvl*3;
  for(let i=0;i<n;i++){
    const a=(Math.PI*2*i/n)+(Math.random()-.5)*.9;
    const spd=nova?4+Math.random()*10:2+Math.random()*5;
    particles.push({x,y,vx:Math.cos(a)*spd,vy:Math.sin(a)*spd,r:nova?2.5:1.5,a:1,color:cols[Math.floor(Math.random()*cols.length)],decay:.028+Math.random()*.015});
  }
  if(nova){
    for(let i=0;i<22;i++){
      const a=Math.random()*Math.PI*2,spd=1+Math.random()*6;
      particles.push({x,y,vx:Math.cos(a)*spd,vy:Math.sin(a)*spd,r:4+Math.random()*4,a:.7,color:'rgba(255,220,100,.8)',decay:.022});
    }
  }
}

function blackHoleGravity(){
  for(const bh of balls){
    if(bh.bl!==10)continue;
    const str=0.000065*bh.mass;
    for(const b of balls){
      if(b===bh)continue;
      const dx=bh.position.x-b.position.x,dy=bh.position.y-b.position.y;
      const dist=Math.sqrt(dx*dx+dy*dy);
      if(dist<2)continue;
      const force=str*b.mass/(dist*dist);
      Body.applyForce(b,b.position,{x:dx/dist*force,y:dy/dist*force});
    }
  }
}

function gravityWellForce(){
  const cfg=LEVELS[currentLevel-1];
  if(!cfg.gravityWell&&!cfg.dualWell)return;
  const str=cfg.wellStrength||0.000010;
  const wells=cfg.dualWell?[{x:W*.28,y:H*.58},{x:W*.72,y:H*.58}]:[{x:W*.5,y:H*.60}];
  for(const w of wells){
    for(const b of balls){
      const dx=w.x-b.position.x,dy=w.y-b.position.y;
      const dist=Math.sqrt(dx*dx+dy*dy);
      if(dist<10)continue;
      const force=str*b.mass/dist;
      Body.applyForce(b,b.position,{x:dx/dist*force,y:dy/dist*force});
    }
  }
}

// ── Drop & aim ────────────────────────────────────────────────────────────
function rndLvl(){return Math.floor(Math.random()*(LEVELS[currentLevel-1].maxSpawn+1));}

function drop(vx,vy){
  if(!canDrop||dead)return;
  startMusic();playDrop();
  const spd=16;
  if(vx===undefined){vx=Math.cos(aimAngle)*spd;vy=0;}
  addBall(W/2,AIM_Y,cur,false);
  const nb=balls[balls.length-1];
  Body.setVelocity(nb,{x:vx,y:vy});
  cur=nxt;nxt=rndLvl();drawPreview();
  canDrop=false;
  const dropMs=LEVELS[currentLevel-1].dropMs;
  setTimeout(()=>{if(!dead)canDrop=true;},dropMs);
}

function updateAim(cx,cy){
  const rect=gc.getBoundingClientRect();
  const sx=W/rect.width,sy=H/rect.height;
  const mx=cx*sx,my=cy*sy;
  const dx=mx-W/2,dy=my-AIM_Y;
  let a=Math.atan2(dy,dx);
  const MIN=18*Math.PI/180,MAX=162*Math.PI/180;
  aimAngle=Math.max(MIN,Math.min(MAX,a));
}

// ── Dead & level advance ──────────────────────────────────────────────────
function checkDead(){
  for(const b of balls){
    if(b.fresh)continue;
    if(b.position.y-COSMOS[b.bl].r<DANGER_Y&&Math.hypot(b.velocity.x,b.velocity.y)<1.18){
      dead=true;canDrop=false;
      if(score>hs){hs=score;localStorage.setItem('cmHS100',hs);updateHUD();}
      if(currentLevel>=100){
        showComplete();
      } else {
        playGameOver();
        const go=document.getElementById('gameover');
        document.getElementById('go-title').textContent='LEVEL '+currentLevel+' KLAAR';
        document.getElementById('go-sub').textContent=LEVELS[currentLevel-1].name+' — '+LEVELS[currentLevel-1].info;
        document.getElementById('go-score-val').textContent=score.toLocaleString();
        go.style.display='block';
      }
      return;
    }
  }
}

function continueLevel(){
  if(_advancing)return;_advancing=true;
  document.getElementById('gameover').style.display='none';
  playLevelUp();
  currentLevel++;
  windDir=1;windTimer=0;
  World.clear(world);Engine.clear(engine);
  balls=[];particles=[];texts=[];rings=[];
  dead=false;canDrop=true;combo=0;shakeF=0;
  mergingSet.clear();clearTimeout(comboTmr);
  document.getElementById('h-combo').textContent='';
  setupEngine();cur=rndLvl();nxt=rndLvl();drawPreview();
  updateHUD();
  showAnnounce(()=>{_advancing=false;});
}

// ── HUD ───────────────────────────────────────────────────────────────────
function updateHUD(){
  document.getElementById('h-lvl').textContent=currentLevel;
  document.getElementById('h-score').textContent=score.toLocaleString();
  document.getElementById('h-best').textContent='BEST: '+hs.toLocaleString();
}

function drawPreview(){
  const pc=document.getElementById('h-next-cv');
  const p=pc.getContext('2d');
  p.clearRect(0,0,34,34);
  p.fillStyle='#020818';p.fillRect(0,0,34,34);
  drawBody(p,17,17,nxt,0,0,0);
  document.getElementById('h-next-name').textContent=COSMOS[nxt].name;
}

// ── Level announce ────────────────────────────────────────────────────────
let _annTimer=null;
function showAnnounce(cb){
  const cfg=LEVELS[currentLevel-1];
  const el=document.getElementById('announce');
  document.getElementById('ann-lvl').textContent='LEVEL '+currentLevel+' / 100';
  document.getElementById('ann-name').textContent=cfg.name;
  document.getElementById('ann-info').textContent=cfg.info;
  el.style.display='block';
  clearTimeout(_annTimer);
  _annTimer=setTimeout(()=>{el.style.display='none';if(cb)cb();},2200);
}

// ── Game complete & leaderboard ───────────────────────────────────────────
function showComplete(){
  document.getElementById('final-score-val').textContent=score.toLocaleString();
  document.getElementById('complete').style.display='block';
  loadLeaderboard();
}

function getLocalLB(){
  try{return JSON.parse(localStorage.getItem('cmLB100')||'[]');}catch(e){return[];}
}
function saveLocalLB(lb){localStorage.setItem('cmLB100',JSON.stringify(lb));}

async function submitScore(){
  const name=(document.getElementById('name-input').value||'Anon').trim().substring(0,16);
  const entry={name,score,date:Date.now()};
  if(SB_URL&&SB_KEY){
    try{
      await fetch(SB_URL+'/rest/v1/cm_leaderboard',{
        method:'POST',
        headers:{'apikey':SB_KEY,'Authorization':'Bearer '+SB_KEY,'Content-Type':'application/json','Prefer':'return=minimal'},
        body:JSON.stringify({name,score})
      });
    }catch(e){}
  }
  const lb=getLocalLB();
  lb.push(entry);
  lb.sort((a,b)=>b.score-a.score);
  lb.splice(5);
  saveLocalLB(lb);
  document.getElementById('submit-btn').textContent='Verstuurd!';
  document.getElementById('submit-btn').disabled=true;
  loadLeaderboard(name);
}

async function loadLeaderboard(myName){
  let rows=[];
  if(SB_URL&&SB_KEY){
    try{
      const r=await fetch(SB_URL+'/rest/v1/cm_leaderboard?select=name,score&order=score.desc&limit=5',{
        headers:{'apikey':SB_KEY,'Authorization':'Bearer '+SB_KEY}
      });
      rows=await r.json();
    }catch(e){}
  }
  if(!rows.length)rows=getLocalLB().map(e=>({name:e.name,score:e.score}));
  const el=document.getElementById('lb-list');
  el.innerHTML='';
  rows.slice(0,5).forEach((r,i)=>{
    const d=document.createElement('div');
    d.className='lb-row'+(r.name===myName?' lb-you':'');
    d.innerHTML=`<span class="lb-rank">#${i+1}</span><span class="lb-name">${r.name}</span><span class="lb-score">${Number(r.score).toLocaleString()}</span>`;
    el.appendChild(d);
  });
}

// ── Render ────────────────────────────────────────────────────────────────
function render(){
  ctx.clearRect(0,0,W,H);
  let sx=0,sy=0;
  if(shakeF>0){sx=(Math.random()-.5)*shakeA*2;sy=(Math.random()-.5)*shakeA*2;shakeF--;ctx.save();ctx.translate(sx,sy);}
  ctx.drawImage(bgCanvas,0,0);
  // twinkling stars
  bgStars.forEach(s=>{
    const tw=.35+.65*Math.abs(Math.sin(T*s.ts+s.to));
    ctx.beginPath();ctx.arc(s.x,s.y,s.r,0,Math.PI*2);
    ctx.fillStyle=s.blue?`rgba(150,180,255,${s.b*tw*.9})`:`rgba(255,255,255,${s.b*tw*.9})`;ctx.fill();
  });
  // dust
  dust.forEach(d=>{
    d.x+=d.vx;d.y+=d.vy;
    if(d.y>H)d.y=0;if(d.x<0)d.x=W;if(d.x>W)d.x=0;
    ctx.beginPath();ctx.arc(d.x,d.y,d.r,0,Math.PI*2);
    ctx.fillStyle=d.blue?`rgba(128,128,255,${d.a})`:`rgba(255,165,95,${d.a})`;ctx.fill();
  });
  // walls
  ctx.fillStyle='rgba(3,6,15,.97)';
  ctx.fillRect(0,0,WALL,H);ctx.fillRect(W-WALL,0,WALL,H);ctx.fillRect(0,H-WALL,W,WALL);
  ctx.strokeStyle='rgba(20,38,88,.8)';ctx.lineWidth=1;ctx.strokeRect(.5,.5,W-1,H-1);
  // danger line (pulsing)
  const dp=.22+.18*Math.sin(T*3.5);
  ctx.save();ctx.strokeStyle=`rgba(248,70,65,${dp})`;ctx.lineWidth=1;ctx.setLineDash([4,8]);
  ctx.beginPath();ctx.moveTo(WALL,DANGER_Y);ctx.lineTo(W-WALL,DANGER_Y);ctx.stroke();
  ctx.setLineDash([]);ctx.restore();
  // wind indicator
  const cfg=LEVELS[currentLevel-1];
  if(cfg.wind){
    const pulse=0.55+0.45*Math.sin(T*2.2);
    ctx.save();ctx.globalAlpha=0.52*pulse;ctx.font='bold 11px Arial';ctx.fillStyle='#88ccff';ctx.textAlign='center';
    ctx.fillText(windDir>0?'WIND → → →':'WIND ← ← ←',W/2,DANGER_Y-10);ctx.restore();
  }
  // gravity well visuals
  if(cfg.gravityWell||cfg.dualWell){
    const wells=cfg.dualWell?[{x:W*.28,y:H*.58},{x:W*.72,y:H*.58}]:[{x:W*.5,y:H*.60}];
    for(const w of wells){
      const pr=18+3*Math.sin(T*2);
      const wg=ctx.createRadialGradient(w.x,w.y,0,w.x,w.y,pr*2.5);
      wg.addColorStop(0,'rgba(130,60,255,0.25)');wg.addColorStop(.5,'rgba(90,30,200,0.10)');wg.addColorStop(1,'rgba(0,0,0,0)');
      ctx.save();ctx.fillStyle=wg;ctx.beginPath();ctx.arc(w.x,w.y,pr*2.5,0,Math.PI*2);ctx.fill();
      ctx.strokeStyle='rgba(150,70,255,0.28)';ctx.lineWidth=1;ctx.setLineDash([3,10]);ctx.lineDashOffset=-(T*28)%13;
      ctx.beginPath();ctx.arc(w.x,w.y,pr,0,Math.PI*2);ctx.stroke();ctx.setLineDash([]);ctx.restore();
    }
  }
  // rings
  for(let i=rings.length-1;i>=0;i--){
    const rg=rings[i];rg.r+=(rg.maxR-rg.r)*.14;rg.a-=.038;
    if(rg.a<=0){rings.splice(i,1);continue;}
    ctx.save();ctx.globalAlpha=rg.a;ctx.strokeStyle=rg.color;ctx.lineWidth=2.2;
    ctx.beginPath();ctx.arc(rg.x,rg.y,rg.r,0,Math.PI*2);ctx.stroke();ctx.restore();
  }
  // aim line
  if(canDrop&&!dead){
    const r=COSMOS[cur].r,asx=W/2,asy=AIM_Y;
    ctx.save();ctx.strokeStyle='rgba(140,185,255,.22)';ctx.lineWidth=1.2;
    ctx.setLineDash([4,14]);ctx.lineDashOffset=-(T*20)%18;
    ctx.beginPath();ctx.moveTo(asx,asy);
    let lx=asx,ly=asy,ldx=Math.cos(aimAngle),ldy=Math.sin(aimAngle);
    for(let bounce=0;bounce<3;bounce++){
      const tR=(W-WALL-r-lx)/ldx,tL=(WALL+r-lx)/ldx,tB=(H-WALL-r-ly)/ldy;
      let t=Infinity,hitSide=false;
      if(ldx>0&&tR>.5&&tR<t){t=tR;hitSide=true;}
      if(ldx<0&&tL>.5&&tL<t){t=tL;hitSide=true;}
      if(ldy>0&&tB>.5&&tB<t){t=tB;hitSide=false;}
      if(!isFinite(t))break;
      lx+=ldx*t;ly+=ldy*t;
      ctx.lineTo(lx,ly);
      if(hitSide)ldx=-ldx;else break;
    }
    ctx.stroke();ctx.setLineDash([]);ctx.lineDashOffset=0;ctx.restore();
    drawBody(ctx,asx,asy,cur,0,0,0);
  }
  // black hole warp
  for(const bh of balls){
    if(bh.bl!==10)continue;
    const wg=ctx.createRadialGradient(bh.position.x,bh.position.y,COSMOS[10].r,bh.position.x,bh.position.y,250);
    wg.addColorStop(0,'rgba(0,0,0,.14)');wg.addColorStop(1,'rgba(0,0,0,0)');
    ctx.fillStyle=wg;ctx.beginPath();ctx.arc(bh.position.x,bh.position.y,250,0,Math.PI*2);ctx.fill();
  }
  // balls
  for(const b of balls){
    const age=performance.now()-b.born;
    const pop=b.mg?1:(age<200?1+.16*Math.sin((age/200)*Math.PI):1);
    if(pop!==1){ctx.save();ctx.translate(b.position.x,b.position.y);ctx.scale(pop,pop);ctx.translate(-b.position.x,-b.position.y);}
    drawBody(ctx,b.position.x,b.position.y,b.bl,b.angle,b.velocity.x,b.velocity.y);
    if(pop!==1)ctx.restore();
    if(b.fresh&&b.position.y-COSMOS[b.bl].r>DANGER_Y)b.fresh=false;
  }
  // star wind particles
  for(const b of balls){
    if(b.bl!==8)continue;
    if(Math.random()<.42){
      const a=Math.random()*Math.PI*2,pr=COSMOS[8].r;
      particles.push({x:b.position.x+Math.cos(a)*pr,y:b.position.y+Math.sin(a)*pr,vx:Math.cos(a)*1.7,vy:Math.sin(a)*1.7-.5,r:1.5,a:.8,color:'#ffdd88',decay:.038});
    }
  }
  // particles
  for(let i=particles.length-1;i>=0;i--){
    const p=particles[i];p.x+=p.vx;p.y+=p.vy;p.vy+=.10;p.vx*=.96;p.vy*=.96;p.a-=p.decay;
    if(p.a<=0){particles.splice(i,1);continue;}
    ctx.save();ctx.globalAlpha=p.a;ctx.fillStyle=p.color;ctx.shadowColor=p.color;ctx.shadowBlur=4;
    ctx.beginPath();ctx.arc(p.x,p.y,p.r,0,Math.PI*2);ctx.fill();ctx.restore();
  }
  // float texts
  for(let i=texts.length-1;i>=0;i--){
    const ft=texts[i];ft.y+=ft.vy;ft.vy*=.93;ft.a-=.016;
    if(ft.a<=0){texts.splice(i,1);continue;}
    ctx.save();ctx.globalAlpha=ft.a;ctx.font=`bold ${ft.big?22:15}px Arial`;ctx.textAlign='center';ctx.textBaseline='middle';
    ctx.fillStyle='#fff';ctx.shadowColor=ft.big?'#ffcc44':'#88aaff';ctx.shadowBlur=12;
    ctx.fillText(ft.txt,ft.x,ft.y);ctx.restore();
  }
  if(dead){ctx.fillStyle='rgba(0,0,4,.50)';ctx.fillRect(0,0,W,H);}
  if(shakeF>0||(sx||sy))ctx.restore();
}

// ── Game loop ─────────────────────────────────────────────────────────────
function loop(){
  T+=.016;
  Engine.update(engine,1000/60/2);Engine.update(engine,1000/60/2);
  blackHoleGravity();gravityWellForce();
  const cfg=LEVELS[currentLevel-1];
  if(cfg.wind&&!dead){
    windTimer++;
    if(windTimer>cfg.windPeriod){windDir*=-1;windTimer=0;}
    for(const b of balls)Body.applyForce(b,b.position,{x:cfg.windForce*windDir*b.mass,y:0});
  }
  if(!dead)checkDead();
  render();
  if(Math.round(T*60)%8===0)drawPreview();
  requestAnimationFrame(loop);
}

// ── Input ─────────────────────────────────────────────────────────────────
gc.addEventListener('mousemove',e=>{const r=gc.getBoundingClientRect();updateAim(e.clientX-r.left,e.clientY-r.top);});
gc.addEventListener('click',()=>drop());

let _th=[];
gc.addEventListener('touchstart',e=>{
  e.preventDefault();_th=[];
  const r=gc.getBoundingClientRect();
  const t=e.touches[0];
  const cx=t.clientX-r.left,cy=t.clientY-r.top;
  _th.push({x:cx*(W/r.width),y:cy*(H/r.height),t:Date.now()});
  updateAim(cx,cy);
},{passive:false});
gc.addEventListener('touchmove',e=>{
  e.preventDefault();
  const r=gc.getBoundingClientRect();
  const t=e.touches[0];
  const cx=t.clientX-r.left,cy=t.clientY-r.top;
  _th.push({x:cx*(W/r.width),y:cy*(H/r.height),t:Date.now()});
  if(_th.length>6)_th.shift();
  updateAim(cx,cy);
},{passive:false});
gc.addEventListener('touchend',e=>{
  e.preventDefault();
  let vx,vy;
  if(_th.length>=2){
    const now=Date.now();
    const recent=_th.filter(p=>now-p.t<90);
    if(recent.length>=2){
      const a=recent[0],b=recent[recent.length-1];
      const dt=Math.max(b.t-a.t,8);
      vx=(b.x-a.x)/dt*.95;vy=(b.y-a.y)/dt*.95;
    }
  }
  if(vx!==undefined){
    const spd=Math.sqrt(vx*vx+vy*vy);
    const cl=Math.max(5,Math.min(22,spd));
    if(spd>.5){vx=vx/spd*cl;vy=vy/spd*cl;}else{vx=Math.cos(aimAngle)*16;vy=0;}
    vy=Math.max(vy,-6);
    drop(vx,vy);
  }else{drop();}
},{passive:false});

// ── Canvas fit ────────────────────────────────────────────────────────────
function fitCanvas(){
  const wrap=document.getElementById('wrap');
  const cw=wrap.clientWidth,ch=wrap.clientHeight;
  let dw=cw,dh=cw*(H/W);
  if(dh>ch){dh=ch;dw=ch*(W/H);}
  gc.style.width=Math.floor(dw)+'px';
  gc.style.height=Math.floor(dh)+'px';
}
window.addEventListener('resize',fitCanvas);

// ── Init ──────────────────────────────────────────────────────────────────
gc=document.getElementById('gc');
gc.width=W;gc.height=H;
ctx=gc.getContext('2d');
fitCanvas();
updateHUD();
buildBg();initDust();setupEngine();
cur=rndLvl();nxt=rndLvl();drawPreview();
showAnnounce(null);
loop();

</script>
