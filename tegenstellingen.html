<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Tegenstellingen - Opposites</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #1a0535;
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 100vh;
    overflow: hidden;
  }
  canvas { display: block; touch-action: none; cursor: pointer; }
</style>
</head>
<body>
<canvas id="game"></canvas>
<script>
const canvas = document.getElementById('game');
const ctx = canvas.getContext('2d');
const W = 390, H = 700;
let scale = 1;
function resize() {
  scale = Math.min(window.innerWidth / W, window.innerHeight / H);
  canvas.width = W * scale;
  canvas.height = H * scale;
  ctx.setTransform(scale, 0, 0, scale, 0, 0);
}
resize();
window.addEventListener('resize', resize);

// ───── AUDIO ─────
let AC = null;
function ac() { if (!AC) AC = new (window.AudioContext||window.webkitAudioContext)(); return AC; }
function tone(freq,dur,type='sine',vol=.3){
  try {
    const a=ac(),o=a.createOscillator(),g=a.createGain();
    o.connect(g);g.connect(a.destination);
    o.type=type;o.frequency.value=freq;
    g.gain.setValueAtTime(vol,a.currentTime);
    g.gain.exponentialRampToValueAtTime(.001,a.currentTime+dur);
    o.start();o.stop(a.currentTime+dur);
  }catch(e){}
}
function sndCorrect(){tone(523,.1);setTimeout(()=>tone(659,.1),110);setTimeout(()=>tone(784,.1),220);setTimeout(()=>tone(1047,.3),330);}
function sndWrong(){tone(200,.09,'sawtooth',.2);setTimeout(()=>tone(160,.15,'sawtooth',.15),90);}
function sndClick(){tone(880,.06,'sine',.1);}
function speak(txt){
  try{window.speechSynthesis.cancel();const u=new SpeechSynthesisUtterance(txt);u.lang='nl-NL';u.rate=.85;u.pitch=1.1;window.speechSynthesis.speak(u);}catch(e){}
}

// ───── HELPERS ─────
function roundRect(x,y,w,h,r){
  ctx.beginPath();
  ctx.moveTo(x+r,y);ctx.lineTo(x+w-r,y);ctx.quadraticCurveTo(x+w,y,x+w,y+r);
  ctx.lineTo(x+w,y+h-r);ctx.quadraticCurveTo(x+w,y+h,x+w-r,y+h);
  ctx.lineTo(x+r,y+h);ctx.quadraticCurveTo(x,y+h,x,y+h-r);
  ctx.lineTo(x,y+r);ctx.quadraticCurveTo(x,y,x+r,y);
  ctx.closePath();
}
function drawStar5(cx,cy,r,col,alpha=1){
  ctx.save();ctx.globalAlpha=alpha;ctx.beginPath();
  for(let i=0;i<10;i++){const a=(i/10)*Math.PI*2-Math.PI/2,rr=i%2===0?r:r*.4;
    i===0?ctx.moveTo(cx+Math.cos(a)*rr,cy+Math.sin(a)*rr):ctx.lineTo(cx+Math.cos(a)*rr,cy+Math.sin(a)*rr);}
  ctx.closePath();ctx.fillStyle=col;ctx.fill();ctx.restore();
}

// ───── SPARKLES ─────
let sparks=[];
function spawnSparks(cx,cy,n=12){
  const cols=['#FF4444','#FFD700','#44FF88','#44AAFF','#FF44AA','#FFAA33'];
  for(let i=0;i<n;i++){const a=Math.random()*Math.PI*2,sp=.8+Math.random()*2;
    sparks.push({x:cx+(Math.random()-.5)*80,y:cy+(Math.random()-.5)*40,vx:Math.cos(a)*sp,vy:Math.sin(a)*sp-.7,life:1,sz:2+Math.random()*3.5,col:cols[Math.floor(Math.random()*cols.length)]});}
}
function tickSparks(){sparks=sparks.filter(s=>s.life>0);for(const s of sparks){s.x+=s.vx;s.y+=s.vy;s.vy+=.03;s.life-=.016;}}
function drawSparks(){
  for(const s of sparks){ctx.save();ctx.globalAlpha=s.life;ctx.fillStyle=s.col;ctx.beginPath();ctx.arc(s.x,s.y,s.sz,0,Math.PI*2);ctx.fill();
    ctx.strokeStyle=s.col;ctx.lineWidth=.7;
    for(let i=0;i<4;i++){const a=(i/4)*Math.PI*2;ctx.beginPath();ctx.moveTo(s.x-Math.cos(a)*s.sz*2,s.y-Math.sin(a)*s.sz*2);ctx.lineTo(s.x+Math.cos(a)*s.sz*2,s.y+Math.sin(a)*s.sz*2);ctx.stroke();}
    ctx.restore();}
}

// ───── BG STARS ─────
const bgStars=Array.from({length:50},()=>({x:Math.random()*W,y:Math.random()*H,r:.4+Math.random()*1.1,t:Math.random()*Math.PI*2,sp:.02+Math.random()*.025}));
function drawBG(){
  const g=ctx.createLinearGradient(0,0,0,H);g.addColorStop(0,'#110325');g.addColorStop(1,'#1e0640');
  ctx.fillStyle=g;ctx.fillRect(0,0,W,H);
  for(const s of bgStars){s.t+=s.sp;ctx.beginPath();ctx.arc(s.x,s.y,s.r,0,Math.PI*2);ctx.fillStyle=`rgba(255,255,255,${.15+.55*Math.abs(Math.sin(s.t))})`;ctx.fill();}
}

// ───── ILLUSTRATIONS ─────
// Each draw fn takes cx, cy, size as parameters — draws centered there
const illustrations = {};

// GROOT - elephant
illustrations.groot = function(cx,cy,sz) {
  const s=sz/60;
  ctx.save(); ctx.translate(cx,cy);
  // shadow
  ctx.fillStyle='rgba(0,0,0,.2)'; ctx.beginPath(); ctx.ellipse(0,28*s,30*s,7*s,0,0,Math.PI*2); ctx.fill();
  // body
  ctx.fillStyle='#8899AA';
  ctx.beginPath(); ctx.ellipse(0,0,32*s,22*s,0,0,Math.PI*2); ctx.fill();
  ctx.fillStyle='#99AABB';
  ctx.beginPath(); ctx.ellipse(-2*s,-3*s,28*s,18*s,0,0,Math.PI*2); ctx.fill();
  // head
  ctx.fillStyle='#8899AA';
  ctx.beginPath(); ctx.ellipse(-28*s,-14*s,18*s,14*s,-.2,0,Math.PI*2); ctx.fill();
  // ear
  ctx.fillStyle='#AABBCC';
  ctx.beginPath(); ctx.ellipse(-38*s,-14*s,12*s,16*s,-.3,0,Math.PI*2); ctx.fill();
  ctx.fillStyle='#FFAAAA';
  ctx.beginPath(); ctx.ellipse(-38*s,-14*s,7*s,10*s,-.3,0,Math.PI*2); ctx.fill();
  // trunk
  ctx.strokeStyle='#8899AA'; ctx.lineWidth=8*s; ctx.lineCap='round';
  ctx.beginPath(); ctx.moveTo(-42*s,-8*s); ctx.quadraticCurveTo(-54*s,4*s,-46*s,18*s); ctx.stroke();
  // eye
  ctx.fillStyle='#222'; ctx.beginPath(); ctx.arc(-32*s,-18*s,3*s,0,Math.PI*2); ctx.fill();
  ctx.fillStyle='#FFF'; ctx.beginPath(); ctx.arc(-31*s,-19*s,1*s,0,Math.PI*2); ctx.fill();
  // legs
  ctx.fillStyle='#7788AA';
  for(const lx of [-18*s,-6*s,10*s,22*s]){
    roundRect(lx-5*s,16*s,10*s,16*s,5*s); ctx.fill();
  }
  // tail
  ctx.strokeStyle='#7788AA'; ctx.lineWidth=3*s;
  ctx.beginPath(); ctx.moveTo(30*s,-2*s); ctx.quadraticCurveTo(40*s,8*s,36*s,18*s); ctx.stroke();
  // tusk
  ctx.strokeStyle='#EEDDCC'; ctx.lineWidth=3.5*s;
  ctx.beginPath(); ctx.moveTo(-44*s,-6*s); ctx.quadraticCurveTo(-56*s,-2*s,-58*s,6*s); ctx.stroke();
  ctx.restore();
};

// KLEIN - mouse
illustrations.klein = function(cx,cy,sz) {
  const s=sz/60;
  ctx.save(); ctx.translate(cx,cy);
  // shadow
  ctx.fillStyle='rgba(0,0,0,.15)'; ctx.beginPath(); ctx.ellipse(0,16*s,14*s,4*s,0,0,Math.PI*2); ctx.fill();
  // body
  ctx.fillStyle='#CC9966';
  ctx.beginPath(); ctx.ellipse(0,2*s,12*s,9*s,0,0,Math.PI*2); ctx.fill();
  // head
  ctx.fillStyle='#DDAA77';
  ctx.beginPath(); ctx.ellipse(-10*s,-6*s,8*s,7*s,0,0,Math.PI*2); ctx.fill();
  // ears
  ctx.fillStyle='#DDAA77'; ctx.beginPath(); ctx.arc(-14*s,-14*s,5*s,0,Math.PI*2); ctx.fill();
  ctx.fillStyle='#FFAAAA'; ctx.beginPath(); ctx.arc(-14*s,-14*s,3*s,0,Math.PI*2); ctx.fill();
  ctx.fillStyle='#DDAA77'; ctx.beginPath(); ctx.arc(-6*s,-14*s,4*s,0,Math.PI*2); ctx.fill();
  ctx.fillStyle='#FFAAAA'; ctx.beginPath(); ctx.arc(-6*s,-14*s,2.5*s,0,Math.PI*2); ctx.fill();
  // whiskers
  ctx.strokeStyle='#888866'; ctx.lineWidth=.8*s;
  [[-1,-1],[0,0],[1,1]].forEach(([dx,dy])=>{
    ctx.beginPath(); ctx.moveTo(-14*s,-5*s); ctx.lineTo(-22*s+dx*2*s,-4*s+dy*2*s); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(-14*s,-5*s); ctx.lineTo(-22*s+dx*2*s,-7*s+dy*2*s); ctx.stroke();
  });
  // eye
  ctx.fillStyle='#222'; ctx.beginPath(); ctx.arc(-12*s,-8*s,2*s,0,Math.PI*2); ctx.fill();
  ctx.fillStyle='#FFF'; ctx.beginPath(); ctx.arc(-11.4*s,-8.6*s,.7*s,0,Math.PI*2); ctx.fill();
  // legs
  ctx.fillStyle='#CC9966';
  for(const lx of [-5*s,5*s]){roundRect(lx-3*s,8*s,6*s,9*s,3*s); ctx.fill();}
  // tail
  ctx.strokeStyle='#AA7744'; ctx.lineWidth=2*s;
  ctx.beginPath(); ctx.moveTo(10*s,3*s); ctx.quadraticCurveTo(20*s,-2*s,22*s,10*s); ctx.stroke();
  ctx.restore();
};

// WARM - sun
illustrations.warm = function(cx,cy,sz) {
  const s=sz/60;
  ctx.save(); ctx.translate(cx,cy);
  // outer glow
  const grd=ctx.createRadialGradient(0,0,10*s,0,0,40*s);
  grd.addColorStop(0,'rgba(255,220,0,.4)'); grd.addColorStop(1,'rgba(255,150,0,0)');
  ctx.fillStyle=grd; ctx.beginPath(); ctx.arc(0,0,40*s,0,Math.PI*2); ctx.fill();
  // rays
  ctx.strokeStyle='#FFCC00'; ctx.lineWidth=4*s; ctx.lineCap='round';
  for(let i=0;i<8;i++){
    const a=(i/8)*Math.PI*2;
    ctx.beginPath();
    ctx.moveTo(Math.cos(a)*22*s,Math.sin(a)*22*s);
    ctx.lineTo(Math.cos(a)*36*s,Math.sin(a)*36*s);
    ctx.stroke();
  }
  // sun body
  const sg=ctx.createRadialGradient(-4*s,-4*s,2*s,0,0,18*s);
  sg.addColorStop(0,'#FFEE44'); sg.addColorStop(1,'#FF9900');
  ctx.fillStyle=sg; ctx.beginPath(); ctx.arc(0,0,18*s,0,Math.PI*2); ctx.fill();
  // face
  ctx.fillStyle='#994400';
  // eyes
  ctx.beginPath(); ctx.arc(-5.5*s,-4*s,2.5*s,0,Math.PI*2); ctx.fill();
  ctx.beginPath(); ctx.arc(5.5*s,-4*s,2.5*s,0,Math.PI*2); ctx.fill();
  // smile
  ctx.strokeStyle='#994400'; ctx.lineWidth=2.5*s; ctx.lineCap='round';
  ctx.beginPath(); ctx.arc(0,-1*s,7*s,.2,Math.PI-.2); ctx.stroke();
  ctx.restore();
};

// KOUD - snowflake
illustrations.koud = function(cx,cy,sz) {
  const s=sz/60;
  ctx.save(); ctx.translate(cx,cy);
  // background circle
  const bg=ctx.createRadialGradient(0,0,0,0,0,38*s);
  bg.addColorStop(0,'rgba(180,220,255,.3)'); bg.addColorStop(1,'rgba(100,160,255,0)');
  ctx.fillStyle=bg; ctx.beginPath(); ctx.arc(0,0,38*s,0,Math.PI*2); ctx.fill();
  ctx.strokeStyle='#AADDFF'; ctx.lineWidth=3.5*s; ctx.lineCap='round';
  for(let i=0;i<6;i++){
    const a=(i/6)*Math.PI*2;
    ctx.beginPath();
    ctx.moveTo(0,0); ctx.lineTo(Math.cos(a)*30*s,Math.sin(a)*30*s); ctx.stroke();
    // branches
    const blen=9*s;
    for(const frac of [.4,.7]){
      const bx=Math.cos(a)*30*s*frac, by=Math.sin(a)*30*s*frac;
      const ba=a+Math.PI/2;
      ctx.beginPath(); ctx.moveTo(bx-Math.cos(ba)*blen,by-Math.sin(ba)*blen);
      ctx.lineTo(bx+Math.cos(ba)*blen,by+Math.sin(ba)*blen); ctx.stroke();
    }
  }
  // center dot
  ctx.fillStyle='#CCF0FF'; ctx.beginPath(); ctx.arc(0,0,5*s,0,Math.PI*2); ctx.fill();
  ctx.strokeStyle='#88BBFF'; ctx.lineWidth=2*s; ctx.stroke();
  ctx.restore();
};

// SNEL - racing car
illustrations.snel = function(cx,cy,sz) {
  const s=sz/60;
  ctx.save(); ctx.translate(cx,cy);
  // speed lines
  ctx.strokeStyle='rgba(255,200,0,.4)'; ctx.lineWidth=2*s; ctx.lineCap='round';
  for(let i=0;i<4;i++){
    const ly=-8*s+i*6*s;
    const llen=(15+i%2*8)*s;
    ctx.beginPath(); ctx.moveTo(-35*s-llen,ly); ctx.lineTo(-35*s,ly); ctx.stroke();
  }
  // shadow
  ctx.fillStyle='rgba(0,0,0,.18)'; ctx.beginPath(); ctx.ellipse(0,20*s,34*s,5*s,0,0,Math.PI*2); ctx.fill();
  // body
  ctx.fillStyle='#EE2222';
  roundRect(-32*s,-4*s,64*s,18*s,7*s); ctx.fill();
  // cockpit
  ctx.fillStyle='#CC1111';
  roundRect(-10*s,-20*s,26*s,18*s,8*s); ctx.fill();
  // windscreen
  ctx.fillStyle='rgba(150,220,255,.7)';
  roundRect(-6*s,-17*s,18*s,12*s,5*s); ctx.fill();
  // racing stripe
  ctx.fillStyle='#FFCC00'; ctx.fillRect(-32*s,3*s,64*s,4*s);
  // wheels
  for(const [wx,wy] of [[-18*s,14*s],[16*s,14*s]]){
    ctx.fillStyle='#222'; ctx.beginPath(); ctx.arc(wx,wy,9*s,0,Math.PI*2); ctx.fill();
    ctx.fillStyle='#555'; ctx.beginPath(); ctx.arc(wx,wy,6*s,0,Math.PI*2); ctx.fill();
    ctx.fillStyle='#888'; ctx.beginPath(); ctx.arc(wx,wy,3*s,0,Math.PI*2); ctx.fill();
  }
  // number
  ctx.fillStyle='#FFF'; ctx.font=`bold ${11*s}px Arial`; ctx.textAlign='center'; ctx.textBaseline='middle';
  ctx.fillText('1',3*s,-12*s);
  ctx.restore();
};

// LANGZAAM - snail
illustrations.langzaam = function(cx,cy,sz) {
  const s=sz/60;
  ctx.save(); ctx.translate(cx,cy);
  // shadow
  ctx.fillStyle='rgba(0,0,0,.15)'; ctx.beginPath(); ctx.ellipse(0,24*s,22*s,4*s,0,0,Math.PI*2); ctx.fill();
  // body
  ctx.fillStyle='#88AA44';
  ctx.beginPath(); ctx.ellipse(-2*s,10*s,22*s,12*s,0,0,Math.PI*2); ctx.fill();
  // head
  ctx.fillStyle='#99BB55';
  ctx.beginPath(); ctx.arc(-22*s,4*s,9*s,0,Math.PI*2); ctx.fill();
  // eyestalks
  ctx.strokeStyle='#88AA44'; ctx.lineWidth=2.5*s; ctx.lineCap='round';
  ctx.beginPath(); ctx.moveTo(-25*s,-1*s); ctx.lineTo(-28*s,-12*s); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(-19*s,-1*s); ctx.lineTo(-18*s,-12*s); ctx.stroke();
  ctx.fillStyle='#222'; ctx.beginPath(); ctx.arc(-28*s,-13*s,2.5*s,0,Math.PI*2); ctx.fill();
  ctx.beginPath(); ctx.arc(-18*s,-13*s,2.5*s,0,Math.PI*2); ctx.fill();
  // smile
  ctx.strokeStyle='#556622'; ctx.lineWidth=1.5*s;
  ctx.beginPath(); ctx.arc(-22*s,6*s,4*s,.1,Math.PI-.1); ctx.stroke();
  // shell
  ctx.fillStyle='#CC7722';
  ctx.beginPath(); ctx.arc(6*s,-2*s,22*s,0,Math.PI*2); ctx.fill();
  ctx.fillStyle='#DD8833';
  ctx.beginPath(); ctx.arc(6*s,-2*s,18*s,0,Math.PI*2); ctx.fill();
  // shell spiral
  ctx.strokeStyle='#BB6611'; ctx.lineWidth=2.5*s; ctx.lineCap='round';
  ctx.beginPath();
  for(let t=0;t<Math.PI*3.5;t+=.1){
    const r=(18-t*1.3)*s, x=6*s+Math.cos(t-Math.PI/2)*r, y=-2*s+Math.sin(t-Math.PI/2)*r;
    t===0?ctx.moveTo(x,y):ctx.lineTo(x,y);
  }
  ctx.stroke();
  // shell dot
  ctx.fillStyle='#BB6611'; ctx.beginPath(); ctx.arc(6*s,-2*s,3*s,0,Math.PI*2); ctx.fill();
  ctx.restore();
};

// NAT - rain drops
illustrations.nat = function(cx,cy,sz) {
  const s=sz/60;
  ctx.save(); ctx.translate(cx,cy);
  // sky background
  const bg=ctx.createLinearGradient(0,-32*s,0,32*s);
  bg.addColorStop(0,'#446688'); bg.addColorStop(1,'#668899');
  ctx.fillStyle=bg; roundRect(-38*s,-36*s,76*s,72*s,10*s); ctx.fill();
  // cloud
  ctx.fillStyle='#BBCCDD';
  for(const [ox,oy,r] of [[0,-18*s,14*s],[-12*s,-14*s,10*s],[12*s,-14*s,10*s],[-6*s,-12*s,8*s],[6*s,-12*s,8*s]]){
    ctx.beginPath(); ctx.arc(ox,oy,r,0,Math.PI*2); ctx.fill();
  }
  // rain drops
  ctx.fillStyle='rgba(120,190,255,.9)';
  const drops=[[-18*s,-4*s],[-6*s,2*s],[6*s,-6*s],[18*s,0*s],[-12*s,10*s],[4*s,12*s],[16*s,10*s],[-22*s,8*s]];
  for(const [dx,dy] of drops){
    ctx.beginPath(); ctx.ellipse(dx,dy,3*s,6*s,0,0,Math.PI*2); ctx.fill();
    // splash
    ctx.fillStyle='rgba(120,190,255,.5)';
    ctx.beginPath(); ctx.ellipse(dx,dy+12*s,4*s,2*s,0,0,Math.PI*2); ctx.fill();
    ctx.fillStyle='rgba(120,190,255,.9)';
  }
  ctx.restore();
};

// DROOG - sun + cracked earth
illustrations.droog = function(cx,cy,sz) {
  const s=sz/60;
  ctx.save(); ctx.translate(cx,cy);
  // sky
  const sky=ctx.createLinearGradient(0,-36*s,0,36*s);
  sky.addColorStop(0,'#FFB84D'); sky.addColorStop(1,'#FFD080');
  ctx.fillStyle=sky; roundRect(-38*s,-36*s,76*s,72*s,10*s); ctx.fill();
  // sun
  ctx.strokeStyle='#FF8800'; ctx.lineWidth=3*s; ctx.lineCap='round';
  for(let i=0;i<6;i++){const a=(i/6)*Math.PI*2;ctx.beginPath();ctx.moveTo(Math.cos(a)*18*s-8*s,Math.sin(a)*18*s-22*s);ctx.lineTo(Math.cos(a)*24*s-8*s,Math.sin(a)*24*s-22*s);ctx.stroke();}
  ctx.fillStyle='#FFDD00'; ctx.beginPath(); ctx.arc(-8*s,-22*s,13*s,0,Math.PI*2); ctx.fill();
  // ground
  ctx.fillStyle='#AA7744'; roundRect(-38*s,10*s,76*s,26*s,0); ctx.fill();
  ctx.fillStyle='#BB8855'; roundRect(-38*s,10*s,76*s,5*s,0); ctx.fill();
  // cracks
  ctx.strokeStyle='#774422'; ctx.lineWidth=1.5*s; ctx.lineCap='round';
  const cracks=[[[-15*s,15*s],[-8*s,22*s],[-16*s,28*s]],
                 [[5*s,13*s],[12*s,20*s],[4*s,27*s]],
                 [[-28*s,16*s],[-22*s,24*s]]];
  for(const crack of cracks){
    ctx.beginPath(); ctx.moveTo(...crack[0]);
    for(let i=1;i<crack.length;i++) ctx.lineTo(...crack[i]);
    ctx.stroke();
  }
  ctx.restore();
};

// VROLIJK - happy face
illustrations.vrolijk = function(cx,cy,sz) {
  const s=sz/60;
  ctx.save(); ctx.translate(cx,cy);
  // face
  const fg=ctx.createRadialGradient(-4*s,-4*s,4*s,0,0,28*s);
  fg.addColorStop(0,'#FFEE88'); fg.addColorStop(1,'#FFCC22');
  ctx.fillStyle=fg; ctx.beginPath(); ctx.arc(0,0,28*s,0,Math.PI*2); ctx.fill();
  ctx.strokeStyle='#CC8800'; ctx.lineWidth=2*s; ctx.stroke();
  // rosy cheeks
  ctx.fillStyle='rgba(255,100,100,.35)';
  ctx.beginPath(); ctx.ellipse(-15*s,8*s,9*s,6*s,0,0,Math.PI*2); ctx.fill();
  ctx.beginPath(); ctx.ellipse(15*s,8*s,9*s,6*s,0,0,Math.PI*2); ctx.fill();
  // eyes
  ctx.fillStyle='#333';
  ctx.beginPath(); ctx.arc(-9*s,-6*s,4*s,0,Math.PI*2); ctx.fill();
  ctx.beginPath(); ctx.arc(9*s,-6*s,4*s,0,Math.PI*2); ctx.fill();
  ctx.fillStyle='#FFF';
  ctx.beginPath(); ctx.arc(-7.5*s,-7.5*s,1.5*s,0,Math.PI*2); ctx.fill();
  ctx.beginPath(); ctx.arc(10.5*s,-7.5*s,1.5*s,0,Math.PI*2); ctx.fill();
  // big smile
  ctx.strokeStyle='#993300'; ctx.lineWidth=3*s; ctx.lineCap='round';
  ctx.beginPath(); ctx.arc(0,2*s,14*s,.2,Math.PI-.2); ctx.stroke();
  // eyebrows (raised, happy)
  ctx.strokeStyle='#CC8800'; ctx.lineWidth=2.5*s;
  ctx.beginPath(); ctx.arc(-9*s,-14*s,6*s,Math.PI+.5,Math.PI*2-.5); ctx.stroke();
  ctx.beginPath(); ctx.arc(9*s,-14*s,6*s,Math.PI+.5,Math.PI*2-.5); ctx.stroke();
  ctx.restore();
};

// VERDRIETIG - sad face
illustrations.verdrietig = function(cx,cy,sz) {
  const s=sz/60;
  ctx.save(); ctx.translate(cx,cy);
  // face
  const fg=ctx.createRadialGradient(-4*s,-4*s,4*s,0,0,28*s);

// ───── PAIR DATA ─────
// Each pair: { word, opposite, drawWord, drawOpposite }
// For answer choices we'll offer the opposite + 2 distractors
const PAIRS = [
  { word:'groot',    opp:'klein',    drawA: illustrations.groot,      drawB: illustrations.klein },
  { word:'warm',     opp:'koud',     drawA: illustrations.warm,       drawB: illustrations.koud },
  { word:'snel',     opp:'langzaam', drawA: illustrations.snel,       drawB: illustrations.langzaam },
  { word:'nat',      opp:'droog',    drawA: illustrations.nat,        drawB: illustrations.droog },
  { word:'vrolijk',  opp:'verdrietig', drawA: illustrations.vrolijk,  drawB: illustrations.verdrietig },
  { word:'open',     opp:'dicht',    drawA: illustrations.open,       drawB: illustrations.dicht },
  { word:'hoog',     opp:'laag',     drawA: illustrations.hoog,       drawB: illustrations.laag },
  { word:'hard',     opp:'zacht',    drawA: illustrations.hard,       drawB: illustrations.zacht },
  { word:'vol',      opp:'leeg',     drawA: illustrations.vol,        drawB: illustrations.leeg },
  { word:'lang',     opp:'kort',     drawA: illustrations.lang,       drawB: illustrations.kort },
  { word:'koud',     opp:'warm',     drawA: illustrations.koud,       drawB: illustrations.warm },
  { word:'klein',    opp:'groot',    drawA: illustrations.klein,      drawB: illustrations.groot },
  { word:'droog',    opp:'nat',      drawA: illustrations.droog,      drawB: illustrations.nat },
  { word:'langzaam', opp:'snel',     drawA: illustrations.langzaam,   drawB: illustrations.snel },
  { word:'verdrietig', opp:'vrolijk', drawA: illustrations.verdrietig, drawB: illustrations.vrolijk },
];

const ALL_WORDS = [...new Set(PAIRS.flatMap(p=>[p.word,p.opp]))];

const BTN_COLORS = ['#E84393','#FF7A00','#00C8A0','#7B5CF5'];

// ───── GAME STATE ─────
let screen = 'start'; // start | game | end
let round = 0, score = 0;
const TOTAL = 10;
let curPair = null, shown = 'A'; // show A, ask opposite (B) — or show B, ask A
let curWord = '', oppWord = '';
let drawCur = null;
let opts = [], correctIdx = 0, chosen = -1;
let fbTimer = 0;
let hitBoxes = [];
let startBtnHit = { x: W/2-110, y: 400, w: 220, h: 60 };
let endAnim = 0;
let illuY = -100, illuTargY = 230, illuAnim = 0;
let btnY = [0,0,0], btnTargY = [0,0,0];
let usedPairs = [];

function pickRound() {
  // pick unused pair
  if (usedPairs.length >= PAIRS.length) usedPairs = [];
  let available = PAIRS.filter((_,i) => !usedPairs.includes(i));
  const pairIdx = PAIRS.indexOf(available[Math.floor(Math.random() * available.length)]);
  usedPairs.push(pairIdx);
  curPair = PAIRS[pairIdx];

  // randomly show word A or B, ask for the other
  if (Math.random() < .5) {
    curWord = curPair.word; oppWord = curPair.opp;
    drawCur = curPair.drawA;
  } else {
    curWord = curPair.opp; oppWord = curPair.word;
    drawCur = curPair.drawB;
  }

  // build 3 options: correct + 2 distractors
  const correct = oppWord;
  const distractors = ALL_WORDS.filter(w => w !== correct && w !== curWord);
  const picked = [];
  while (picked.length < 2) {
    const w = distractors[Math.floor(Math.random() * distractors.length)];
    if (!picked.includes(w)) picked.push(w);
  }
  opts = [correct, ...picked];
  // shuffle
  for (let i = opts.length-1; i > 0; i--) {
    const j = Math.floor(Math.random()*(i+1));
    [opts[i],opts[j]] = [opts[j],opts[i]];
  }
  correctIdx = opts.indexOf(correct);

  chosen = -1; fbTimer = 0;
  illuY = -100; illuAnim = 0;
  const baseY = 450;
  btnTargY = opts.map((_,i) => baseY + i * 70);
  btnY = btnTargY.map(() => H + 100);
  hitBoxes = new Array(3).fill(null);
}

function startRound() {
  pickRound();
  screen = 'game';
  setTimeout(() => spawnSparks(W/2, illuTargY, 6), 700);
  speak(curWord);
}

function afterFeedback() {
  round++;
  if (round >= TOTAL) { screen = 'end'; endAnim = 0; speak('Geweldig gedaan!'); }
  else startRound();
}

// ───── BUTTON DRAW ─────
function drawBtn(i, word, cy, status) {
  const bx=28, bw=W-56, bh=55, by=cy-bh/2;
  let bg = BTN_COLORS[i % 4], tc = '#fff';
  if (status === 'correct') { bg = '#22CC66'; }
  if (status === 'wrong') { bg = '#CC2244'; }
  if (status === 'dim') { bg = '#44446A'; tc = '#9999BB'; }
  ctx.save();
  ctx.shadowColor = 'rgba(0,0,0,.4)'; ctx.shadowBlur = 7; ctx.shadowOffsetY = 3;
  const g = ctx.createLinearGradient(bx,by,bx,by+bh);
  const [r,gg,b] = bg.startsWith('#') ? [parseInt(bg.slice(1,3),16),parseInt(bg.slice(3,5),16),parseInt(bg.slice(5,7),16)] : [100,100,200];
  g.addColorStop(0,`rgb(${Math.min(255,r+35)},${Math.min(255,gg+35)},${Math.min(255,b+35)})`);
  g.addColorStop(1,bg);
  roundRect(bx,by,bw,bh,16); ctx.fillStyle=g; ctx.fill();
  ctx.shadowBlur=0; ctx.shadowOffsetY=0;
  ctx.save(); roundRect(bx,by,bw,bh,16); ctx.clip();
  ctx.fillStyle='rgba(255,255,255,.12)'; ctx.fillRect(bx,by,bw,bh/2); ctx.restore();
  ctx.fillStyle=tc; ctx.font='bold 23px Arial'; ctx.textAlign='center'; ctx.textBaseline='middle';
  ctx.fillText(word.charAt(0).toUpperCase()+word.slice(1), W/2, cy);
  ctx.restore();
  hitBoxes[i] = {x:bx,y:by,w:bw,h:bh};
}

// ───── ILLUSTRATION PANEL ─────
function drawIlluPanel(cx, cy, drawFn) {
  ctx.save();
  // panel
  const pW = 300, pH = 200;
  const px = cx - pW/2, py = cy - pH/2;
  const g = ctx.createLinearGradient(px,py,px+pW,py+pH);
  g.addColorStop(0,'#251040'); g.addColorStop(1,'#1a0a35');
  roundRect(px,py,pW,pH,20); ctx.fillStyle=g; ctx.fill();
  ctx.strokeStyle='rgba(180,100,255,.35)'; ctx.lineWidth=2; ctx.stroke();
  // clip to panel, draw illustration
  ctx.save();
  roundRect(px+4,py+4,pW-8,pH-8,16); ctx.clip();
  drawFn(cx, cy+6, 56);
  ctx.restore();
  ctx.restore();
}

  ctx.strokeStyle='#CC55FF'; ctx.lineWidth=2.5; ctx.stroke();
  ctx.restore();

  ctx.fillStyle='#FFFFFF'; ctx.font='bold 40px Arial'; ctx.textAlign='center'; ctx.textBaseline='middle';
  ctx.shadowColor='#CC55FF'; ctx.shadowBlur=22;
  ctx.fillText('TEGENSTELLINGEN',W/2,170); ctx.shadowBlur=0;
  ctx.fillStyle='#DDBBFF'; ctx.font='17px Arial';
  ctx.fillText('Wat is het tegenovergestelde?',W/2,218);

  // example: groot <-> klein arrows
  ctx.save();
  ctx.fillStyle='#FF8844'; ctx.font='bold 22px Arial'; ctx.textAlign='left';
  ctx.fillText('GROOT',60,278);
  ctx.fillStyle='#88BBFF'; ctx.textAlign='right';
  ctx.fillText('KLEIN',W-60,278);
  ctx.strokeStyle='rgba(255,255,255,.3)'; ctx.lineWidth=2;
  ctx.beginPath(); ctx.moveTo(150,278); ctx.lineTo(W-150,278); ctx.stroke();
  ctx.fillStyle='rgba(255,255,255,.5)'; ctx.font='18px Arial'; ctx.textAlign='center';
  ctx.fillText('<-->',W/2,278);
  ctx.restore();

  // stars
  for(let i=0;i<5;i++) drawStar5(65+i*64,340,11,5,['#FF4444','#FF8800','#FFD700','#44FF88','#44AAFF'][i]);

  // button
  ctx.save();
  const bg1 = ctx.createLinearGradient(W/2-110,400,W/2+110,460);
  bg1.addColorStop(0,'#9933FF'); bg1.addColorStop(1,'#FF44BB');
  ctx.shadowColor='#FF44BB'; ctx.shadowBlur=18;
  roundRect(W/2-110,400,220,60,30); ctx.fillStyle=bg1; ctx.fill(); ctx.shadowBlur=0;
  ctx.save(); roundRect(W/2-110,400,220,60,30); ctx.clip();
  ctx.fillStyle='rgba(255,255,255,.15)'; ctx.fillRect(W/2-110,400,220,30); ctx.restore();
  ctx.fillStyle='#FFF'; ctx.font='bold 28px Arial'; ctx.textAlign='center'; ctx.textBaseline='middle';
  ctx.fillText('SPELEN!',W/2,430);
  ctx.restore();

  ctx.fillStyle='#9988BB'; ctx.font='15px Arial'; ctx.textAlign='center'; ctx.textBaseline='middle';
  ctx.fillText('10 rondes  |  Leeftijd 4-5',W/2,490);
  startBtnHit = {x:W/2-110,y:400,w:220,h:60};
}

function drawGame() {
  drawBG(); tickSparks(); drawSparks(); illuAnim += .04;

  // progress
  const pct = round/TOTAL;
  ctx.fillStyle='rgba(255,255,255,.08)'; roundRect(28,28,W-56,12,6); ctx.fill();
  if (pct>0){ctx.fillStyle='#9933FF'; roundRect(28,28,(W-56)*pct,12,6); ctx.fill();}
  ctx.fillStyle='#FFD700'; ctx.font='bold 16px Arial'; ctx.textAlign='right'; ctx.textBaseline='middle';
  ctx.fillText(`${score}/${TOTAL}`,W-28,34);
  ctx.fillStyle='#BBAADD'; ctx.font='14px Arial'; ctx.textAlign='left';
  ctx.fillText(`Ronde ${Math.min(round+1,TOTAL)}`,28,34);

  // instruction
  ctx.fillStyle='#EEDDFF'; ctx.font='bold 17px Arial'; ctx.textAlign='center'; ctx.textBaseline='middle';
  ctx.fillText('Wat is het tegenovergestelde?',W/2,65);

  // animate illus panel in from top
  if (illuY < illuTargY) illuY = Math.min(illuTargY, illuY + 12);

  // subtle bob when settled
  const bob = illuY >= illuTargY ? Math.sin(illuAnim) * 3 : 0;
  drawIlluPanel(W/2, illuY + bob, drawCur);

  // word label below panel
  ctx.fillStyle='#FFFFFF'; ctx.font='bold 32px Arial'; ctx.textAlign='center'; ctx.textBaseline='middle';
  ctx.shadowColor='rgba(200,100,255,.6)'; ctx.shadowBlur=14;
  ctx.fillText(curWord.charAt(0).toUpperCase()+curWord.slice(1), W/2, illuY + 118 + bob);
  ctx.shadowBlur=0;

  // arrow pointing right => "tegenstelling"
  ctx.fillStyle='#DDBBFF'; ctx.font='22px Arial';
  ctx.fillText('Wat is het tegenovergestelde?', W/2, illuY + 148 + bob);

  // animate buttons
  for(let i=0;i<3;i++){
    if(btnY[i]>btnTargY[i]) btnY[i]=Math.max(btnTargY[i],btnY[i]-16);
  }
  for(let i=0;i<3;i++){
    let st='normal';
    if(chosen>=0){if(i===correctIdx)st='correct';else if(i===chosen)st='wrong';else st='dim';}
    drawBtn(i,opts[i],btnY[i],st);
  }

  // feedback
  if(chosen>=0){
    fbTimer++;
    const ok=chosen===correctIdx;
    ctx.fillStyle=ok?'#88FF88':'#FF8888';
    ctx.font='bold 24px Arial'; ctx.textAlign='center'; ctx.textBaseline='middle';
    ctx.fillText(ok?'Super goed!':'Het is: '+oppWord,W/2,660);
    if(fbTimer>95){fbTimer=0;afterFeedback();}
  }
}

function drawEnd() {
  drawBG(); endAnim+=.04;
  // confetti
  const confCols=['#FF4444','#FFD700','#44FF88','#44AAFF','#FF44AA','#FFAA33'];
  for(let i=0;i<28;i++){
    const x=(Math.sin(endAnim*.6+i*.85)*.5+.5)*W;
    const y=((endAnim*26+i*26)%H);
    const sz=5+(i%4)*3;
    ctx.save(); ctx.translate(x,y); ctx.rotate(endAnim+i*.7);
    ctx.fillStyle=confCols[i%confCols.length]; ctx.globalAlpha=.85;
    ctx.fillRect(-sz/2,-sz/4,sz,sz/2); ctx.restore();
  }
  // card
  ctx.save();
  const cg=ctx.createLinearGradient(40,175,360,430);
  cg.addColorStop(0,'#2a0d5e'); cg.addColorStop(1,'#1a0840');
  roundRect(40,175,W-80,255,26); ctx.fillStyle=cg; ctx.fill();
  ctx.strokeStyle='#FFD700'; ctx.lineWidth=3; ctx.stroke();
  ctx.restore();
  ctx.fillStyle='#FFD700'; ctx.font='bold 44px Arial'; ctx.textAlign='center'; ctx.textBaseline='middle';
  ctx.shadowColor='#FFD700'; ctx.shadowBlur=22;
  ctx.fillText('Klaar!',W/2,258); ctx.shadowBlur=0;
  ctx.fillStyle='#FFF'; ctx.font='bold 28px Arial';
  ctx.fillText(`Score: ${score} / ${TOTAL}`,W/2,318);
  const msg=score>=8?'Uitstekend!':score>=6?'Heel goed!':score>=4?'Goed bezig!':'Blijf oefenen!';
  ctx.fillStyle='#DDBBFF'; ctx.font='20px Arial'; ctx.fillText(msg,W/2,368);
  for(let i=0;i<5;i++) drawStar5(78+i*58,415,16,i<Math.round(score/2)?'#FFD700':'#443366');
  // play again
  ctx.save();
  const bg2=ctx.createLinearGradient(W/2-110,510,W/2+110,570);
  bg2.addColorStop(0,'#9933FF'); bg2.addColorStop(1,'#FF44BB');
  ctx.shadowColor='#FF44BB'; ctx.shadowBlur=14;
  roundRect(W/2-110,510,220,58,29); ctx.fillStyle=bg2; ctx.fill(); ctx.shadowBlur=0;
  ctx.fillStyle='#FFF'; ctx.font='bold 24px Arial'; ctx.textAlign='center'; ctx.textBaseline='middle';
  ctx.fillText('Opnieuw spelen',W/2,539);
  ctx.restore();
  startBtnHit={x:W/2-110,y:510,w:220,h:58};
}

// ───── INPUT ─────
function hit(px,py){
  const gx=px/scale, gy=py/scale;
  if(screen==='start'){
    const b=startBtnHit;
    if(gx>=b.x&&gx<=b.x+b.w&&gy>=b.y&&gy<=b.y+b.h){sndClick();round=0;score=0;sparks=[];usedPairs=[];startRound();}
    return;
  }
  if(screen==='end'){
    const b=startBtnHit;
    if(gx>=b.x&&gx<=b.x+b.w&&gy>=b.y&&gy<=b.y+b.h){sndClick();screen='start';sparks=[];}
    return;
  }
  if(screen==='game'&&chosen<0){
    for(let i=0;i<hitBoxes.length;i++){
      const b=hitBoxes[i];
      if(!b) continue;
      if(gx>=b.x&&gx<=b.x+b.w&&gy>=b.y&&gy<=b.y+b.h){
        chosen=i;
        if(i===correctIdx){score++;sndCorrect();spawnSparks(W/2,illuY,14);speak('Goed zo!');}
        else{sndWrong();speak(oppWord);}
        break;
      }
    }
  }
}

canvas.onclick = e => { const r=canvas.getBoundingClientRect(); hit(e.clientX-r.left,e.clientY-r.top); };
canvas.addEventListener('touchstart', e => {
  e.preventDefault();
  const r=canvas.getBoundingClientRect(), t=e.touches[0];
  hit(t.clientX-r.left, t.clientY-r.top);
}, {passive:false});

// ───── LOOP ─────
(function loop(){
  ctx.clearRect(0,0,W,H);
  if(screen==='start') drawStart();
  else if(screen==='game') drawGame();
  else drawEnd();
  requestAnimationFrame(loop);
})();
</script>
</body>
