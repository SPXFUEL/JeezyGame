<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Cosmic Merge</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#000;display:flex;flex-direction:column;align-items:center;justify-content:center;
     min-height:100vh;font-family:Arial,sans-serif;color:#fff;user-select:none;overflow:hidden}
#wrap{display:flex;gap:14px;align-items:flex-start}
#sb{width:122px;padding-top:2px}
.lbl{font-size:9px;color:#6688aa;text-transform:uppercase;letter-spacing:2px;margin-bottom:2px}
#sco{font-size:32px;font-weight:bold;color:#b8d0ff;text-shadow:0 0 12px rgba(100,150,255,.3);margin-bottom:1px}
#hsc{font-size:10px;color:#556888;margin-bottom:10px}
#cmb{font-size:18px;font-weight:bold;min-height:24px;margin-bottom:8px;color:#ffdd88;
     text-shadow:0 0 14px rgba(255,200,80,.6)}
#nxt{background:rgba(8,12,28,.92);border:1px solid #182040;border-radius:9px;padding:9px;
     text-align:center;margin-bottom:8px}
#nxtName{font-size:8px;color:#445;margin-top:3px;text-transform:uppercase;letter-spacing:1px}
#prvC{display:block;margin:5px auto 0}
#lvlBadge{font-size:9px;padding:3px 7px;border-radius:4px;display:inline-block;
           margin-bottom:8px;letter-spacing:1px;text-transform:uppercase;font-weight:bold}
#goPanel{display:none;background:rgba(4,6,18,.97);border:1px solid #f85149;border-radius:9px;
          padding:11px;text-align:center;margin-top:5px}
#goPanel h2{color:#f85149;font-size:11px;letter-spacing:2px;margin-bottom:3px}
#goFinal{font-size:24px;font-weight:bold;color:#b8d0ff;margin-bottom:7px}
#btnBack{width:100%;padding:7px;background:rgba(30,50,100,.8);color:#88aadd;
          border:1px solid #2a4a8f;border-radius:6px;font-size:10px;cursor:pointer;letter-spacing:1px;margin-bottom:5px}
#btnBack:hover{background:rgba(40,60,120,.9)}
#btnRedo{width:100%;padding:7px;background:linear-gradient(135deg,#1a3a8f,#2a5ad0);
          color:#b8d0ff;border:1px solid #2a5ad0;border-radius:6px;font-size:11px;cursor:pointer;letter-spacing:1px}
#btnRedo:hover{background:linear-gradient(135deg,#2a4aaf,#3a6ae0)}
#gameCanvas{cursor:crosshair}
</style>
</head>
<body>
<div id="wrap">
  <canvas id="gameCanvas"></canvas>
  <div id="sb">
    <div id="lvlBadge">Level 1</div>
    <div class="lbl">Score</div>
    <div id="sco">0</div>
    <div id="hsc">BEST: 0</div>
    <div id="cmb"></div>
    <div id="nxt">
      <div class="lbl">Volgende</div>
      <canvas id="prvC" width="68" height="68"></canvas>
      <div id="nxtName"></div>
    </div>
    <div id="goPanel">
      <h2>GAME OVER</h2>
      <div id="goFinal">0</div>
      <button id="btnBack" onclick="goSelect()">&#8592; Levels</button>
      <button id="btnRedo" onclick="restartLevel()">Opnieuw</button>
    </div>
  </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/matter-js/0.19.0/matter.min.js"></script>
<script>
// ═══════════════════════════════════════════════════
//  CONSTANTS
// ═══════════════════════════════════════════════════
const W=380,H=580,WALL=18,DANGER_Y=88,AIM_Y=52,MAX_SPAWN=4,DROP_MS=700,COMBO_MS=1500;
const COSMOS=[
  {r:15, name:'Stofwolk'},{r:22,name:'Asteroid'},{r:30,name:'Komeet'},
  {r:40,name:'Maan'},{r:52,name:'Rode Planeet'},{r:65,name:'Blauwe Planeet'},
  {r:80,name:'Gasreus'},{r:96,name:'IJsreus'},{r:114,name:'Ster'},
  {r:134,name:'Neutronenster'},{r:156,name:'Zwart Gat'},
];
const SCORES=[1,3,6,10,15,21,28,36,45,55,66];
const LEVELS=[
  {id:0,name:'The Void',       sub:'Standaard zwaartekracht',  color:'#6644ff',dark:'#2a1a80',
   mechanic:'normal',   mul:1.0, gx:0,   gy:2,   icon:'&#9733;'},
  {id:1,name:'Asteroid Field', sub:'Obstakels blokkeren je pad',color:'#cc8833',dark:'#6a3a10',
   mechanic:'obstacles',mul:1.2, gx:0,   gy:2,   icon:'&#9762;'},
  {id:2,name:'Solar Storm',    sub:'Zonnevlam verstoort banen', color:'#ff7722',dark:'#8a2a00',
   mechanic:'solar',    mul:1.4, gx:0,   gy:1.9, icon:'&#9728;'},
  {id:3,name:'Event Horizon',  sub:'Zwart gat trekt naar rechts',color:'#ff4422',dark:'#7a1800',
   mechanic:'drift',    mul:1.6, gx:0.55,gy:1.7, icon:'&#9711;'},
  {id:4,name:'Supernova',      sub:'Zwaartekracht draait rond', color:'#ff22cc',dark:'#7a0060',
   mechanic:'chaos',    mul:2.0, gx:0,   gy:2,   icon:'&#10022;'},
];
const {Engine,Bodies,Body,World,Events}=Matter;

// roundRect polyfill voor oudere browsers
function rr(c,x,y,w,h,r){
  c.beginPath();c.moveTo(x+r,y);c.lineTo(x+w-r,y);
  c.quadraticCurveTo(x+w,y,x+w,y+r);c.lineTo(x+w,y+h-r);
  c.quadraticCurveTo(x+w,y+h,x+w-r,y+h);c.lineTo(x+r,y+h);
  c.quadraticCurveTo(x,y+h,x,y+h-r);c.lineTo(x,y+r);
  c.quadraticCurveTo(x,y,x+r,y);c.closePath();
}

// ═══════════════════════════════════════════════════
//  STATE
// ═══════════════════════════════════════════════════
let engine,world,canvas,ctx,pCtx;
let gameState='select'; // 'select'|'play'
let activeLvl=0;
let balls=[],obstacles=[],particles=[],texts=[],rings=[];
let dust=[],bgStars=[],bgDriftRocks=[];
let score=0,hs=parseInt(localStorage.getItem('cosmicHS5')||'0');
let dead=false,canDrop=true,mouseX=W/2,mouseY=0,cur=0,nxt=0;
let mergingSet=new Set(),combo=0,comboTmr=null;
let shakeF=0,shakeA=0,bloom=0,bloomCol='#ffffff';
let T=0,hovCard=-1;
// Level mechanic state
let solarTimer=0,solarWarn=false,solarActive=false,solarDir=1,solarFlashA=0;
let gravAngle=0,gravTargetAngle=0,gravChangeTmr=0;

// ═══════════════════════════════════════════════════
//  DOM refs
// ═══════════════════════════════════════════════════
const elSco=()=>document.getElementById('sco');
const elHsc=()=>document.getElementById('hsc');
const elCmb=()=>document.getElementById('cmb');
const elBadge=()=>document.getElementById('lvlBadge');
const elGoPanel=()=>document.getElementById('goPanel');
const elGoFinal=()=>document.getElementById('goFinal');
const elNxtName=()=>document.getElementById('nxtName');
const elSb=()=>document.getElementById('sb');
elHsc().textContent='BEST: '+hs;

// ═══════════════════════════════════════════════════
//  STAR / DUST INIT
// ═══════════════════════════════════════════════════
function initStars(){
  bgStars=[];
  for(let i=0;i<260;i++){
    bgStars.push({x:Math.random()*W,y:Math.random()*H,
      r:.5+Math.random()*(Math.random()<.06?2:.9),
      b:.5+Math.random()*.5,ts:.4+Math.random()*2.2,to:Math.random()*Math.PI*2});
  }
}
function initDust(){
  dust=[];
  for(let i=0;i<38;i++) dust.push({
    x:Math.random()*W,y:Math.random()*H,
    vx:(Math.random()-.5)*.22,vy:Math.random()*.1+.02,
    r:.5+Math.random()*1.4,a:.06+Math.random()*.22,blue:Math.random()<.55
  });
}
function initDriftRocks(){
  bgDriftRocks=[];
  for(let i=0;i<12;i++) bgDriftRocks.push({
    x:Math.random()*W,y:Math.random()*H,
    r:5+Math.random()*22,spd:.18+Math.random()*.28,a:.04+Math.random()*.1,
    ang:Math.random()*Math.PI*2,rot:(Math.random()-.5)*.005
  });
}

// ═══════════════════════════════════════════════════
//  HELPERS
// ═══════════════════════════════════════════════════
function sphere(c,x,y,r,dark,mid,light,hi){
  const g=c.createRadialGradient(x-r*.36,y-r*.38,r*.04,x+r*.1,y+r*.1,r*1.08);
  g.addColorStop(0,hi);g.addColorStop(.28,light);g.addColorStop(.65,mid);g.addColorStop(1,dark);
  c.beginPath();c.arc(x,y,r,0,Math.PI*2);c.fillStyle=g;c.fill();
}
function clip(c,r){c.beginPath();c.arc(0,0,r,0,Math.PI*2);c.clip();}
function clampX(x,l){const r=COSMOS[l].r;return Math.max(WALL+r+2,Math.min(W-WALL-r-2,x));}
function rndLvl(){return Math.floor(Math.random()*(MAX_SPAWN+1));}
function rgba(col,a){
  const r2=parseInt(col.slice(1,3),16),g2=parseInt(col.slice(3,5),16),b2=parseInt(col.slice(5,7),16);
  return `rgba(${r2},${g2},${b2},${a})`;
}

// ═══════════════════════════════════════════════════
//  EFFECTS
// ═══════════════════════════════════════════════════
function spawnParticles(x,y,n,nova,col){
  const cols=nova?['#fff','#fffaaa','#ffaa44','#ff6600']:
    col?[col,col,'#fff']:['#aaddff','#88bbff','#ffffff'];
  for(let i=0;i<n;i++){
    const a=(Math.PI*2*i/n)+(Math.random()-.5)*.9;
    const spd=nova?5+Math.random()*9:2+Math.random()*5;
    particles.push({x,y,vx:Math.cos(a)*spd,vy:Math.sin(a)*spd-1,
      r:nova?2+Math.random()*5:1.5+Math.random()*3.5,
      a:1,color:cols[Math.floor(Math.random()*cols.length)],
      decay:.022+Math.random()*.02});
  }
}
function spawnRing(x,y,r,col){rings.push({x,y,r,maxR:r*3.4,a:.92,color:col});}
function spawnText(x,y,txt,big,col){texts.push({x,y,vy:-2.5,txt,a:1,big,col:col||'#ffffff'});}
function doShake(a){shakeF=10;shakeA=a;}
function doBloom(col,str){bloom=str||.45;bloomCol=col||'#ffffff';}
function doCombo(){
  combo++;clearTimeout(comboTmr);
  comboTmr=setTimeout(()=>{combo=0;elCmb().textContent='';},COMBO_MS);
  elCmb().textContent=combo>=2?`COMBO \xd7${combo}`:'';
}

// ═══════════════════════════════════════════════════
//  ANIMATED BACKGROUND FUNCTIONS (per level)
// ═══════════════════════════════════════════════════
function drawNebula(c,cx,cy,r,colA,colB,t,seed){
  const breathe=r*(1+.12*Math.sin(t*.1+seed));
  const g=c.createRadialGradient(cx,cy,0,cx,cy,breathe);
  g.addColorStop(0,colA);g.addColorStop(.55,colB);g.addColorStop(1,'rgba(0,0,0,0)');
  c.fillStyle=g;c.beginPath();c.arc(cx,cy,breathe,0,Math.PI*2);c.fill();
}
function drawAurora(c,t){
  for(let i=0;i<4;i++){
    const y=H*(.15+i*.18)+18*Math.sin(t*.18+i*1.2);
    c.save();c.globalAlpha=.07+.04*Math.sin(t*.25+i);
    c.strokeStyle=`hsl(${160+i*20},90%,65%)`;c.lineWidth=22+12*Math.sin(t*.12+i*1.8);
    c.beginPath();c.moveTo(0,y);
    for(let x=0;x<=W;x+=18) c.lineTo(x,y+28*Math.sin(t*.38+x*.018+i));
    c.stroke();c.restore();
  }
}

// Level 0 – The Void
function bgVoid(c){
  const bg=c.createLinearGradient(0,0,W,H);
  bg.addColorStop(0,'#060d2a');bg.addColorStop(.5,'#0a1435');bg.addColorStop(1,'#05091e');
  c.fillStyle=bg;c.fillRect(0,0,W,H);
  drawNebula(c,W*.22,H*.32,150,'rgba(90,40,220,.32)','rgba(55,20,140,.12)',T,0);
  drawNebula(c,W*.78,H*.62,120,'rgba(25,70,190,.28)','rgba(12,40,100,.1)',T,2.5);
  drawNebula(c,W*.5,H*.08,100,'rgba(120,30,160,.24)','rgba(70,15,90,.08)',T,5);
  drawAurora(c,T);
}

// Level 1 – Asteroid Field
function bgAsteroid(c){
  const bg=c.createLinearGradient(0,0,W,H);
  bg.addColorStop(0,'#080604');bg.addColorStop(1,'#040302');
  c.fillStyle=bg;c.fillRect(0,0,W,H);
  drawNebula(c,W*.3,H*.4,110,'rgba(80,55,20,.12)','rgba(50,30,8,.04)',T,1);
  drawNebula(c,W*.75,H*.6,90,'rgba(60,40,15,.1)','rgba(35,20,5,.03)',T,3.5);
  bgDriftRocks.forEach(rk=>{
    rk.x-=rk.spd;rk.ang+=rk.rot;
    if(rk.x<-rk.r*3)rk.x=W+rk.r*2;
    c.save();c.translate(rk.x,rk.y);c.rotate(rk.ang);
    c.beginPath();
    for(let i=0;i<8;i++){
      const a=(i/8)*Math.PI*2, d=rk.r*([.85,.93,.78,.96,.82,.88,.75,.90][i]);
      i===0?c.moveTo(Math.cos(a)*d,Math.sin(a)*d):c.lineTo(Math.cos(a)*d,Math.sin(a)*d);
    }
    c.closePath();c.fillStyle=`rgba(70,55,30,${rk.a})`;c.fill();c.restore();
  });
}

// Level 2 – Solar Storm
function bgSolar(c){
  const bg=c.createLinearGradient(0,H,W,0);
  bg.addColorStop(0,'#0c0400');bg.addColorStop(.4,'#180800');bg.addColorStop(1,'#060200');
  c.fillStyle=bg;c.fillRect(0,0,W,H);
  // solar corona from bottom
  for(let i=3;i>=0;i--){
    const a=(.08-i*.018)*(1+.15*Math.sin(T*.4+i));
    const g=c.createRadialGradient(W/2,H+40,20,W/2,H+40,H*.7+i*30);
    g.addColorStop(0,`rgba(255,140,20,${a})`);
    g.addColorStop(.5,`rgba(220,80,10,${a*.4})`);
    g.addColorStop(1,'rgba(180,40,0,0)');
    c.fillStyle=g;c.fillRect(0,0,W,H);
  }
  drawNebula(c,W*.2,H*.2,90,'rgba(200,60,10,.1)','rgba(140,30,5,.04)',T,1);
  drawNebula(c,W*.8,H*.3,70,'rgba(220,100,15,.09)','rgba(160,50,5,.03)',T,4);
  // corona ray tendrils
  for(let i=0;i<8;i++){
    const baseAng=-Math.PI/2+((i-.5)/7)*Math.PI*.9;
    const ang=baseAng+.06*Math.sin(T*.3+i);
    const len=80+30*Math.sin(T*.22+i*1.3);
    const g=c.createLinearGradient(W/2,H,W/2+Math.cos(ang)*len,H+Math.sin(ang)*len);
    g.addColorStop(0,`rgba(255,150,20,${.06+.02*Math.sin(T+i)})`);
    g.addColorStop(1,'rgba(255,100,0,0)');
    c.save();c.strokeStyle=g;c.lineWidth=8+4*Math.sin(T*.2+i);
    c.beginPath();c.moveTo(W/2,H);c.lineTo(W/2+Math.cos(ang)*len,H+Math.sin(ang)*len);
    c.stroke();c.restore();
  }
}

// Level 3 – Event Horizon
function bgHorizon(c){
  const bg=c.createLinearGradient(0,0,W,H);
  bg.addColorStop(0,'#040204');bg.addColorStop(1,'#0a0108');
  c.fillStyle=bg;c.fillRect(0,0,W,H);
  drawNebula(c,W*.15,H*.4,120,'rgba(30,5,60,.18)','rgba(15,2,40,.06)',T,0);
  // accretion glow bleeding from right wall
  for(let i=0;i<4;i++){
    const g=c.createRadialGradient(W+20,H/2,10,W+20,H/2,180+i*40);
    const a=(.12-i*.025)*(1+.08*Math.sin(T*.5+i));
    g.addColorStop(0,`rgba(255,140,40,${a})`);
    g.addColorStop(.4,`rgba(180,60,10,${a*.5})`);
    g.addColorStop(1,'rgba(100,20,5,0)');
    c.fillStyle=g;c.fillRect(0,0,W,H);
  }
  // gravitational lensing lines toward right
  c.save();c.globalAlpha=.08;c.strokeStyle='#ff8844';c.lineWidth=1;
  for(let i=0;i<8;i++){
    const y=H*(i/8)+20;
    c.beginPath();c.moveTo(0,y);
    for(let x=0;x<=W;x+=10){
      const pull=((x/W)**2)*12*Math.sin(T*.2+i*.4);
      c.lineTo(x,y+pull);
    }
    c.stroke();
  }
  c.restore();
}

// Level 4 – Supernova
function bgSupernova(c){
  const hue=(T*15)%360;
  const bg=c.createRadialGradient(W/2,H/2,0,W/2,H/2,H*.8);
  bg.addColorStop(0,`hsla(${hue},60%,8%,1)`);
  bg.addColorStop(.5,`hsla(${(hue+120)%360},50%,4%,1)`);
  bg.addColorStop(1,'#020008');
  c.fillStyle=bg;c.fillRect(0,0,W,H);
  // radiating color bands
  for(let i=0;i<5;i++){
    const r2=H*(.15+i*.16)+20*Math.sin(T*.3+i);
    const g=c.createRadialGradient(W/2,H/2,r2*.6,W/2,H/2,r2);
    const h=(hue+i*60)%360;
    g.addColorStop(0,`hsla(${h},90%,50%,0)`);
    g.addColorStop(.7,`hsla(${h},90%,50%,.04)`);
    g.addColorStop(1,`hsla(${h},90%,50%,0)`);
    c.fillStyle=g;c.fillRect(0,0,W,H);
  }
  // random flash
  if(Math.random()<.005){
    c.fillStyle=`hsla(${Math.random()*360},100%,80%,.08)`;
    c.fillRect(0,0,W,H);
  }
  drawNebula(c,W*.2,H*.25,100,`hsla(${hue},70%,40%,.12)`,`hsla(${hue},50%,20%,.04)`,T,0);
  drawNebula(c,W*.8,H*.7,90,`hsla(${(hue+180)%360},70%,40%,.10)`,`hsla(${(hue+180)%360},50%,20%,.03)`,T,3);
}

function drawLevelBg(c){
  [bgVoid,bgAsteroid,bgSolar,bgHorizon,bgSupernova][activeLvl](c);
}

// ═══════════════════════════════════════════════════
//  DRAW STARS + DUST (shared)
// ═══════════════════════════════════════════════════
function drawStars(c){
  bgStars.forEach(s=>{
    const tw=.35+.65*Math.abs(Math.sin(T*s.ts+s.to));
    c.beginPath();c.arc(s.x,s.y,s.r,0,Math.PI*2);
    c.fillStyle=`rgba(255,255,255,${s.b*tw})`;c.fill();
  });
}
function drawDust(c){
  dust.forEach(d=>{
    d.x+=d.vx;d.y+=d.vy;
    if(d.y>H)d.y=0;if(d.x<0)d.x=W;if(d.x>W)d.x=0;
    c.beginPath();c.arc(d.x,d.y,d.r,0,Math.PI*2);
    c.fillStyle=d.blue?`rgba(120,120,255,${d.a})`:`rgba(255,160,80,${d.a})`;c.fill();
  });
}

// ═══════════════════════════════════════════════════
//  COSMIC BODY RENDERERS
// ═══════════════════════════════════════════════════
function drawBodyDust(c,x,y,r,ang){
  for(let i=3;i>=0;i--){
    const lr=r*(.42+i*.2),a=(.68-i*.12);
    const g=c.createRadialGradient(x,y,0,x,y,lr);
    g.addColorStop(0,`rgba(175,135,255,${a})`);
    g.addColorStop(.55,`rgba(95,68,200,${a*.5})`);
    g.addColorStop(1,'rgba(55,28,100,0)');
    c.fillStyle=g;c.beginPath();c.arc(x,y,lr,0,Math.PI*2);c.fill();
  }
  for(let i=0;i<7;i++){
    const a=ang*1.6+(i/7)*Math.PI*2+T*.38;
    c.beginPath();c.arc(x+Math.cos(a)*r*.64,y+Math.sin(a)*r*.64,1.1,0,Math.PI*2);
    c.fillStyle='rgba(215,190,255,.72)';c.fill();
  }
}
function drawBodyAsteroid(c,x,y,r,ang){
  c.save();c.translate(x,y);c.rotate(ang);
  const pts=[.86,.93,.79,.96,.83,.89,.76,.91,.84,.88];
  c.beginPath();
  pts.forEach((s,i)=>{
    const a=(i/pts.length)*Math.PI*2,d=r*s;
    i===0?c.moveTo(Math.cos(a)*d,Math.sin(a)*d):c.lineTo(Math.cos(a)*d,Math.sin(a)*d);
  });
  c.closePath();
  const g=c.createRadialGradient(-r*.3,-r*.3,0,r*.2,r*.2,r*1.1);
  g.addColorStop(0,'#999');g.addColorStop(.5,'#585858');g.addColorStop(1,'#1e1e1e');
  c.fillStyle=g;c.fill();c.strokeStyle='#2a2a2a';c.lineWidth=1;c.stroke();
  [[.28,-.22,.17],[-.32,.22,.11],[.08,.32,.07]].forEach(([cx,cy,cr])=>{
    c.beginPath();c.arc(r*cx,r*cy,r*cr,0,Math.PI*2);
    c.fillStyle='rgba(0,0,0,.4)';c.fill();
  });
  c.restore();
}
function drawBodyComet(c,x,y,r,vx,vy){
  c.save();c.translate(x,y);
  const spd=Math.hypot(vx,vy);
  const ta=spd>.3?Math.atan2(-vy,-vx):-.75;
  const tLen=r*3.9;
  c.save();c.rotate(ta);
  const tg=c.createLinearGradient(0,0,tLen,0);

function setupEngine(){
  const lv=LEVELS[activeLvl];
  engine=Engine.create({gravity:{x:lv.gx,y:lv.gy}});
  world=engine.world;
  const wo={isStatic:true,restitution:.15,friction:.9,label:'wall'};
  World.add(world,[
    Bodies.rectangle(W/2,H+WALL/2,W,WALL,wo),
    Bodies.rectangle(WALL/2,H/2,WALL,H*2,wo),
    Bodies.rectangle(W-WALL/2,H/2,WALL,H*2,wo),
  ]);
  if(lv.mechanic==='obstacles') spawnObstacles();
  Events.on(engine,'collisionStart',onCol);
}
function spawnObstacles(){
  obstacles=[];
  const configs=[
    [W*.28,H*.42,16],[W*.68,H*.5,20],[W*.5,H*.32,14],[W*.22,H*.62,18]
  ];
  configs.forEach(([x,y,r])=>{
    const b=Bodies.circle(x,y,r,{isStatic:true,restitution:.55,friction:.2,label:'obstacle'});
    World.add(world,b);obstacles.push(b);
  });
}
function onCol(ev){
  for(const p of ev.pairs){
    const a=p.bodyA,b=p.bodyB;
    if(a.bl===undefined||b.bl===undefined)continue;
    if(a.bl!==b.bl||a.bl>=COSMOS.length-1)continue;
    if(a.mg||b.mg)continue;
    const key=Math.min(a.id,b.id)+'_'+Math.max(a.id,b.id);
    if(mergingSet.has(key))continue;
    mergingSet.add(key);a.mg=b.mg=true;
    const lvl=a.bl,mx=(a.position.x+b.position.x)/2,my=(a.position.y+b.position.y)/2;
    setTimeout(()=>{
      if(!balls.includes(a)||!balls.includes(b)){mergingSet.delete(key);return;}
      rmBall(a);rmBall(b);
      const nl=lvl+1;
      const mul=LEVELS[activeLvl].mul;
      const gained=Math.round(SCORES[nl]*mul*(combo>=2?1+combo*.25:1));
      score+=gained;elSco().textContent=score;
      doCombo();
      const nova=nl>=8;
      const col=LEVELS[activeLvl].color;
      spawnParticles(mx,my,16+nl*3,nova,nova?null:col);
      spawnRing(mx,my,COSMOS[lvl].r,nova?'#ffcc44':col);
      spawnText(mx,my-COSMOS[lvl].r,combo>=2?`+${gained}\xd7${combo}`:`+${gained}`,combo>=2,nova?'#ffee88':null);
      if(nl>=6)doShake(nl-4);
      if(nova)doBloom('#ffeeaa',.55);else doBloom(col,.3);
      addBall(mx,my,nl,true);
      mergingSet.delete(key);
    },30);
  }
}
function addBall(x,y,lvl,merged){
  const r=COSMOS[lvl].r;
  const b=Bodies.circle(x,y,r,{restitution:.2,friction:.6,frictionAir:.008,label:'ball'});
  b.bl=lvl;b.mg=false;b.fresh=!merged;b.born=performance.now();
  if(!merged)Body.setVelocity(b,{x:0,y:0});
  World.add(world,b);balls.push(b);return b;
}
function rmBall(b){World.remove(world,b);balls=balls.filter(x=>x!==b);}

// Black hole gravity
function applyBhGrav(){
  for(const bh of balls){
    if(bh.bl!==10)continue;
    for(const o of balls){
      if(o===bh||o.mg)continue;
      const dx=bh.position.x-o.position.x,dy=bh.position.y-o.position.y;
      const d=Math.hypot(dx,dy);
      if(d<260&&d>COSMOS[10].r+COSMOS[o.bl].r+5){
        const f=.000028/(d*d/9000+.1);
        Body.applyForce(o,o.position,{x:dx*f,y:dy*f});
      }
    }
  }
}

// ═══════════════════════════════════════════════════
//  LEVEL MECHANICS (update each frame)
// ═══════════════════════════════════════════════════
function updateMechanics(dt){
  const mech=LEVELS[activeLvl].mechanic;
  if(mech==='solar'){
    solarTimer+=dt;
    if(!solarWarn&&!solarActive&&solarTimer>7){solarWarn=true;}
    if(solarWarn&&solarTimer>9){
      solarWarn=false;solarActive=true;solarDir=Math.random()>.5?1:-1;solarTimer=0;
      balls.forEach(b=>Body.applyForce(b,b.position,{x:solarDir*.045,y:-.008}));
      spawnParticles(solarDir>0?WALL:W-WALL,H/2,20,false,solarDir>0?'#ff8822':'#ffaa22');
      doBloom('#ff9944',.4);doShake(4);
      setTimeout(()=>solarActive=false,1400);
    }
    if(solarActive){
      balls.forEach(b=>Body.applyForce(b,b.position,{x:solarDir*.0025,y:0}));
    }
  }
  if(mech==='chaos'){
    // smoothly rotate gravity
    const target=gravTargetAngle;
    gravAngle+=Math.sign(Math.sin(target-gravAngle))*.008;
    engine.gravity.x=Math.sin(gravAngle)*1.85;
    engine.gravity.y=Math.cos(gravAngle)*1.85+.35;
    gravChangeTmr+=dt;
    if(gravChangeTmr>5){gravChangeTmr=0;gravTargetAngle=Math.random()*Math.PI*2;}
  }
}
function drawMechanicOverlay(){
  const mech=LEVELS[activeLvl].mechanic;
  // Solar: warning bar
  if(mech==='solar'&&solarWarn){
    const prog=Math.min(1,(solarTimer-7)/2);
    const bx=solarDir>0?WALL:W-WALL-6;
    const g=ctx.createLinearGradient(bx,0,bx+(solarDir>0?6:-6),0);
    g.addColorStop(0,'rgba(255,100,0,0)');g.addColorStop(1,`rgba(255,160,30,${.4+.3*Math.sin(T*8)})`);
    ctx.fillStyle=g;ctx.fillRect(solarDir>0?WALL:W-WALL-6,0,6,H*prog);
    ctx.save();ctx.globalAlpha=.5+.5*Math.sin(T*6);
    ctx.font='bold 13px Arial';ctx.textAlign='center';ctx.fillStyle='#ff9933';
    ctx.shadowColor='#ff6600';ctx.shadowBlur=10;
    ctx.fillText('SOLAR FLARE!',W/2,DANGER_Y+22);ctx.restore();
  }
  if(mech==='solar'&&solarActive){
    const g=ctx.createLinearGradient(solarDir>0?0:W,H/2,solarDir>0?W:0,H/2);
    g.addColorStop(0,`rgba(255,150,30,.18)`);g.addColorStop(1,'rgba(255,100,0,0)');
    ctx.fillStyle=g;ctx.fillRect(0,0,W,H);
  }
  // Chaos: gravity arrow
  if(mech==='chaos'){
    const gx=engine.gravity.x,gy=engine.gravity.y;
    const ang=Math.atan2(gy,gx);
    const cx=W-36,cy=36;
    ctx.save();ctx.globalAlpha=.55;ctx.translate(cx,cy);ctx.rotate(ang);
    ctx.strokeStyle='#ff44cc';ctx.lineWidth=2.5;ctx.lineCap='round';
    ctx.beginPath();ctx.moveTo(-18,0);ctx.lineTo(18,0);
    ctx.moveTo(10,-7);ctx.lineTo(18,0);ctx.lineTo(10,7);ctx.stroke();
    ctx.globalAlpha=.25;ctx.fillStyle='#ff44cc';
    ctx.beginPath();ctx.arc(0,0,22,0,Math.PI*2);ctx.fill();
    ctx.restore();
    ctx.save();ctx.font='8px Arial';ctx.fillStyle='rgba(255,100,200,.5)';
    ctx.textAlign='center';ctx.fillText('ZWAARTEKRACHT',cx,cy+28);ctx.restore();
  }
  // Drift: arrow on side
  if(mech==='drift'){
    const g=ctx.createLinearGradient(W-WALL-20,H/2,W-WALL,H/2);
    g.addColorStop(0,'rgba(255,80,30,0)');g.addColorStop(1,`rgba(255,80,30,${.2+.08*Math.sin(T*2)})`);
    ctx.fillStyle=g;ctx.fillRect(W-WALL-20,0,20,H);
    ctx.save();ctx.globalAlpha=.35+.1*Math.sin(T*2);
    ctx.font='bold 11px Arial';ctx.textAlign='right';ctx.fillStyle='#ff6633';
    ctx.fillText('&#8594;',W-WALL-4,H/2);ctx.restore();
  }
  // Obstacles (level 1): draw static asteroid visuals
  if(mech==='obstacles'){
    obstacles.forEach(ob=>{
      drawBodyAsteroid(ctx,ob.position.x,ob.position.y,ob.circleRadius,ob.angle);
      // glow rim
      const g=ctx.createRadialGradient(ob.position.x,ob.position.y,ob.circleRadius*.8,ob.position.x,ob.position.y,ob.circleRadius*1.5);
      g.addColorStop(0,'rgba(180,140,80,.1)');g.addColorStop(1,'rgba(140,100,40,0)');
      ctx.fillStyle=g;ctx.beginPath();ctx.arc(ob.position.x,ob.position.y,ob.circleRadius*1.5,0,Math.PI*2);ctx.fill();
    });
  }
}

function drop(){
  if(!canDrop||dead)return;
  const x=clampX(mouseX,cur);
  addBall(x,AIM_Y,cur,false);
  cur=nxt;nxt=rndLvl();drawPreview();
  canDrop=false;
  setTimeout(()=>{if(!dead)canDrop=true;},DROP_MS);
}
function checkDead(){
  for(const b of balls){
    if(b.fresh)continue;
    if(b.position.y-COSMOS[b.bl].r<DANGER_Y&&Math.hypot(b.velocity.x,b.velocity.y)<1.15){
      dead=true;canDrop=false;
      if(score>hs){hs=score;localStorage.setItem('cosmicHS5',hs);elHsc().textContent='BEST: '+hs;}
      elGoFinal().textContent=score;elGoPanel().style.display='block';return;
    }
  }
}
function clearGame(){
  if(engine){World.clear(world,false);Engine.clear(engine);}
  balls=[];obstacles=[];particles=[];texts=[];rings=[];
  score=0;dead=false;canDrop=true;combo=0;shakeF=0;bloom=0;
  solarTimer=0;solarWarn=false;solarActive=false;
  gravAngle=0;gravTargetAngle=0;gravChangeTmr=0;
  mergingSet.clear();clearTimeout(comboTmr);
  elSco().textContent='0';elCmb().textContent='';elGoPanel().style.display='none';
}
function goSelect(){
  clearGame();gameState='select';elSb().style.display='none';
}
function restartLevel(){
  clearGame();
  const lv=LEVELS[activeLvl];
  const badge=elBadge();badge.textContent=`Level ${activeLvl+1}: ${lv.name}`;
  badge.style.background=lv.dark;badge.style.color=lv.color;
  setupEngine();cur=rndLvl();nxt=rndLvl();drawPreview();
  elGoPanel().style.display='none';
}
function startLevel(idx){
  activeLvl=idx;clearGame();gameState='play';
  elSb().style.display='block';
  const lv=LEVELS[activeLvl];
  const badge=elBadge();badge.textContent=`Level ${idx+1}: ${lv.name}`;
  badge.style.background=lv.dark;badge.style.color=lv.color;
  setupEngine();cur=rndLvl();nxt=rndLvl();drawPreview();
}

// ═══════════════════════════════════════════════════
//  PREVIEW
// ═══════════════════════════════════════════════════
function drawPreview(){
  const p=document.getElementById('prvC');
  pCtx=p.getContext('2d');
  pCtx.clearRect(0,0,68,68);
  pCtx.fillStyle='#020818';pCtx.fillRect(0,0,68,68);
  drawCosmic(pCtx,34,34,nxt,0,0,0);
  elNxtName().textContent=COSMOS[nxt].name;
}

// ═══════════════════════════════════════════════════
//  LEVEL SELECT SCREEN
// ═══════════════════════════════════════════════════
function drawSelectScreen(){
  // animated bg (void style)
  bgVoid(ctx);drawStars(ctx);drawDust(ctx);

  // title
  ctx.save();
  ctx.font='bold 26px Arial';ctx.textAlign='center';ctx.textBaseline='middle';
  ctx.fillStyle='#c0d4ff';ctx.shadowColor='rgba(120,170,255,.8)';ctx.shadowBlur=22;
  ctx.fillText('COSMIC MERGE',W/2,38);ctx.restore();
  ctx.save();ctx.font='11px Arial';ctx.textAlign='center';ctx.fillStyle='#6688aa';
  ctx.fillText('KIES EEN LEVEL',W/2,62);ctx.restore();

  const cardX=18,cardW=W-36,cardH=72,startY=80,gap=8;
  LEVELS.forEach((lv,i)=>{
    const y=startY+i*(cardH+gap);
    const hov=hovCard===i;
    const alpha=hov?.95:.75;

    // card bg
    ctx.save();
    ctx.globalAlpha=alpha;
    const bg=ctx.createLinearGradient(cardX,y,cardX+cardW,y+cardH);
    bg.addColorStop(0,hov?`rgba(35,44,90,1)`:'rgba(22,28,60,.97)');
    bg.addColorStop(1,hov?'rgba(25,34,75,.98)':'rgba(15,20,48,.94)');
    ctx.fillStyle=bg;
    rr(ctx,cardX,y,cardW,cardH,8);ctx.fill();
    // border
    ctx.strokeStyle=hov?lv.color:'rgba(55,80,140,.9)';
    ctx.lineWidth=hov?2:1;ctx.stroke();
    ctx.restore();

    // color accent bar on left
    ctx.save();
    const barG=ctx.createLinearGradient(cardX,y,cardX,y+cardH);
    barG.addColorStop(0,lv.color);barG.addColorStop(1,lv.dark);
    ctx.fillStyle=barG;ctx.globalAlpha=hov?.9:.6;
    rr(ctx,cardX,y,4,cardH,2);ctx.fill();
    ctx.restore();

    // level number circle
    ctx.save();ctx.globalAlpha=hov?1:.8;
    ctx.fillStyle=lv.dark;
    ctx.beginPath();ctx.arc(cardX+22,y+cardH/2,16,0,Math.PI*2);ctx.fill();
    ctx.strokeStyle=lv.color;ctx.lineWidth=1.5;ctx.stroke();
    ctx.font='bold 13px Arial';ctx.textAlign='center';ctx.textBaseline='middle';
    ctx.fillStyle=lv.color;ctx.fillText(i+1,cardX+22,y+cardH/2);
    ctx.restore();

    // icon
    ctx.save();ctx.globalAlpha=hov?.7:.4;
    ctx.font='18px Arial';ctx.textAlign='left';ctx.textBaseline='middle';
    ctx.fillStyle=lv.color;
    ctx.fillText(lv.icon,cardX+45,y+cardH/2-6);
    ctx.restore();

    // level name
    ctx.save();ctx.globalAlpha=hov?1:.85;
    ctx.font=`bold 13px Arial`;ctx.textAlign='left';ctx.textBaseline='middle';
    ctx.fillStyle=hov?'#ffffff':'#c8daf0';
    ctx.fillText(lv.name,cardX+70,y+22);
    ctx.restore();

    // sub description
    ctx.save();ctx.globalAlpha=hov?.95:.75;
    ctx.font='10px Arial';ctx.textAlign='left';ctx.textBaseline='middle';
    ctx.fillStyle=hov?'#aabfd0':'#889aaa';
    ctx.fillText(lv.sub,cardX+70,y+42);
    ctx.restore();

    // score multiplier badge
    ctx.save();ctx.globalAlpha=hov?.8:.5;
    const mulTxt=`\xd7${lv.mul.toFixed(1)}`;
    ctx.font='bold 10px Arial';ctx.textAlign='right';ctx.textBaseline='middle';
    ctx.fillStyle=lv.color;
    ctx.fillText(mulTxt,cardX+cardW-12,y+22);
    ctx.globalAlpha=hov?.4:.2;ctx.fillStyle=lv.color;
    ctx.font='8px Arial';ctx.fillText('SCORE',cardX+cardW-12,y+36);
    ctx.restore();

    // play arrow on hover
    if(hov){
      ctx.save();ctx.globalAlpha=.7;
      ctx.font='bold 14px Arial';ctx.textAlign='right';ctx.textBaseline='middle';
      ctx.fillStyle='#ffffff';ctx.shadowColor=lv.color;ctx.shadowBlur=8;
      ctx.fillText('PLAY ▶',cardX+cardW-12,y+55);
      ctx.restore();
    }
  });

  // bottom hint
  ctx.save();ctx.font='9px Arial';ctx.textAlign='center';
  ctx.fillStyle='rgba(50,60,80,.6)';ctx.fillText('klik op een level om te starten',W/2,H-12);
  ctx.restore();
}

// ═══════════════════════════════════════════════════
//  MAIN GAME RENDER
// ═══════════════════════════════════════════════════
function renderGame(){
  ctx.clearRect(0,0,W,H);
  let sx=0,sy=0;
  if(shakeF>0){sx=(Math.random()-.5)*shakeA*2;sy=(Math.random()-.5)*shakeA*2;shakeF--;ctx.save();ctx.translate(sx,sy);}

  drawLevelBg(ctx);
  drawStars(ctx);
  drawDust(ctx);

  // walls
  ctx.fillStyle='rgba(4,6,14,.96)';
  ctx.fillRect(0,0,WALL,H);ctx.fillRect(W-WALL,0,WALL,H);ctx.fillRect(0,H-WALL,W,WALL);
  ctx.strokeStyle='rgba(20,35,80,.8)';ctx.lineWidth=1;ctx.strokeRect(.5,.5,W-1,H-1);

  // danger line
  ctx.save();ctx.strokeStyle='rgba(248,81,73,.3)';ctx.lineWidth=1.2;ctx.setLineDash([5,7]);
  ctx.beginPath();ctx.moveTo(WALL,DANGER_Y);ctx.lineTo(W-WALL,DANGER_Y);ctx.stroke();ctx.restore();

  // level mechanic overlays (obstacles drawn here too)
  drawMechanicOverlay();

  // merge rings
  for(let i=rings.length-1;i>=0;i--){
    const rg=rings[i];rg.r+=(rg.maxR-rg.r)*.15;rg.a-=.042;
    if(rg.a<=0){rings.splice(i,1);continue;}
    ctx.save();ctx.globalAlpha=rg.a;ctx.strokeStyle=rg.color;ctx.lineWidth=2.5;
    ctx.beginPath();ctx.arc(rg.x,rg.y,rg.r,0,Math.PI*2);ctx.stroke();ctx.restore();
  }

  // aim guide
  if(canDrop&&!dead){
    const ax=clampX(mouseX,cur),r=COSMOS[cur].r;
    ctx.save();ctx.strokeStyle='rgba(100,155,255,.09)';ctx.lineWidth=1;ctx.setLineDash([3,9]);
    ctx.beginPath();ctx.moveTo(ax,AIM_Y+r);ctx.lineTo(ax,H-WALL);ctx.stroke();ctx.restore();
    drawCosmic(ctx,ax,AIM_Y,cur,0,0,0);
  }

  // black hole gravity visual
  for(const bh of balls){
    if(bh.bl!==10)continue;
    const wg=ctx.createRadialGradient(bh.position.x,bh.position.y,COSMOS[10].r,bh.position.x,bh.position.y,250);
    wg.addColorStop(0,'rgba(0,0,0,.12)');wg.addColorStop(1,'rgba(0,0,0,0)');
    ctx.fillStyle=wg;ctx.beginPath();ctx.arc(bh.position.x,bh.position.y,250,0,Math.PI*2);ctx.fill();
  }

  // active balls
  for(const b of balls){
    const age=performance.now()-b.born;
    const pop=b.mg?1:(age<200?1+.15*Math.sin((age/200)*Math.PI):1);
    if(pop!==1){ctx.save();ctx.translate(b.position.x,b.position.y);ctx.scale(pop,pop);ctx.translate(-b.position.x,-b.position.y);}
    drawCosmic(ctx,b.position.x,b.position.y,b.bl,b.angle,b.velocity.x,b.velocity.y);
    if(pop!==1)ctx.restore();
    if(b.fresh&&b.position.y-COSMOS[b.bl].r>DANGER_Y)b.fresh=false;
    // star wind particles
    if(b.bl===8&&Math.random()<.45){
      const a=Math.random()*Math.PI*2,r=COSMOS[8].r;
      particles.push({x:b.position.x+Math.cos(a)*r,y:b.position.y+Math.sin(a)*r,
        vx:Math.cos(a)*1.9,vy:Math.sin(a)*1.9-.5,r:1.5,a:.85,color:'#ffdd88',decay:.04});
    }
  }

  // particles
  for(let i=particles.length-1;i>=0;i--){
    const p=particles[i];p.x+=p.vx;p.y+=p.vy;p.vy+=.11;p.vx*=.96;p.vy*=.96;p.a-=p.decay;
    if(p.a<=0){particles.splice(i,1);continue;}
    ctx.save();ctx.globalAlpha=p.a;ctx.fillStyle=p.color;ctx.shadowColor=p.color;ctx.shadowBlur=5;
    ctx.beginPath();ctx.arc(p.x,p.y,p.r,0,Math.PI*2);ctx.fill();ctx.restore();
  }

  // float texts
  for(let i=texts.length-1;i>=0;i--){
    const ft=texts[i];ft.y+=ft.vy;ft.vy*=.93;ft.a-=.017;
    if(ft.a<=0){texts.splice(i,1);continue;}
    ctx.save();ctx.globalAlpha=ft.a;
    ctx.font=`bold ${ft.big?22:16}px Arial`;ctx.textAlign='center';ctx.textBaseline='middle';
    ctx.fillStyle=ft.col||'#fff';ctx.shadowColor=ft.col||'#88aaff';ctx.shadowBlur=14;
    ctx.fillText(ft.txt,ft.x,ft.y);ctx.restore();
  }

  // bloom flash
  if(bloom>0){
    ctx.save();ctx.globalAlpha=bloom*.5;ctx.fillStyle=bloomCol;
    ctx.fillRect(0,0,W,H);ctx.restore();
    bloom=Math.max(0,bloom-.04);
  }

  if(dead){ctx.fillStyle='rgba(0,0,4,.55)';ctx.fillRect(0,0,W,H);}
  if(shakeF>0||(sx||sy))ctx.restore();
}

// ═══════════════════════════════════════════════════
//  MAIN LOOP
// ═══════════════════════════════════════════════════
function loop(){
  T+=.016;
  if(gameState==='select'){
    drawSelectScreen();
  } else {
    const dt=1/60;
    Engine.update(engine,1000/60);
    applyBhGrav();
    updateMechanics(dt);
    if(!dead)checkDead();
    renderGame();
    if(Math.round(T*60)%6===0)drawPreview();
  }
  requestAnimationFrame(loop);
}

// ═══════════════════════════════════════════════════
//  INPUT
// ═══════════════════════════════════════════════════
canvas.addEventListener('mousemove',e=>{
  const rect=canvas.getBoundingClientRect();
  mouseX=e.clientX-rect.left;mouseY=e.clientY-rect.top;
  if(gameState==='select'){
    const cardH=72,startY=80,gap=8;
    hovCard=-1;
    for(let i=0;i<5;i++){
      const y=startY+i*(cardH+gap);
      if(mouseY>=y&&mouseY<=y+cardH){hovCard=i;break;}
    }
    canvas.style.cursor=hovCard>=0?'pointer':'default';
  }
});
canvas.addEventListener('click',e=>{
  const rect=canvas.getBoundingClientRect();
  const cy=e.clientY-rect.top;
  if(gameState==='select'){
    const cardH=72,startY=80,gap=8;
    for(let i=0;i<5;i++){
      const y=startY+i*(cardH+gap);
      if(cy>=y&&cy<=y+cardH){startLevel(i);return;}
    }
  } else {drop();}
});
canvas.addEventListener('touchmove',e=>{
  e.preventDefault();mouseX=e.touches[0].clientX-canvas.getBoundingClientRect().left;
},{passive:false});
canvas.addEventListener('touchend',e=>{
  e.preventDefault();
  if(gameState==='play')drop();
  else{
    const cy=e.changedTouches[0].clientY-canvas.getBoundingClientRect().top;
    const cardH=72,startY=80,gap=8;
    for(let i=0;i<5;i++){
      const y=startY+i*(cardH+gap);if(cy>=y&&cy<=y+cardH){startLevel(i);return;}
    }
  }
},{passive:false});

// ═══════════════════════════════════════════════════
//  INIT
// ═══════════════════════════════════════════════════
canvas=document.getElementById('gameCanvas');
canvas.width=W;canvas.height=H;
ctx=canvas.getContext('2d');
elSb().style.display='none';
initStars();initDust();initDriftRocks();
loop();
</script>
