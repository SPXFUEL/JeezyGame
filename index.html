<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cosmic Merge</title>
<style>
* { margin:0; padding:0; box-sizing:border-box; }
body {
    background:#000;
    display:flex; flex-direction:column; align-items:center; justify-content:center;
    min-height:100vh; font-family:Arial,sans-serif; color:#fff;
    user-select:none; overflow:hidden;
}
#title {
    font-size:17px; letter-spacing:5px; color:#7788aa; margin-bottom:12px;
    font-weight:300; text-shadow:0 0 20px rgba(100,150,255,0.4);
}
#layout { display:flex; gap:16px; align-items:flex-start; }
#sidebar { width:124px; padding-top:4px; }
.lbl { font-size:9px; color:#334455; text-transform:uppercase; letter-spacing:2px; margin-bottom:3px; }
#scoreEl { font-size:34px; font-weight:bold; color:#b8ccff; margin-bottom:2px; text-shadow:0 0 12px rgba(100,150,255,0.3); }
#hsEl { font-size:10px; color:#334; margin-bottom:12px; }
#comboEl { font-size:19px; font-weight:bold; min-height:25px; margin-bottom:10px; color:#ffdd88; text-shadow:0 0 14px rgba(255,200,80,0.6); }
#nextBox {
    background:rgba(8,12,28,0.9); border:1px solid #1a2540;
    border-radius:10px; padding:10px; text-align:center; margin-bottom:10px;
}
#nextName { font-size:9px; color:#556; margin-top:4px; text-transform:uppercase; letter-spacing:1px; }
#previewCanvas { display:block; margin:6px auto 0; }
#goPanel {
    display:none; background:rgba(4,6,18,0.97); border:1px solid #f85149;
    border-radius:10px; padding:12px; text-align:center; margin-top:6px;
}
#goPanel h2 { color:#f85149; font-size:12px; letter-spacing:2px; margin-bottom:4px; }
#goScore { font-size:26px; font-weight:bold; color:#b8ccff; margin-bottom:8px; }
#restartBtn {
    width:100%; padding:8px; background:linear-gradient(135deg,#1a3a8f,#2a5ad0);
    color:#b8ccff; border:1px solid #2a5ad0; border-radius:6px;
    font-size:11px; cursor:pointer; letter-spacing:1px;
}
#restartBtn:hover { background:linear-gradient(135deg,#2a4aaf,#3a6ae0); }
#gameCanvas { cursor:crosshair; }
#tip { margin-top:8px; font-size:9px; color:#1a2030; letter-spacing:1px; }
</style>
</head>
<body>
<div id="title">&#10022; COSMIC MERGE &#10022;</div>
<div id="layout">
    <canvas id="gameCanvas"></canvas>
    <div id="sidebar">
        <div class="lbl">Score</div>
        <div id="scoreEl">0</div>
        <div id="hsEl">BEST: 0</div>
        <div id="comboEl"></div>
        <div id="nextBox">
            <div class="lbl">Volgende</div>
            <canvas id="previewCanvas" width="70" height="70"></canvas>
            <div id="nextName"></div>
        </div>
        <div id="goPanel">
            <h2>GAME OVER</h2>
            <div id="goScore">0</div>
            <button id="restartBtn" onclick="restartGame()">Opnieuw</button>
        </div>
    </div>
</div>
<div id="tip">klik om te droppen &bull; zelfde lichaam = merge</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/matter-js/0.19.0/matter.min.js"></script>
<script>
// ── Config ──────────────────────────────────────────────────────────────────
const W=380, H=580, WALL=18, DANGER_Y=88, AIM_Y=52, MAX_SPAWN=4, DROP_MS=700, COMBO_MS=1500;
const COSMOS=[
    {r:15,  name:'Stofwolk'},
    {r:22,  name:'Asteroid'},
    {r:30,  name:'Komeet'},
    {r:40,  name:'Maan'},
    {r:52,  name:'Rode Planeet'},
    {r:65,  name:'Blauwe Planeet'},
    {r:80,  name:'Gasreus'},
    {r:96,  name:'IJsreus'},
    {r:114, name:'Ster'},
    {r:134, name:'Neutronenster'},
    {r:156, name:'Zwart Gat'},
];
const SCORES=[1,3,6,10,15,21,28,36,45,55,66];
const {Engine,Bodies,Body,World,Events}=Matter;

// ── State ────────────────────────────────────────────────────────────────────
let engine,world,canvas,ctx,bgCanvas,bgCtx;
let balls=[],particles=[],texts=[],rings=[],dust=[];
let score=0, hs=parseInt(localStorage.getItem('cosmicHS')||'0');
let dead=false, canDrop=true, mouseX=W/2, cur=0, nxt=0;
let mergingSet=new Set(), combo=0, comboTmr=null;
let shakeF=0, shakeA=0, T=0;

document.getElementById('hsEl').textContent='BEST: '+hs;

// ── Background ───────────────────────────────────────────────────────────────
let bgStars=[];
function buildBg(){
    bgCanvas=document.createElement('canvas');
    bgCanvas.width=W; bgCanvas.height=H;
    bgCtx=bgCanvas.getContext('2d');
    const bg=bgCtx.createLinearGradient(0,0,W,H);
    bg.addColorStop(0,'#020818'); bg.addColorStop(0.5,'#040c1c'); bg.addColorStop(1,'#020612');
    bgCtx.fillStyle=bg; bgCtx.fillRect(0,0,W,H);
    // nebula blobs
    [{x:W*.2,y:H*.3,r:140,c:'rgba(55,15,110,0.18)'},{x:W*.8,y:H*.65,r:110,c:'rgba(15,55,95,0.14)'},
     {x:W*.5,y:H*.08,r:85,c:'rgba(90,25,70,0.12)'},{x:W*.1,y:H*.82,r:95,c:'rgba(10,70,55,0.10)'}
    ].forEach(n=>{
        const g=bgCtx.createRadialGradient(n.x,n.y,0,n.x,n.y,n.r);
        g.addColorStop(0,n.c); g.addColorStop(1,'rgba(0,0,0,0)');
        bgCtx.fillStyle=g; bgCtx.fillRect(0,0,W,H);
    });
    bgStars=[];
    for(let i=0;i<240;i++){
        const x=Math.random()*W, y=Math.random()*H;
        const r=Math.random()<0.05?1.4+Math.random()*.6:.3+Math.random()*.7;
        const b=.3+Math.random()*.7, ts=.5+Math.random()*2, to=Math.random()*Math.PI*2;
        bgStars.push({x,y,r,b,ts,to});
        bgCtx.beginPath(); bgCtx.arc(x,y,r,0,Math.PI*2);
        bgCtx.fillStyle=`rgba(255,255,255,${b*.55})`; bgCtx.fill();
    }
}
function initDust(){
    for(let i=0;i<40;i++) dust.push({
        x:Math.random()*W, y:Math.random()*H,
        vx:(Math.random()-.5)*.25, vy:Math.random()*.12+.02,
        r:.5+Math.random()*1.5, a:.08+Math.random()*.25,
        blue:Math.random()<.5,
    });
}

// ── Draw utilities ───────────────────────────────────────────────────────────
function sphere(c,x,y,r,dark,mid,light,hi){
    const g=c.createRadialGradient(x-r*.35,y-r*.38,r*.04,x+r*.1,y+r*.1,r*1.08);
    g.addColorStop(0,hi); g.addColorStop(.28,light); g.addColorStop(.65,mid); g.addColorStop(1,dark);
    c.beginPath(); c.arc(x,y,r,0,Math.PI*2); c.fillStyle=g; c.fill();
}
function outerGlow(c,x,y,r,col,a1,a2,mult1,mult2){
    const g=c.createRadialGradient(x,y,r*mult1,x,y,r*mult2);
    g.addColorStop(0,col.replace('__',a1)); g.addColorStop(1,col.replace('__',a2));
    c.fillStyle=g; c.beginPath(); c.arc(x,y,r*mult2,0,Math.PI*2); c.fill();
}
function clipCircle(c,r){ c.beginPath(); c.arc(0,0,r,0,Math.PI*2); c.clip(); }

// ── Cosmic body renderers ────────────────────────────────────────────────────
function drawDust(c,x,y,r,ang){
    for(let i=3;i>=0;i--){
        const lr=r*(.4+i*.22), a=(.65-i*.12);
        const g=c.createRadialGradient(x,y,0,x,y,lr);
        g.addColorStop(0,`rgba(170,130,255,${a})`);
        g.addColorStop(.55,`rgba(90,65,190,${a*.5})`);
        g.addColorStop(1,'rgba(50,25,100,0)');
        c.fillStyle=g; c.beginPath(); c.arc(x,y,lr,0,Math.PI*2); c.fill();
    }
    for(let i=0;i<7;i++){
        const a=ang*1.6+(i/7)*Math.PI*2+T*.4;
        c.beginPath(); c.arc(x+Math.cos(a)*r*.62, y+Math.sin(a)*r*.62, 1.1,0,Math.PI*2);
        c.fillStyle='rgba(210,185,255,.75)'; c.fill();
    }
}

function drawAsteroid(c,x,y,r,ang){
    c.save(); c.translate(x,y); c.rotate(ang);
    const offsets=[.86,.93,.79,.96,.83,.89,.76,.91,.84,.88];
    c.beginPath();
    offsets.forEach((s,i)=>{
        const a=(i/offsets.length)*Math.PI*2, d=r*s;
        i===0?c.moveTo(Math.cos(a)*d,Math.sin(a)*d):c.lineTo(Math.cos(a)*d,Math.sin(a)*d);
    });
    c.closePath();
    const g=c.createRadialGradient(-r*.3,-r*.3,0,r*.2,r*.2,r*1.1);
    g.addColorStop(0,'#989898'); g.addColorStop(.5,'#585858'); g.addColorStop(1,'#1e1e1e');
    c.fillStyle=g; c.fill();
    c.strokeStyle='#2a2a2a'; c.lineWidth=1; c.stroke();
    [[.28,-.22,.17],[-.32,.22,.11],[.08,.32,.07]].forEach(([cx,cy,cr])=>{
        c.beginPath(); c.arc(r*cx,r*cy,r*cr,0,Math.PI*2);
        c.fillStyle='rgba(0,0,0,.4)'; c.fill();
        c.strokeStyle='rgba(160,160,160,.15)'; c.lineWidth=.5; c.stroke();
    });
    c.restore();
}

function drawComet(c,x,y,r,vx,vy){
    c.save(); c.translate(x,y);
    const spd=Math.hypot(vx,vy);
    const tailAng=spd>.3?Math.atan2(-vy,-vx):-.8;
    c.save(); c.rotate(tailAng);
    const tLen=r*3.8;
    const tg=c.createLinearGradient(0,0,tLen,0);
    tg.addColorStop(0,'rgba(170,225,255,.55)'); tg.addColorStop(.5,'rgba(90,170,255,.2)'); tg.addColorStop(1,'rgba(70,150,255,0)');
    c.fillStyle=tg; c.beginPath(); c.moveTo(0,-r*.38); c.lineTo(tLen,0); c.lineTo(0,r*.38); c.fill();
    const tg2=c.createLinearGradient(0,0,tLen*.6,0);
    tg2.addColorStop(0,'rgba(220,240,255,.35)'); tg2.addColorStop(1,'rgba(200,230,255,0)');
    c.fillStyle=tg2; c.beginPath(); c.moveTo(0,-r*.14); c.lineTo(tLen*.6,0); c.lineTo(0,r*.14); c.fill();
    c.restore();
    sphere(c,0,0,r,'#163850','#2a6e9e','#5aaed4','#d8f0ff');
    const cg=c.createRadialGradient(0,0,r*.8,0,0,r*1.7);
    cg.addColorStop(0,'rgba(90,185,255,.14)'); cg.addColorStop(1,'rgba(60,140,255,0)');
    c.fillStyle=cg; c.beginPath(); c.arc(0,0,r*1.7,0,Math.PI*2); c.fill();
    c.restore();
}

function drawMoon(c,x,y,r,ang){
    c.save(); c.translate(x,y); c.rotate(ang);
    sphere(c,0,0,r,'#252525','#5a5a5a','#8e8e8e','#cccccc');
    c.save(); clipCircle(c,r);
    c.fillStyle='rgba(35,35,35,.5)';
    c.beginPath(); c.ellipse(-r*.2,r*.12,r*.38,r*.28,.3,0,Math.PI*2); c.fill();
    [[.28,-.3,.14],[-.38,.2,.10],[.1,.33,.07],[-.12,-.22,.055]].forEach(([cx,cy,cr])=>{
        c.beginPath(); c.arc(r*cx,r*cy,r*cr,0,Math.PI*2);
        c.fillStyle='rgba(45,45,45,.55)'; c.fill();
        c.strokeStyle='rgba(175,175,175,.18)'; c.lineWidth=.5; c.stroke();
    });
    c.restore(); c.restore();
}

function drawMars(c,x,y,r,ang){
    c.save(); c.translate(x,y); c.rotate(ang);
    sphere(c,0,0,r,'#521808','#a83828','#cc5838','#f08060');
    c.save(); clipCircle(c,r);
    c.fillStyle='rgba(135,48,25,.4)';
    c.beginPath(); c.ellipse(r*.2,r*.1,r*.28,r*.18,.5,0,Math.PI*2); c.fill();
    c.fillStyle='rgba(95,32,18,.3)';
    c.beginPath(); c.ellipse(-r*.28,-r*.14,r*.2,r*.14,-.3,0,Math.PI*2); c.fill();
    c.fillStyle='rgba(235,238,255,.72)';
    c.beginPath(); c.arc(0,-r,r*.32,0,Math.PI); c.fill();
    c.restore(); c.restore();
    const ag=c.createRadialGradient(x,y,r*.88,x,y,r*1.22);
    ag.addColorStop(0,'rgba(190,75,35,0)'); ag.addColorStop(.5,'rgba(190,75,35,.07)'); ag.addColorStop(1,'rgba(190,75,35,0)');
    c.fillStyle=ag; c.beginPath(); c.arc(x,y,r*1.22,0,Math.PI*2); c.fill();
}

function drawEarth(c,x,y,r,ang){
    c.save(); c.translate(x,y); c.rotate(ang);
    sphere(c,0,0,r,'#081e55','#1045b0','#1e72cc','#72b8f8');
    c.save(); clipCircle(c,r);
    c.fillStyle='rgba(35,125,45,.78)';
    [[-0.14,-0.08,.33,.23,.18],[.28,.06,.19,.28,-.1],[-0.28,.18,.23,.18,.1]].forEach(([cx,cy,rw,rh,rot])=>{
        c.save(); c.rotate(rot);
        c.beginPath(); c.ellipse(r*cx,r*cy,r*rw,r*rh,0,0,Math.PI*2); c.fill();
        c.restore();
    });
    c.fillStyle='rgba(225,235,255,.78)';
    c.beginPath(); c.arc(0,-r,r*.28,0,Math.PI); c.fill();
    c.beginPath(); c.arc(0,r,r*.18,Math.PI,Math.PI*2); c.fill();
    c.restore(); c.restore();
    // clouds on separate rotation
    c.save(); c.translate(x,y); c.rotate(ang*.65+T*.06);
    c.save(); clipCircle(c,r);
    c.fillStyle='rgba(255,255,255,.2)';
    [[-0.18,-0.28,.28,.1],[.1,.12,.22,.09],[-.1,.24,.18,.07]].forEach(([cx,cy,rw,rh])=>{
        c.beginPath(); c.ellipse(r*cx,r*cy,r*rw,r*rh,0,0,Math.PI*2); c.fill();
    });
    c.restore(); c.restore();
    const ag=c.createRadialGradient(x,y,r*.88,x,y,r*1.28);
    ag.addColorStop(0,'rgba(25,90,210,0)'); ag.addColorStop(.5,'rgba(25,90,210,.09)'); ag.addColorStop(1,'rgba(25,90,210,0)');
    c.fillStyle=ag; c.beginPath(); c.arc(x,y,r*1.28,0,Math.PI*2); c.fill();
}

function drawJupiter(c,x,y,r,ang){
    c.save(); c.translate(x,y); c.rotate(ang);
    sphere(c,0,0,r,'#52280c','#b06838','#d89050','#ffd898');
    c.save(); clipCircle(c,r);
    [[-.68,.13,'rgba(115,62,28,.52)'],[-.44,.1,'rgba(195,132,72,.42)'],[-.2,.11,'rgba(92,48,18,.48)'],
     [.06,.08,'rgba(210,148,82,.36)'],[.2,.11,'rgba(100,54,22,.44)'],[.44,.1,'rgba(170,110,55,.38)'],[.62,.1,'rgba(82,44,18,.44)']
    ].forEach(([cy,h,col])=>{ c.fillStyle=col; c.fillRect(-r,r*cy-r*h*.5,r*2,r*h); });
    c.save(); c.rotate(T*.018);
    c.fillStyle='rgba(175,45,28,.62)';
    c.beginPath(); c.ellipse(r*.24,r*.1,r*.21,r*.13,.1,0,Math.PI*2); c.fill();
    c.fillStyle='rgba(215,72,45,.38)';
    c.beginPath(); c.ellipse(r*.24,r*.1,r*.13,r*.07,.1,0,Math.PI*2); c.fill();
    c.restore(); c.restore(); c.restore();
}

function drawNeptune(c,x,y,r,ang){
    c.save(); c.translate(x,y); c.rotate(ang);
    sphere(c,0,0,r,'#081e58','#1235a0','#1c58cc','#55a0ff');
    c.save(); clipCircle(c,r);
    [[-.28,.18,'rgba(25,65,155,.42)'],[.1,.14,'rgba(35,75,172,.32)'],[.34,.14,'rgba(18,50,120,.38)']].forEach(([cy,h,col])=>{
        c.fillStyle=col; c.fillRect(-r,r*cy,r*2,r*h);
    });
    c.fillStyle='rgba(140,195,255,.28)';
    c.beginPath(); c.ellipse(-r*.18,-r*.14,r*.18,r*.11,-.2,0,Math.PI*2); c.fill();
    c.restore(); c.restore();
    // rings
    c.save(); c.translate(x,y);
    c.strokeStyle='rgba(88,148,218,.38)'; c.lineWidth=2.5;
    c.beginPath(); c.ellipse(0,0,r*1.52,r*.28,0,0,Math.PI*2); c.stroke();
    c.strokeStyle='rgba(68,125,195,.2)'; c.lineWidth=4.5;
    c.beginPath(); c.ellipse(0,0,r*1.68,r*.33,0,0,Math.PI*2); c.stroke();
    c.restore();
}

function drawStar(c,x,y,r){
    // glow layers
    [[3.4,.07],[2.4,.14],[1.75,.28]].forEach(([m,a])=>{
        const g=c.createRadialGradient(x,y,r*.5,x,y,r*m);
        g.addColorStop(0,`rgba(255,195,75,${a})`); g.addColorStop(1,'rgba(255,110,15,0)');
        c.fillStyle=g; c.beginPath(); c.arc(x,y,r*m,0,Math.PI*2); c.fill();
    });
    sphere(c,x,y,r,'#ee3800','#ff8800','#ffbb00','#ffffff');
    // surface convection
    c.save(); c.translate(x,y); clipCircle(c,r);
    c.fillStyle='rgba(255,65,0,.28)';
    c.beginPath(); c.arc(r*.2,r*.1,r*.24,0,Math.PI*2); c.fill();
    c.beginPath(); c.arc(-r*.28,-r*.08,r*.18,0,Math.PI*2); c.fill();
    c.restore();
    // corona rays
    c.save(); c.translate(x,y);
    for(let i=0;i<14;i++){
        const a=(i/14)*Math.PI*2+T*.28;
        const len=r*(.22+.14*Math.sin(T*2.2+i));
        const rg=c.createLinearGradient(Math.cos(a)*r*.9,Math.sin(a)*r*.9,Math.cos(a)*(r+len),Math.sin(a)*(r+len));
        rg.addColorStop(0,'rgba(255,215,70,.52)'); rg.addColorStop(1,'rgba(255,140,25,0)');
        c.strokeStyle=rg; c.lineWidth=1.5;
        c.beginPath(); c.moveTo(Math.cos(a)*r*.9,Math.sin(a)*r*.9);
        c.lineTo(Math.cos(a)*(r+len),Math.sin(a)*(r+len)); c.stroke();
    }
    c.restore();
}

function drawNeutron(c,x,y,r){
    const pulse=.92+.08*Math.sin(T*9);
    // intense glow
    [[4,.055],[3,.11],[2,.24]].forEach(([m,a])=>{
        const g=c.createRadialGradient(x,y,0,x,y,r*m);
        g.addColorStop(0,`rgba(165,215,255,${a})`); g.addColorStop(1,'rgba(90,170,255,0)');
        c.fillStyle=g; c.beginPath(); c.arc(x,y,r*m,0,Math.PI*2); c.fill();
    });
    sphere(c,x,y,r*pulse,'#9ab8f8','#bcd4ff','#dce8ff','#ffffff');
    // pulsar beams
    c.save(); c.translate(x,y); c.rotate(T*3.2);
    [-1,1].forEach(dir=>{
        const bg=c.createLinearGradient(0,dir*r,0,dir*r*4.5);
        bg.addColorStop(0,'rgba(165,215,255,.62)'); bg.addColorStop(1,'rgba(110,175,255,0)');
        c.fillStyle=bg;
        c.beginPath(); c.moveTo(-r*.14,0); c.lineTo(r*.14,0); c.lineTo(0,dir*r*4.5); c.fill();
    });
    c.restore();
}

function drawBlackHole(c,x,y,r){
    // space warp
    for(let i=5;i>=0;i--){
        const g=c.createRadialGradient(x,y,r*(.5+i*.28),x,y,r*(.78+i*.28));
        const a=[0,.018,.035,.052,.042,.025][i];
        g.addColorStop(0,'rgba(0,0,0,0)'); g.addColorStop(.5,`rgba(0,0,0,${a})`); g.addColorStop(1,'rgba(0,0,0,0)');
        c.fillStyle=g; c.beginPath(); c.arc(x,y,r*(.78+i*.28)*1.18,0,Math.PI*2); c.fill();
    }
    // accretion disk
    c.save(); c.translate(x,y); c.rotate(T*.75);
    const segs=36;
    for(let i=0;i<segs;i++){
        const a1=(i/segs)*Math.PI*2, a2=((i+1)/segs)*Math.PI*2;
        const bright=.38+.62*Math.abs(Math.sin(i*.42+T*1.8));
        const hue=25+i*.12;
        c.fillStyle=`hsla(${hue},100%,${48+bright*22}%,${.55+bright*.32})`;
        c.beginPath();
        c.arc(0,0,r*1.88,a1,a2);
        c.arc(0,0,r*1.12,a2,a1,true);
        c.fill();
    }
    const dg=c.createRadialGradient(0,0,r*1.08,0,0,r*1.92);
    dg.addColorStop(0,'rgba(255,255,190,.38)'); dg.addColorStop(.4,'rgba(255,140,45,.28)'); dg.addColorStop(1,'rgba(90,40,0,0)');
    c.fillStyle=dg; c.beginPath(); c.arc(0,0,r*1.92,0,Math.PI*2); c.fill();
    c.restore();
    // event horizon
    c.beginPath(); c.arc(x,y,r,0,Math.PI*2); c.fillStyle='#000'; c.fill();
    // edge glow
    const eg=c.createRadialGradient(x,y,r*.82,x,y,r*1.06);
    eg.addColorStop(0,'rgba(255,115,28,0)'); eg.addColorStop(.65,'rgba(255,155,45,.52)'); eg.addColorStop(1,'rgba(255,195,90,0)');
    c.fillStyle=eg; c.beginPath(); c.arc(x,y,r*1.06,0,Math.PI*2); c.fill();
    // polar jets
    c.save(); c.translate(x,y);
    [-1,1].forEach(dir=>{
        const jg=c.createLinearGradient(0,dir*r,0,dir*r*3.8);
        jg.addColorStop(0,'rgba(135,195,255,.52)'); jg.addColorStop(1,'rgba(90,165,255,0)');
        c.fillStyle=jg;
        c.beginPath(); c.moveTo(-r*.07,dir*r); c.lineTo(r*.07,dir*r); c.lineTo(0,dir*r*3.8); c.fill();
    });
    c.restore();
}

function drawBody(c,x,y,lvl,ang,vx,vy){
    switch(lvl){
        case 0: drawDust(c,x,y,COSMOS[0].r,ang); break;
        case 1: drawAsteroid(c,x,y,COSMOS[1].r,ang); break;
        case 2: drawComet(c,x,y,COSMOS[2].r,vx,vy); break;
        case 3: drawMoon(c,x,y,COSMOS[3].r,ang); break;
        case 4: drawMars(c,x,y,COSMOS[4].r,ang); break;
        case 5: drawEarth(c,x,y,COSMOS[5].r,ang); break;
        case 6: drawJupiter(c,x,y,COSMOS[6].r,ang); break;
        case 7: drawNeptune(c,x,y,COSMOS[7].r,ang); break;
        case 8: drawStar(c,x,y,COSMOS[8].r); break;
        case 9: drawNeutron(c,x,y,COSMOS[9].r); break;
        case 10: drawBlackHole(c,x,y,COSMOS[10].r); break;
    }
}

// ── Helpers ──────────────────────────────────────────────────────────────────
function clampX(x,lvl){ const r=COSMOS[lvl].r; return Math.max(WALL+r+2,Math.min(W-WALL-r-2,x)); }
function rndLvl(){ return Math.floor(Math.random()*(MAX_SPAWN+1)); }

// ── Effects ──────────────────────────────────────────────────────────────────
function spawnParticles(x,y,lvl,nova){
    const cols=nova?['#fff','#fffaaa','#ffaa44','#ff6600']:['#aaddff','#88bbff','#6699ff','#ffffff'];
    const n=14+lvl*3;
    for(let i=0;i<n;i++){
        const a=(Math.PI*2*i/n)+(Math.random()-.5)*.9;
        const spd=nova?4+Math.random()*9:2+Math.random()*4.5;
        particles.push({x,y,vx:Math.cos(a)*spd,vy:Math.sin(a)*spd-1,
            r:nova?2+Math.random()*5:1.5+Math.random()*3,
            a:1,color:cols[Math.floor(Math.random()*cols.length)],
            decay:.024+Math.random()*.02});
    }
}
function spawnRing(x,y,r,col){ rings.push({x,y,r,maxR:r*3.2,a:.9,color:col}); }
function spawnText(x,y,txt,big){ texts.push({x,y,vy:-2.5,txt,a:1,big}); }
function shake(amt){ shakeF=10; shakeA=amt; }
function doCombo(){
    combo++;
    clearTimeout(comboTmr);
    comboTmr=setTimeout(()=>{ combo=0; document.getElementById('comboEl').textContent=''; },COMBO_MS);
    document.getElementById('comboEl').textContent=combo>=2?`COMBO \xd7${combo}`:'';
}

// ── Physics ──────────────────────────────────────────────────────────────────
function setupEngine(){
    engine=Engine.create({gravity:{x:0,y:2}}); world=engine.world;
    const o={isStatic:true,restitution:.15,friction:.9,label:'wall'};
    World.add(world,[
        Bodies.rectangle(W/2,H+WALL/2,W,WALL,o),
        Bodies.rectangle(WALL/2,H/2,WALL,H*2,o),
        Bodies.rectangle(W-WALL/2,H/2,WALL,H*2,o),
    ]);
    Events.on(engine,'collisionStart',onCol);
}

function onCol(ev){
    for(const p of ev.pairs){
        const a=p.bodyA, b=p.bodyB;
        if(a.bl===undefined||b.bl===undefined) continue;
        if(a.bl!==b.bl||a.bl>=COSMOS.length-1) continue;
        if(a.mg||b.mg) continue;
        const key=Math.min(a.id,b.id)+'_'+Math.max(a.id,b.id);
        if(mergingSet.has(key)) continue;
        mergingSet.add(key); a.mg=b.mg=true;
        const lvl=a.bl, mx=(a.position.x+b.position.x)/2, my=(a.position.y+b.position.y)/2;
        setTimeout(()=>{
            if(!balls.includes(a)||!balls.includes(b)){ mergingSet.delete(key); return; }
            rmBall(a); rmBall(b);
            const nl=lvl+1;
            const gained=Math.round(SCORES[nl]*(combo>=2?1+combo*.25:1));
            score+=gained;
            document.getElementById('scoreEl').textContent=score;
            doCombo();
            const nova=nl>=8;
            spawnParticles(mx,my,nl,nova);
            spawnRing(mx,my,COSMOS[lvl].r,nova?'#ffcc44':'#88aaff');
            spawnText(mx,my-COSMOS[lvl].r,combo>=2?`+${gained} \xd7${combo}`:`+${gained}`,combo>=2);
            if(nl>=6) shake(nl-4);
            addBall(mx,my,nl,true);
            mergingSet.delete(key);
        },30);
    }
}

function addBall(x,y,lvl,merged){
    const r=COSMOS[lvl].r;
    const b=Bodies.circle(x,y,r,{restitution:.2,friction:.6,frictionAir:.008,label:'ball'});
    b.bl=lvl; b.mg=false; b.fresh=!merged; b.born=performance.now();
    if(!merged) Body.setVelocity(b,{x:0,y:0});
    World.add(world,b); balls.push(b); return b;
}
function rmBall(b){ World.remove(world,b); balls=balls.filter(x=>x!==b); }

function blackHoleGravity(){
    for(const bh of balls){
        if(bh.bl!==10) continue;
        for(const o of balls){
            if(o===bh||o.mg) continue;
            const dx=bh.position.x-o.position.x, dy=bh.position.y-o.position.y;
            const d=Math.hypot(dx,dy);
            if(d<260&&d>COSMOS[10].r+COSMOS[o.bl].r+5){
                const f=.000028/(d*d/9000+.1);
                Body.applyForce(o,o.position,{x:dx*f,y:dy*f});
            }
        }
    }
}

// ── Drop & game over ─────────────────────────────────────────────────────────
function drop(){
    if(!canDrop||dead) return;
    addBall(clampX(mouseX,cur),AIM_Y,cur,false);
    cur=nxt; nxt=rndLvl(); drawPreview();
    canDrop=false;
    setTimeout(()=>{ if(!dead) canDrop=true; },DROP_MS);
}

function checkDead(){
    for(const b of balls){
        if(b.fresh) continue;
        if(b.position.y-COSMOS[b.bl].r<DANGER_Y&&Math.hypot(b.velocity.x,b.velocity.y)<1.15){
            dead=true; canDrop=false;
            if(score>hs){ hs=score; localStorage.setItem('cosmicHS',hs); document.getElementById('hsEl').textContent='BEST: '+hs; }
            document.getElementById('goScore').textContent=score;
            document.getElementById('goPanel').style.display='block';
            return;
        }
    }
}

function restartGame(){
    World.clear(world); Engine.clear(world);
    balls=[]; particles=[]; texts=[]; rings=[];
    score=0; dead=false; canDrop=true; combo=0; shakeF=0;
    mergingSet.clear(); clearTimeout(comboTmr);
    document.getElementById('scoreEl').textContent='0';
    document.getElementById('comboEl').textContent='';
    document.getElementById('goPanel').style.display='none';
    setupEngine(); cur=rndLvl(); nxt=rndLvl(); drawPreview();
}

// ── Preview ──────────────────────────────────────────────────────────────────
function drawPreview(){
    const pc=document.getElementById('previewCanvas');
    const p=pc.getContext('2d');
    p.clearRect(0,0,70,70);
    p.fillStyle='#020818'; p.fillRect(0,0,70,70);
    p.save(); p.translate(35,35); p.restore();
    drawBody(p,35,35,nxt,0,0,0);
    document.getElementById('nextName').textContent=COSMOS[nxt].name;
}

// ── Render ───────────────────────────────────────────────────────────────────
function render(){
    ctx.clearRect(0,0,W,H);
    let sx=0,sy=0;
    if(shakeF>0){ sx=(Math.random()-.5)*shakeA*2; sy=(Math.random()-.5)*shakeA*2; shakeF--; ctx.save(); ctx.translate(sx,sy); }

    ctx.drawImage(bgCanvas,0,0);
    // twinkling
    bgStars.forEach(s=>{
        const tw=.38+.62*Math.abs(Math.sin(T*s.ts+s.to));
        ctx.beginPath(); ctx.arc(s.x,s.y,s.r,0,Math.PI*2);
        ctx.fillStyle=`rgba(255,255,255,${s.b*tw*.92})`; ctx.fill();
    });
    // ambient dust
    dust.forEach(d=>{
        d.x+=d.vx; d.y+=d.vy;
        if(d.y>H) d.y=0; if(d.x<0) d.x=W; if(d.x>W) d.x=0;
        ctx.beginPath(); ctx.arc(d.x,d.y,d.r,0,Math.PI*2);
        ctx.fillStyle=d.blue?`rgba(128,128,255,${d.a})`:`rgba(255,165,95,${d.a})`; ctx.fill();
    });
    // walls
    ctx.fillStyle='rgba(4,7,16,.96)';
    ctx.fillRect(0,0,WALL,H); ctx.fillRect(W-WALL,0,WALL,H); ctx.fillRect(0,H-WALL,W,WALL);
    ctx.strokeStyle='rgba(22,40,90,.8)'; ctx.lineWidth=1; ctx.strokeRect(.5,.5,W-1,H-1);
    // danger line
    ctx.save(); ctx.strokeStyle='rgba(248,81,73,.28)'; ctx.lineWidth=1; ctx.setLineDash([5,7]);
    ctx.beginPath(); ctx.moveTo(WALL,DANGER_Y); ctx.lineTo(W-WALL,DANGER_Y); ctx.stroke(); ctx.restore();
    // rings
    for(let i=rings.length-1;i>=0;i--){
        const rg=rings[i]; rg.r+=(rg.maxR-rg.r)*.15; rg.a-=.042;
        if(rg.a<=0){ rings.splice(i,1); continue; }
        ctx.save(); ctx.globalAlpha=rg.a; ctx.strokeStyle=rg.color; ctx.lineWidth=2.5;
        ctx.beginPath(); ctx.arc(rg.x,rg.y,rg.r,0,Math.PI*2); ctx.stroke(); ctx.restore();
    }
    // aim
    if(canDrop&&!dead){
        const ax=clampX(mouseX,cur), r=COSMOS[cur].r;
        ctx.save(); ctx.strokeStyle='rgba(100,155,255,.1)'; ctx.lineWidth=1; ctx.setLineDash([3,9]);
        ctx.beginPath(); ctx.moveTo(ax,AIM_Y+r); ctx.lineTo(ax,H-WALL); ctx.stroke(); ctx.restore();
        drawBody(ctx,ax,AIM_Y,cur,0,0,0);
    }
    // black hole warp visual
    for(const bh of balls){
        if(bh.bl!==10) continue;
        const wg=ctx.createRadialGradient(bh.position.x,bh.position.y,COSMOS[10].r,bh.position.x,bh.position.y,240);
        wg.addColorStop(0,'rgba(0,0,0,.12)'); wg.addColorStop(1,'rgba(0,0,0,0)');
        ctx.fillStyle=wg; ctx.beginPath(); ctx.arc(bh.position.x,bh.position.y,240,0,Math.PI*2); ctx.fill();
    }
    // balls
    for(const b of balls){
        const age=performance.now()-b.born;
        const pop=b.mg?1:(age<200?1+.15*Math.sin((age/200)*Math.PI):1);
        if(pop!==1){ ctx.save(); ctx.translate(b.position.x,b.position.y); ctx.scale(pop,pop); ctx.translate(-b.position.x,-b.position.y); }
        drawBody(ctx,b.position.x,b.position.y,b.bl,b.angle,b.velocity.x,b.velocity.y);
        if(pop!==1) ctx.restore();
        if(b.fresh&&b.position.y-COSMOS[b.bl].r>DANGER_Y) b.fresh=false;
    }
    // star wind particles (emitted here)
    for(const b of balls){
        if(b.bl!==8) continue;
        if(Math.random()<.45){
            const a=Math.random()*Math.PI*2, r=COSMOS[8].r;
            particles.push({x:b.position.x+Math.cos(a)*r,y:b.position.y+Math.sin(a)*r,
                vx:Math.cos(a)*1.8,vy:Math.sin(a)*1.8-.5,r:1.5,a:.85,color:'#ffdd88',decay:.04});
        }
    }
    // particles
    for(let i=particles.length-1;i>=0;i--){
        const p=particles[i]; p.x+=p.vx; p.y+=p.vy; p.vy+=.11; p.vx*=.96; p.vy*=.96; p.a-=p.decay;
        if(p.a<=0){ particles.splice(i,1); continue; }
        ctx.save(); ctx.globalAlpha=p.a; ctx.fillStyle=p.color;
        ctx.shadowColor=p.color; ctx.shadowBlur=5;
        ctx.beginPath(); ctx.arc(p.x,p.y,p.r,0,Math.PI*2); ctx.fill(); ctx.restore();
    }
    // float texts
    for(let i=texts.length-1;i>=0;i--){
        const ft=texts[i]; ft.y+=ft.vy; ft.vy*=.93; ft.a-=.017;
        if(ft.a<=0){ texts.splice(i,1); continue; }
        ctx.save(); ctx.globalAlpha=ft.a;
        ctx.font=`bold ${ft.big?22:16}px Arial`; ctx.textAlign='center'; ctx.textBaseline='middle';
        ctx.fillStyle='#fff'; ctx.shadowColor=ft.big?'#ffcc44':'#88aaff'; ctx.shadowBlur=14;
        ctx.fillText(ft.txt,ft.x,ft.y); ctx.restore();
    }
    if(dead){ ctx.fillStyle='rgba(0,0,4,.55)'; ctx.fillRect(0,0,W,H); }
    if(shakeF>0||(sx||sy)) ctx.restore();
}

// ── Loop ─────────────────────────────────────────────────────────────────────
function loop(){
    T+=.016;
    Engine.update(engine,1000/60);
    blackHoleGravity();
    if(!dead) checkDead();
    render();
    if(Math.round(T*60)%6===0) drawPreview();
    requestAnimationFrame(loop);
}

// ── Init ─────────────────────────────────────────────────────────────────────
canvas=document.getElementById('gameCanvas');
canvas.width=W; canvas.height=H;
ctx=canvas.getContext('2d');
canvas.addEventListener('mousemove',e=>{ mouseX=e.clientX-canvas.getBoundingClientRect().left; });
canvas.addEventListener('click',drop);
canvas.addEventListener('touchmove',e=>{ e.preventDefault(); mouseX=e.touches[0].clientX-canvas.getBoundingClientRect().left; },{passive:false});
canvas.addEventListener('touchend',e=>{ e.preventDefault(); drop(); },{passive:false});
buildBg(); initDust(); setupEngine();
cur=rndLvl(); nxt=rndLvl(); drawPreview();
loop();
</script>
</body>
</html>
