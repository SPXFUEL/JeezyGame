<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Groepjes Tellen</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #1a1a2e;
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
    overflow: hidden;
    font-family: 'Arial Rounded MT Bold', Arial, sans-serif;
  }
  canvas { display: block; touch-action: none; }
</style>
</head>
<body>
<canvas id="game" width="390" height="700"></canvas>
<script>
const canvas = document.getElementById('game');
const ctx = canvas.getContext('2d');

// --- State ---
const TOTAL_ROUNDS = 10;
let round = 0;
let score = 0;
let correctAnswer = 0;
let answerButtons = [];
let objects = [];
let phase = 'playing'; // 'playing' | 'feedback' | 'done'
let feedbackText = '';
let feedbackColor = '';
let feedbackTimer = 0;
let stars = [];
let bgHue = 200;

// Object sets
const SETS = [
  { emoji: '🍎', name: 'appels' },
  { emoji: '⭐', name: 'sterren' },
  { emoji: '🎈', name: 'ballonnen' },
  { emoji: '🍭', name: 'lollies' },
  { emoji: '🦋', name: 'vlinders' },
  { emoji: '🍊', name: 'sinaasappels' },
  { emoji: '🌸', name: 'bloemen' },
  { emoji: '🐸', name: 'kikkers' },
  { emoji: '🍓', name: 'aardbeien' },
  { emoji: '🚀', name: 'raketten' },
];

// Background stars
for (let i = 0; i < 40; i++) {
  stars.push({
    x: Math.random() * 390,
    y: Math.random() * 700,
    r: Math.random() * 2 + 0.5,
    twinkle: Math.random() * Math.PI * 2,
    speed: Math.random() * 0.03 + 0.01,
  });
}

// Floating object
function FloatingObj(x, y, emoji, index) {
  this.x = x;
  this.y = y;
  this.targetY = y;
  this.startY = y - 60;
  this.emoji = emoji;
  this.size = 54;
  this.phase = (index * 0.6);
  this.amplitude = 8 + Math.random() * 6;
  this.speed = 0.035 + Math.random() * 0.02;
  this.t = 0;
  this.alpha = 0;
  this.entered = false;
}
FloatingObj.prototype.update = function() {
  this.t += this.speed;
  if (this.alpha < 1) this.alpha = Math.min(1, this.alpha + 0.06);
};
FloatingObj.prototype.draw = function() {
  ctx.save();
  ctx.globalAlpha = this.alpha;
  const bobY = Math.sin(this.t + this.phase) * this.amplitude;
  ctx.font = this.size + 'px serif';
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  ctx.fillText(this.emoji, this.x, this.y + bobY);
  ctx.restore();
};

// Answer button
function AnswerBtn(x, y, w, h, label) {
  this.x = x; this.y = y; this.w = w; this.h = h;
  this.label = label;
  this.scale = 1;
  this.targetScale = 1;
  this.color = '#f7c948';
  this.pressed = false;
}
AnswerBtn.prototype.draw = function() {
  ctx.save();
  const cx = this.x + this.w / 2;
  const cy = this.y + this.h / 2;
  ctx.translate(cx, cy);
  ctx.scale(this.scale, this.scale);
  ctx.translate(-this.w / 2, -this.h / 2);
  // Shadow
  ctx.shadowColor = 'rgba(0,0,0,0.35)';
  ctx.shadowBlur = 12;
  ctx.shadowOffsetY = 4;
  // Button body
  ctx.beginPath();
  roundRect(ctx, 0, 0, this.w, this.h, 22);
  ctx.fillStyle = this.color;
  ctx.fill();
  ctx.shadowBlur = 0;
  // Border
  ctx.strokeStyle = 'rgba(255,255,255,0.4)';
  ctx.lineWidth = 3;
  ctx.stroke();
  // Label
  ctx.fillStyle = '#1a1a2e';
  ctx.font = 'bold 44px Arial Rounded MT Bold, Arial';
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  ctx.fillText(this.label, this.w / 2, this.h / 2 + 2);
  ctx.restore();
};
AnswerBtn.prototype.contains = function(px, py) {
  return px >= this.x && px <= this.x + this.w &&
         py >= this.y && py <= this.y + this.h;
};

function roundRect(ctx, x, y, w, h, r) {
  ctx.moveTo(x + r, y);
  ctx.lineTo(x + w - r, y);
  ctx.quadraticCurveTo(x + w, y, x + w, y + r);
  ctx.lineTo(x + w, y + h - r);
  ctx.quadraticCurveTo(x + w, y + h, x + w - r, y + h);
  ctx.lineTo(x + r, y + h);
  ctx.quadraticCurveTo(x, y + h, x, y + h - r);
  ctx.lineTo(x, y + r);
  ctx.quadraticCurveTo(x, y, x + r, y);
  ctx.closePath();
}

function shuffle(arr) {
  for (let i = arr.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [arr[i], arr[j]] = [arr[j], arr[i]];
  }
  return arr;
}

function startRound() {
  phase = 'playing';
  feedbackText = '';
  objects = [];
  answerButtons = [];

  const set = SETS[round % SETS.length];
  correctAnswer = Math.floor(Math.random() * 5) + 1;

  // Layout: spread objects nicely
  const positions = buildPositions(correctAnswer);
  for (let i = 0; i < correctAnswer; i++) {
    objects.push(new FloatingObj(positions[i].x, positions[i].y, set.emoji, i));
  }

  // Wrong answers: pick 2 unique wrongs
  let wrongs = [];
  while (wrongs.length < 2) {
    const w = Math.floor(Math.random() * 5) + 1;
    if (w !== correctAnswer && !wrongs.includes(w)) wrongs.push(w);
  }
  const choices = shuffle([correctAnswer, wrongs[0], wrongs[1]]);

  const btnW = 100, btnH = 90;
  const totalW = 3 * btnW + 2 * 16;
  const startX = (390 - totalW) / 2;
  const btnY = 590;
  for (let i = 0; i < 3; i++) {
    answerButtons.push(new AnswerBtn(startX + i * (btnW + 16), btnY, btnW, btnH, choices[i]));
  }
}

function buildPositions(count) {
  // Grid-ish layout in the upper area
  const area = { x: 40, y: 130, w: 310, h: 320 };
  const positions = [];
  if (count === 1) {
    positions.push({ x: 195, y: area.y + 140 });
  } else if (count === 2) {
    positions.push({ x: 120, y: area.y + 130 });
    positions.push({ x: 270, y: area.y + 130 });
  } else if (count === 3) {
    positions.push({ x: 195, y: area.y + 60 });
    positions.push({ x: 100, y: area.y + 220 });
    positions.push({ x: 290, y: area.y + 220 });
  } else if (count === 4) {
    positions.push({ x: 110, y: area.y + 70 });
    positions.push({ x: 280, y: area.y + 70 });
    positions.push({ x: 110, y: area.y + 230 });
    positions.push({ x: 280, y: area.y + 230 });
  } else {
    positions.push({ x: 195, y: area.y + 40 });
    positions.push({ x: 80,  y: area.y + 160 });
    positions.push({ x: 310, y: area.y + 160 });
    positions.push({ x: 120, y: area.y + 290 });
    positions.push({ x: 270, y: area.y + 290 });
  }
  return positions;
}

function checkAnswer(btn) {
  if (phase !== 'playing') return;
  if (btn.label === correctAnswer) {
    score++;
    feedbackText = '⭐ Goed zo!';
    feedbackColor = '#5ef065';
    btn.color = '#5ef065';
  } else {
    feedbackText = '😊 Probeer nog!';
    feedbackColor = '#ff6b6b';
    btn.color = '#ff6b6b';
    // Highlight correct
    for (let b of answerButtons) {
      if (b.label === correctAnswer) b.color = '#5ef065';
    }
  }
  phase = 'feedback';
  feedbackTimer = 80;
}

function drawBackground() {
  // Gradient sky
  const grad = ctx.createLinearGradient(0, 0, 0, 700);
  grad.addColorStop(0, '#0f0c29');
  grad.addColorStop(1, '#302b63');
  ctx.fillStyle = grad;
  ctx.fillRect(0, 0, 390, 700);

  // Twinkling stars
  for (let s of stars) {
    s.twinkle += s.speed;
    const alpha = 0.4 + 0.6 * Math.abs(Math.sin(s.twinkle));
    ctx.save();
    ctx.globalAlpha = alpha;
    ctx.fillStyle = '#fff';
    ctx.beginPath();
    ctx.arc(s.x, s.y, s.r, 0, Math.PI * 2);
    ctx.fill();
    ctx.restore();
  }
}

function drawHUD() {
  // Round indicator
  ctx.save();
  ctx.fillStyle = 'rgba(255,255,255,0.12)';
  ctx.beginPath();
  roundRect(ctx, 16, 16, 165, 52, 26);
  ctx.fill();
  ctx.fillStyle = '#fff';
  ctx.font = 'bold 20px Arial Rounded MT Bold, Arial';
  ctx.textAlign = 'left';
  ctx.textBaseline = 'middle';
  ctx.fillText('Ronde ' + (round + 1) + ' / ' + TOTAL_ROUNDS, 30, 42);
  ctx.restore();

  // Score stars
  ctx.save();
  ctx.fillStyle = 'rgba(255,255,255,0.12)';
  ctx.beginPath();
  roundRect(ctx, 209, 16, 165, 52, 26);
  ctx.fill();
  ctx.font = 'bold 20px Arial Rounded MT Bold, Arial';
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  ctx.fillStyle = '#f7c948';
  ctx.fillText('⭐ ' + score, 291, 42);
  ctx.restore();

  // Question
  const set = SETS[round % SETS.length];
  ctx.save();
  ctx.fillStyle = '#fff';
  ctx.font = 'bold 26px Arial Rounded MT Bold, Arial';
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  ctx.shadowColor = 'rgba(0,0,0,0.5)';
  ctx.shadowBlur = 8;
  ctx.fillText('Hoeveel ' + set.name + '?', 195, 98);
  ctx.restore();
}

function drawFeedback() {
  if (!feedbackText) return;
  ctx.save();
  ctx.globalAlpha = Math.min(1, feedbackTimer / 20);
  ctx.font = 'bold 48px serif';
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  ctx.shadowColor = 'rgba(0,0,0,0.6)';
  ctx.shadowBlur = 10;
  ctx.fillStyle = feedbackColor;
  ctx.fillText(feedbackText, 195, 530);
  ctx.restore();
}

function drawDone() {
  ctx.save();
  const grad = ctx.createLinearGradient(0, 0, 0, 700);
  grad.addColorStop(0, '#0f0c29');
  grad.addColorStop(1, '#302b63');
  ctx.fillStyle = grad;
  ctx.fillRect(0, 0, 390, 700);
  for (let s of stars) {
    s.twinkle += s.speed;
    const alpha = 0.4 + 0.6 * Math.abs(Math.sin(s.twinkle));
    ctx.globalAlpha = alpha;
    ctx.fillStyle = '#fff';
    ctx.beginPath();
    ctx.arc(s.x, s.y, s.r, 0, Math.PI * 2);
    ctx.fill();
  }
  ctx.globalAlpha = 1;

  ctx.font = '80px serif';
  ctx.textAlign = 'center';
  ctx.fillText('🎉', 195, 200);

  ctx.fillStyle = '#fff';
  ctx.font = 'bold 38px Arial Rounded MT Bold, Arial';
  ctx.fillText('Geweldig!', 195, 300);
  ctx.font = 'bold 28px Arial Rounded MT Bold, Arial';
  ctx.fillStyle = '#f7c948';
  ctx.fillText(score + ' van de ' + TOTAL_ROUNDS + ' goed!', 195, 360);

  ctx.font = '50px serif';
  const medal = score >= 8 ? '🥇' : score >= 5 ? '🥈' : '🥉';
  ctx.fillText(medal, 195, 450);

  // Replay button
  ctx.fillStyle = '#f7c948';
  ctx.shadowColor = 'rgba(0,0,0,0.3)';
  ctx.shadowBlur = 10;
  ctx.beginPath();
  roundRect(ctx, 110, 530, 170, 80, 22);
  ctx.fill();
  ctx.shadowBlur = 0;
  ctx.fillStyle = '#1a1a2e';
  ctx.font = 'bold 30px Arial Rounded MT Bold, Arial';
  ctx.fillText('Opnieuw', 195, 572);
  ctx.restore();
}

let replayBtn = { x: 110, y: 530, w: 170, h: 80 };

function loop() {
  requestAnimationFrame(loop);

  if (phase === 'done') {
    drawDone();
    return;
  }

  drawBackground();
  drawHUD();

  for (let o of objects) {
    o.update();
    o.draw();
  }

  for (let btn of answerButtons) {
    // Animate scale
    btn.scale += (btn.targetScale - btn.scale) * 0.2;
    btn.draw();
  }

  drawFeedback();

  if (phase === 'feedback') {
    feedbackTimer--;
    if (feedbackTimer <= 0) {
      round++;
      if (round >= TOTAL_ROUNDS) {
        phase = 'done';
      } else {
        startRound();
      }
    }
  }
}

function getPos(e) {
  const rect = canvas.getBoundingClientRect();
  const scaleX = canvas.width / rect.width;
  const scaleY = canvas.height / rect.height;
  if (e.touches) {
    return {
      x: (e.touches[0].clientX - rect.left) * scaleX,
      y: (e.touches[0].clientY - rect.top) * scaleY,
    };
  }
  return {
    x: (e.clientX - rect.left) * scaleX,
    y: (e.clientY - rect.top) * scaleY,
  };
}

canvas.ontouchstart = function(e) {
  e.preventDefault();
  const pos = getPos(e);
  handleTap(pos.x, pos.y);
};
canvas.onclick = function(e) {
  const pos = getPos(e);
  handleTap(pos.x, pos.y);
};

function handleTap(x, y) {
  if (phase === 'done') {
    if (x >= replayBtn.x && x <= replayBtn.x + replayBtn.w &&
        y >= replayBtn.y && y <= replayBtn.y + replayBtn.h) {
      round = 0; score = 0; startRound();
    }
    return;
  }
  if (phase !== 'playing') return;
  for (let btn of answerButtons) {
    if (btn.contains(x, y)) {
      btn.targetScale = 0.9;
      setTimeout(function() { btn.targetScale = 1; }, 120);
      checkAnswer(btn);
      return;
    }
  }
}

startRound();
loop();
</script>
</body>
</html>
